<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdraw - Jipate Bonus💸🎉💵</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8ffe8;
      margin: 0;
      padding: 0;
    }
    header {
      background: #009933;
      color: white;
      text-align: center;
      padding: 15px;
    }
    .container {
      max-width: 500px;
      margin: 30px auto;
      padding: 20px;
      background: #ffe6f0;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      color: #009933;
    }
    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      background: #009933;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #007a29;
    }
    .note {
      margin-top: 15px;
      font-size: 14px;
      color: #d9534f;
    }
  </style>
</head>
<body>

<header>
  <h1>Withdraw Earnings</h1>
</header>

<div class="container">
  <h2>Request Withdrawal</h2>
  <form id="withdrawForm">
    <label for="amount">Amount to Withdraw (KES):</label>
    <input type="number" id="amount" required />

    <button type="submit">Submit Withdrawal</button>

    <p class="note">
      🔐 Withdrawals are only allowed on <strong>Mondays</strong><br/>
      💰 Minimum withdrawal is <strong>30% of your investment</strong><br/>
      ⏳ All withdrawals require <strong>admin approval</strong><br/>
      🧮 Example limits:<br/>
      - 150 KES for 500 invested<br/>
      - 300 KES for 1000 invested<br/>
      - 30% max if above 1500
    </p>
  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const username = localStorage.getItem("username");
    if (!username) {
      alert("Please log in first.");
      window.location.href = "login.html";
      return;
    }

    const today = new Date();
    const day = today.getDay(); // 1 = Monday
    if (day !== 1) {
      alert("Withdrawals are only allowed on Mondays.");
      window.location.href = "dashboard.html";
      return;
    }

    document.getElementById("withdrawForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById("amount").value);

      if (isNaN(amount) || amount <= 0) {
        alert("Enter a valid amount.");
        return;
      }

      try {
        const [userRes, investRes] = await Promise.all([
          fetch("https://repo-1red-jipate-bonus.onrender.com/admin/view_users"),
          fetch("https://repo-1red-jipate-bonus.onrender.com/admin/view_investments"),
        ]);

        const users = await userRes.json();
        const investments = await investRes.json();

        const user = users[username];
        const investment = investments[username];

        if (!user || !investment) {
          alert("Account or investment not found.");
          return;
        }

        const invested = investment.amount;
        const balance = user.balance;

        const minAllowed = Math.floor(invested * 0.3);
        let maxAllowed = 0;

        if (invested >= 500 && invested < 1000) {
          maxAllowed = 150;
        } else if (invested >= 1000 && invested < 1500) {
          maxAllowed = 300;
        } else if (invested >= 1500) {
          maxAllowed = Math.floor(invested * 0.3);
        }

        if (amount < minAllowed) {
          alert(`Minimum withdrawal is 30% of investment: KES ${minAllowed}`);
          return;
        }

        if (amount > maxAllowed) {
          alert(`Maximum allowed withdrawal: KES ${maxAllowed}`);
          return;
        }

        if (amount > balance) {
          alert("Insufficient balance.");
          return;
        }

        // Submit withdrawal for admin approval
        const formData = new FormData();
        formData.append("username", username);
        formData.append("amount", amount);

        const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw/request", {
          method: "POST",
          body: formData,
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Withdrawal request failed.");
        }

        const result = await res.json();
        alert("✅ Withdrawal request submitted. Wait for admin approval.");
        window.location.href = "dashboard.html";

      } catch (err) {
        console.error(err);
        alert(err.message || "An error occurred during withdrawal.");
      }
    });
  });
</script>

</body>
</html>
