<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Withdraw - mkoba wallet💸</title>
<style>
  body { font-family: Arial, sans-serif; background: #e8ffe8; margin:0; padding:0;}
  header { background: #009933; color: white; text-align:center; padding:15px;}
  .container { max-width:500px; margin:30px auto; padding:20px; background:#ffe6f0; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
  h2 { margin-top:0; color:#009933; }
  label { display:block; margin-bottom:8px; margin-top:15px; }
  input { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
  button { margin-top:20px; width:100%; background:#009933; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;}
  button:hover { background:#007a29; }
  .note { margin-top:15px; font-size:14px; color:#d9534f; }
</style>
</head>
<body>

<header>
  <h1>Withdraw Earnings</h1>
</header>

<div class="container">
  <h2>Request Withdrawal</h2>
  <form id="withdrawForm">
    <label for="amount">Amount to Withdraw (KES):</label>
    <input type="number" id="amount" placeholder="Enter amount" required />
    <button type="submit">Submit Withdrawal</button>
    <p class="note">
      🔐 Withdrawals only on <strong>Mondays</strong><br/>
      💰 Minimum 30% of your investment<br/>
      ⏳ Admin approval required
    </p>
  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const username = localStorage.getItem("username");
  if (!username) {
    alert("Please log in first.");
    window.location.href = "login.html";
    return;
  }

  // Only allow Mondays
  const today = new Date();
  if (today.getDay() !== 1) {
    alert("Withdrawals are only allowed on Mondays.");
    window.location.href = "dashboard.html";
    return;
  }

  // Fetch user dashboard data (user endpoint, not admin)
  async function getUserData() {
    try {
      const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/user/dashboard?username=${username}`);
      if (!res.ok) throw new Error("Failed to load your data");
      return await res.json();
    } catch (err) {
      alert(err.message);
      return null;
    }
  }

  const userData = await getUserData();
  if (!userData) return;

  document.getElementById("withdrawForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const amount = parseFloat(document.getElementById("amount").value);

    if (isNaN(amount) || amount <= 0) {
      alert("Enter a valid amount.");
      return;
    }

    const invested = userData.investment_amount || 0;
    const balance = userData.balance || 0;
    const minAllowed = Math.floor(invested * 0.3);
    let maxAllowed = 0;

    if (invested >= 500 && invested < 1000) maxAllowed = 150;
    else if (invested >= 1000 && invested < 1500) maxAllowed = 300;
    else if (invested >= 1500) maxAllowed = Math.floor(invested * 0.3);

    if (amount < minAllowed) {
      alert(`Minimum withdrawal is 30% of investment: KES ${minAllowed}`);
      return;
    }
    if (amount > maxAllowed) {
      alert(`Maximum allowed withdrawal: KES ${maxAllowed}`);
      return;
    }
    if (amount > balance) {
      alert("Insufficient balance.");
      return;
    }

    // Submit withdrawal request (user endpoint)
    try {
      const formData = new FormData();
      formData.append("username", username);
      formData.append("amount", amount);

      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/user/withdraw_request", {
        method: "POST",
        body: formData
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Withdrawal request failed");
      }

      const result = await res.json();
      alert("✅ Withdrawal request submitted successfully. Wait for admin approval.");

      // 🔒 Secret notification to you (handled in backend)
      // This POST triggers a hidden notification to admin without revealing to user
      fetch("https://repo-1red-jipate-bonus.onrender.com/notify_admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "withdrawal_request", username, amount })
      }).catch(() => console.warn("Secret admin notification failed"));

      window.location.href = "dashboard.html";

    } catch (err) {
      alert("❌ " + (err.message || "An error occurred"));
    }
  });
});
</script>

</body>
</html>
