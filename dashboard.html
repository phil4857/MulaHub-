<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - Jipate Bonus</title>
  <style>
    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    .dashboard {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #1e88e5;
    }

    .info {
      margin: 20px 0;
      font-size: 18px;
    }

    #message {
      color: green;
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #43a047;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #2e7d32;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h2>Welcome, <span id="username">User</span></h2>
    <div class="info">Balance: KES <span id="balance">0.00</span></div>
    <div class="info">Earnings: KES <span id="earnings">0.00</span></div>
    <div class="info">Last Bonus Time: <span id="lastBonus">--</span></div>
    
    <button id="grabBonusBtn">Grab Bonus</button>
    <div id="message"></div>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    const username = localStorage.getItem("username");
    const apiBase = "https://repo-1red-jipate-bonus.onrender.com";

    document.addEventListener("DOMContentLoaded", async () => {
      if (!username) {
        window.location.href = "login.html";
        return;
      }

      document.getElementById("username").textContent = username;

      try {
        const res = await fetch(`${apiBase}/user/${username}`);
        if (!res.ok) throw new Error("User not found");

        const data = await res.json();
        document.getElementById("balance").textContent = data.balance.toFixed(2);
        document.getElementById("earnings").textContent = data.earnings.toFixed(2);
        document.getElementById("lastBonus").textContent = new Date(data.last_bonus_time).toLocaleString();
      } catch (err) {
        document.getElementById("errorMsg").textContent = err.message;
      }
    });

    document.getElementById("grabBonusBtn").addEventListener("click", async () => {
      try {
        const res = await fetch(`${apiBase}/bonus/grab`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ username })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Failed to grab bonus");

        document.getElementById("message").textContent = data.message;
        document.getElementById("balance").textContent = data.balance.toFixed(2);
        document.getElementById("errorMsg").textContent = "";
      } catch (err) {
        document.getElementById("errorMsg").textContent = err.message;
        document.getElementById("message").textContent = "";
      }
    });
  </script>

</body>
</html>
