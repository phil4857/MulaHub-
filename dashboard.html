<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Mkoba Wallet 💵🎉</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f9ff;
            margin: 0;
        }
        header {
            background: linear-gradient(90deg, #0a1d66, #1234a0);
            color: #ffd700;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        .container {
            background: #fff;
            margin: 20px auto;
            padding: 25px;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .info p {
            background: #f0f8f0;
            padding: 12px;
            border-left: 5px solid #0a1d66;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .info span {
            font-weight: bold;
            color: #1234a0;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-top: 20px;
        }
        .actions button {
            flex: 1 1 45%;
            margin: 10px 5px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to right, #0a1d66, #1234a0);
            color: #ffd700;
        }
        .logout {
            background: linear-gradient(to right, #dc3545, #a71d2a) !important;
        }
        .otp-section {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Mkoba Wallet Dashboard 💵🎉</h1>
</header>

<div class="container">
    <div class="info">
        <p>Username: <span id="usernameDisplay"></span></p>
        <p>Balance: KES <span id="balanceDisplay">0.00</span></p>
        <p>Total Earnings: KES <span id="earningsDisplay">0.00</span></p>
        <p>Investment: KES <span id="investmentDisplay">0.00</span></p>
    </div>

    <div class="actions">
        <button onclick="investRequest()">💰 Invest</button>
        <button onclick="withdrawRequest()">📤 Withdraw</button>
        <button class="logout" onclick="logout()">🚪 Logout</button>
    </div>

    <!-- Investment Section -->
    <h3>Invest in Commodity</h3>
    <select id="commoditySelect">
        <option value="">Select Commodity</option>
        <option value="gold">Gold</option>
        <option value="silver">Silver</option>
        <option value="platinum">Platinum</option>
        <!-- Add more from your COMMODITY_INFO when ready -->
    </select>
    <button onclick="investRequest()">Invest</button>

    <div id="investOtpSection" class="otp-section">
        <p id="investOtpDisplay">OTP: </p>
        <input id="investOtpInput" type="text" placeholder="Enter OTP">
        <button onclick="investConfirm()">Confirm Investment</button>
    </div>

    <!-- Withdrawal Section -->
    <h3>Withdraw Funds</h3>
    <input id="withdrawAmount" type="number" placeholder="Amount (KES)" min="1" step="1">
    <button onclick="withdrawRequest()">Withdraw</button>

    <div id="withdrawOtpSection" class="otp-section">
        <p id="withdrawOtpDisplay">OTP: </p>
        <input id="withdrawOtpInput" type="text" placeholder="Enter OTP">
        <button onclick="withdrawConfirm()">Confirm Withdrawal</button>
    </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username');
    if (!username) {
        window.location.href = 'login.html';
        return;
    }

    async function fetchUserData() {
        try {
            const response = await fetch(`\( {BACKEND_URL}/dashboard?username= \){encodeURIComponent(username)}`);
            if (!response.ok) {
                if (response.status === 403) {
                    alert("Account not approved yet or access denied.");
                } else {
                    console.error(`Dashboard error: ${response.status}`);
                }
                logout();
                return null;
            }
            return await response.json();
        } catch (err) {
            console.error("Dashboard fetch failed:", err);
            alert("Cannot load dashboard. Check your internet connection.");
            return null;
        }
    }

    async function updateUI() {
        const user = await fetchUserData();
        if (user) {
            document.getElementById('usernameDisplay').textContent = user.username || username;
            document.getElementById('balanceDisplay').textContent = Number(user.balance || 0).toFixed(2);
            document.getElementById('earningsDisplay').textContent = Number(user.earnings || 0).toFixed(2);

            // Sum invested amounts from investments object
            let invested = 0;
            if (user.investments && typeof user.investments === 'object') {
                Object.values(user.investments).forEach(item => {
                    invested += Number(item.amount || 0);
                });
            }
            document.getElementById('investmentDisplay').textContent = invested.toFixed(2);
        }
    }

    window.investRequest = async function () {
        const commodity = document.getElementById('commoditySelect').value;
        if (!commodity) return alert('Please select a commodity.');

        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('commodity', commodity);

        try {
            const res = await fetch(`${BACKEND_URL}/invest/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                alert(data.message || 'Investment request created. Click "Confirm Investment" to proceed.');
                // If you later add OTP, show section here
            } else {
                alert(data.detail || 'Investment request failed.');
            }
        } catch (err) {
            alert('Network error. Please try again.');
            console.error(err);
        }
    };

    window.investConfirm = async function () {
        const formData = new URLSearchParams();
        formData.append('username', username);

        try {
            const res = await fetch(`${BACKEND_URL}/invest/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                alert(data.message || 'Investment confirmed successfully!');
                updateUI();
            } else {
                alert(data.detail || 'Confirmation failed.');
            }
        } catch (err) {
            alert('Network error during confirmation.');
        }
    };

    window.withdrawRequest = async function () {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        if (!amount || amount <= 0) return alert('Please enter a valid amount.');

        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('amount', amount);

        try {
            const res = await fetch(`${BACKEND_URL}/withdraw/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                alert(data.message || 'Withdrawal request created. Pending approval.');
            } else {
                alert(data.detail || 'Withdrawal request failed.');
            }
        } catch (err) {
            alert('Network error.');
            console.error(err);
        }
    };

    window.withdrawConfirm = async function () {
        const formData = new URLSearchParams();
        formData.append('username', username);

        try {
            const res = await fetch(`${BACKEND_URL}/withdraw/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                alert(data.message || 'Withdrawal confirmed!');
                updateUI();
            } else {
                alert(data.detail || 'Confirmation failed.');
            }
        } catch (err) {
            alert('Network error during confirmation.');
        }
    };

    window.logout = function () {
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    };

    updateUI(); // Load data when page opens
});
</script>

</body>
</html>
