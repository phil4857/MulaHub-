<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Mkoba Wallet</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
  }
  header {
    background: #28a745;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
  }
  header button {
    background: #dc3545;
    border: none;
    padding: 7px 12px;
    color: white;
    cursor: pointer;
    border-radius: 4px;
  }
  main {
    padding: 20px;
  }
  .balance-section, .invest-section {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  }
  .balance-section p, .invest-section p {
    margin: 5px 0;
  }
  #commodityGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .commodity-card {
    background: #e9ecef;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
  }
  .commodity-card.selected {
    background: #28a745;
    color: white;
  }
  button#investBtn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  button#investBtn:disabled {
    background: gray;
    cursor: not-allowed;
  }
  .msg {
    margin-top: 10px;
    font-size: 14px;
  }
  .msg.success { color: green; }
  .msg.error { color: red; }
  .msg.loading { color: orange; }
</style>
</head>
<body>

<header>
  <h1>Welcome, <span id="usernameDisplay"></span></h1>
  <button onclick="logout()">Logout</button>
</header>

<main>

  <div id="msg" class="msg"></div>

  <div class="balance-section">
    <h3>Account Summary</h3>
    <p>Balance: <span id="balance">KES 0.00</span></p>
    <p>Total Earnings: <span id="earnings">KES 0.00</span></p>
    <p>Total Invested: <span id="invested">KES 0.00</span></p>
  </div>

  <div class="invest-section">
    <h3>Invest in Commodities</h3>
    <div id="commodityGrid"></div>
    <p>Selected Commodity: <span id="selectedCommodity">None</span></p>
    <button id="investBtn" onclick="requestInvestment()" disabled>Invest</button>
  </div>

</main>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";
const MPESA_NUMBER = "0752964507";
let selectedCommodity = null;

document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('access_token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  // Display username
  const username = localStorage.getItem('username') || 'User';
  document.getElementById('usernameDisplay').textContent = username;

  // Wake backend (Render cold-start)
  fetch(`${BACKEND_URL}/health`).catch(()=>{});

  renderCommodityCards();
  fetchUserData();
});

function logout(){
  localStorage.removeItem('access_token');
  localStorage.removeItem('username');
  window.location.href='login.html';
}

async function fetchUserData(){
  const msg = document.getElementById('msg');
  msg.className = "msg loading";
  msg.textContent = "Loading dashboard...";

  const token = localStorage.getItem('access_token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/dashboard`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Failed to load');

    document.getElementById('balance').textContent = `KES ${Number(data.balance||0).toFixed(2)}`;
    document.getElementById('earnings').textContent = `KES ${Number(data.earnings||0).toFixed(2)}`;

    let investedTotal = 0;
    if (data.investments && typeof data.investments === 'object') {
      Object.values(data.investments).forEach(inv => {
        if (inv && inv.amount) investedTotal += Number(inv.amount) || 0;
      });
    }
    document.getElementById('invested').textContent = `KES ${investedTotal.toFixed(2)}`;

    msg.className = "msg success";
    msg.textContent = "Dashboard loaded";
  } catch (err) {
    console.error(err);
    msg.className = "msg error";
    msg.textContent = "Failed to load dashboard";
    if (err.message && (err.message.toLowerCase().includes('token') || err.message.toLowerCase().includes('unauthorized'))) {
      localStorage.removeItem('access_token');
      setTimeout(()=> window.location.href='login.html', 800);
    }
  }
}

function renderCommodityCards(){
  const grid = document.getElementById("commodityGrid");
  const commodities = { marble:650, crude_oil:800, silver:1000, lead:1200,
    platinum:1350, diamonds:1750, gold:2200, uranium:3000
  };

  grid.innerHTML = "";
  Object.entries(commodities).forEach(([key,price])=>{
    const card = document.createElement("div");
    card.className = "commodity-card";
    card.innerHTML = `<h4 style="text-transform:capitalize">${key.replace('_',' ')}</h4><p>KES ${price}</p>`;

    card.onclick = () => {
      selectedCommodity = key;
      document.getElementById("selectedCommodity").textContent = key;
      document.getElementById("investBtn").disabled = false;
      document.querySelectorAll(".commodity-card").forEach(c=>c.classList.remove("selected"));
      card.classList.add("selected");
    };

    grid.appendChild(card);
  });
}

async function requestInvestment(){
  if(!selectedCommodity) return;

  const token = localStorage.getItem('access_token');
  if (!token) {
    alert('Please login again');
    window.location.href='login.html';
    return;
  }

  const investBtn = document.getElementById('investBtn');
  investBtn.disabled = true;

  try {
    const res1 = await fetch(`${BACKEND_URL}/invest/request`, {
      method: "POST",
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ commodity: selectedCommodity })
    });
    const data1 = await res1.json();

    if (!res1.ok) {
      alert(data1.detail || 'Failed to request investment');
      investBtn.disabled = false;
      return;
    }

    alert(`Send payment to ${MPESA_NUMBER}. Amount: KES ${data1.price}`);

    const confirmed = confirm('Have you completed the M-Pesa payment? Press OK to confirm and finalize the investment.');
    if (!confirmed) {
      investBtn.disabled = false;
      return;
    }

    const res2 = await fetch(`${BACKEND_URL}/invest/confirm`, {
      method: "POST",
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ commodity: selectedCommodity })
    });
    const data2 = await res2.json();

    if (!res2.ok) {
      alert(data2.detail || 'Failed to confirm investment');
      investBtn.disabled = false;
      return;
    }

    alert(data2.message || 'Investment confirmed');
    await fetchUserData();
  } catch (err) {
    console.error(err);
    alert('Server error');
  } finally {
    investBtn.disabled = false;
  }
}
</script>

</body>
</html>
