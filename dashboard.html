<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Mkoba Wallet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5dc;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    .info {
      margin: 15px 0;
    }
    #message {
      color: green;
    }
    #errorMsg {
      color: red;
    }
    button {
      background-color: darkorange;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button[disabled] {
      background-color: #ccc;
      cursor: not-allowed;
    }
    button:hover:enabled {
      background-color: orangered;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Welcome, <span id="username"></span></h2>

    <!-- Payment Number Info -->
    <div class="info">
      <strong>Pay Investment Fee To Mkoba Wallet:</strong><br>
      <span style="font-size: 18px; color: darkgreen;">MPESA: 0739075065</span>
    </div>

    <div class="info"><strong>Balance:</strong> KES <span id="balance">0.00</span></div>
    <div class="info"><strong>Total Earnings:</strong> KES <span id="earnings">0.00</span></div>
    <div class="info"><strong>Last Bonus Time:</strong> <span id="lastBonus">--</span></div>
    <div class="info"><strong>Bonus Status:</strong> <span id="bonusMessage">--</span></div>
    <div class="info"><strong>Bonus Days Left:</strong> <span id="daysLeft">--</span></div>
    <div class="info"><strong>Investment:</strong> KES <span id="investmentAmount">0</span></div>

    <button id="grabBonusBtn">Grab Bonus</button>

    <p id="message"></p>
    <p id="errorMsg"></p>
  </div>

  <script>
    const username = localStorage.getItem("username");
    const apiBase = "https://repo-1red-jipate-bonus.onrender.com";

    const grabBtn = document.getElementById("grabBonusBtn");

    document.addEventListener("DOMContentLoaded", async () => {
      if (!username) {
        window.location.href = "login.html";
        return;
      }

      document.getElementById("username").textContent = username;

      try {
        const res = await fetch(`${apiBase}/dashboard?username=${encodeURIComponent(username)}`);
        if (!res.ok) throw new Error("Failed to fetch dashboard");

        const data = await res.json();

        document.getElementById("balance").textContent = data.balance.toFixed(2);
        document.getElementById("earnings").textContent = data.earnings.toFixed(2);
        document.getElementById("lastBonus").textContent = data.last_bonus_time || "--";
        document.getElementById("bonusMessage").textContent = data.bonus_message || "--";
        document.getElementById("daysLeft").textContent = data.bonus_days_remaining;
        document.getElementById("investmentAmount").textContent = data.investment_amount;

        // Enable/Disable Bonus Button
        grabBtn.disabled = !data.bonus_available;

      } catch (err) {
        document.getElementById("errorMsg").textContent = err.message;
      }
    });

    grabBtn.addEventListener("click", async () => {
      try {
        const res = await fetch(`${apiBase}/bonus/grab`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ username })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Bonus grab failed");

        document.getElementById("message").textContent = data.message;
        document.getElementById("balance").textContent = data.balance.toFixed(2);
        document.getElementById("daysLeft").textContent = data.days_remaining;
        document.getElementById("errorMsg").textContent = "";
        grabBtn.disabled = true;
      } catch (err) {
        document.getElementById("errorMsg").textContent = err.message;
        document.getElementById("message").textContent = "";
      }
    });
  </script>

</body>
</html>
