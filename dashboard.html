<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-6.onrender.com"; // Ensure this matches your live backend

document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username');
    if (!username) {
        window.location.href = 'login.html';
        return;
    }

    const msg = document.getElementById('msg');

    async function fetchUserData() {
        msg.textContent = "Loading dashboard...";
        msg.style.color = "blue";

        try {
            const url = `${BACKEND_URL}/dashboard?username=${encodeURIComponent(username)}`;
            const response = await fetch(url);

            if (!response.ok) {
                let data = {};
                try { data = await response.json(); } catch {}
                msg.style.color = "red";
                if (response.status === 404) {
                    msg.textContent = "User not found on server (404). Try registering again or contact support.";
                } else if (response.status === 403) {
                    msg.textContent = "Account not approved. Contact admin to get approved.";
                } else {
                    msg.textContent = data.detail || "Dashboard not found. Contact support or check backend.";
                }
                console.error("Dashboard error:", response.status, data);
                return null;
            }

            const user = await response.json();

            document.getElementById('usernameDisplay').textContent = user.username || username;
            document.getElementById('balance').textContent = Number(user.balance || 0).toFixed(2);
            document.getElementById('earnings').textContent = Number(user.earnings || 0).toFixed(2);

            let invested = 0;
            if (user.investments && typeof user.investments === 'object') {
                Object.values(user.investments).forEach(item => invested += Number(item.amount || 0));
            }
            document.getElementById('invested').textContent = invested.toFixed(2);

            renderInvestments(user.investments || {});
            renderCommodityCards();

            msg.textContent = "Dashboard loaded successfully!";
            msg.style.color = "green";
            setTimeout(() => { msg.textContent = ""; }, 3000);
            return user;

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = "Cannot connect to server. Check internet or backend status.";
            console.error("Fetch error:", err);
            return null;
        }
    }

    function renderInvestments(investments) {
        const container = document.getElementById('investmentList');
        container.innerHTML = '';

        if (!investments || Object.keys(investments).length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#777;'>No active investments yet.</p>";
            return;
        }

        for (const [commodity, inv] of Object.entries(investments)) {
            const expiry = new Date(inv.expiry_date);
            const remainingDays = Math.max(Math.floor((expiry - new Date()) / (1000 * 60 * 60 * 24)), 0);
            const card = document.createElement('div');
            card.style.background = '#f0f8f0';
            card.style.padding = '15px';
            card.style.borderRadius = '10px';
            card.style.border = '1px solid #28a745';
            card.innerHTML = `
                <strong>${commodity.toUpperCase()}</strong><br>
                Amount: KES ${Number(inv.amount || 0).toFixed(2)}<br>
                Expires in: ${remainingDays} day(s)
            `;
            container.appendChild(card);
        }
    }

    function renderCommodityCards() {
        const grid = document.getElementById('commodityGrid');
        grid.innerHTML = "";

        const commodities = [
            { key: "marble", name: "Marble", price: 650, days: 15, img: "https://images.unsplash.com/photo-1618220048045-1a5a6a3b5b5e?auto=format&fit=crop&w=800&q=80" },
            { key: "crude_oil", name: "Crude Oil", price: 800, days: 20, img: "https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&w=800&q=80" },
            { key: "silver", name: "Silver", price: 1000, days: 23, img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" },
            { key: "lead", name: "Lead", price: 1200, days: 25, img: "https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&w=800&q=80" },
            { key: "platinum", name: "Platinum", price: 1350, days: 28, img: "https://images.unsplash.com/photo-1618220048045-1a5a6a3b5b5e?auto=format&fit=crop&w=800&q=80" },
            { key: "diamonds", name: "Diamonds", price: 1750, days: 32, img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=800&q=80" },
            { key: "gold", name: "Gold", price: 2200, days: 35, img: "https://images.unsplash.com/photo-1610375461248-9d2b9a3f6e1c?auto=format&fit=crop&w=800&q=80" },
            { key: "uranium", name: "Uranium", price: 3000, days: 45, img: "https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&w=800&q=80" }
        ];

        commodities.forEach(com => {
            const card = document.createElement('div');
            card.className = 'commodity-card';
            card.innerHTML = `
                <img src="${com.img}" alt="${com.name}">
                <div class="commodity-info">
                    <h4>${com.name}</h4>
                    <p>KES ${com.price.toLocaleString()}</p>
                    <p>${com.days} days</p>
                </div>
            `;
            card.onclick = () => investRequest(com.key);
            grid.appendChild(card);
        });
    }

    window.investRequest = async function (commodity) {
        if (!commodity) {
            msg.textContent = "Please select a commodity.";
            msg.style.color = "red";
            return;
        }

        msg.textContent = "Sending investment request...";
        msg.style.color = "blue";

        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('commodity', commodity);

        try {
            const res = await fetch(`${BACKEND_URL}/invest/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                msg.style.color = "green";
                msg.innerHTML = `${data.message}<br><strong>Pay via M-Pesa: ${data.mpesa_number || '0752964507'}</strong>`;
                fetchUserData(); // refresh dashboard
            } else {
                msg.style.color = "red";
                msg.textContent = data.detail || 'Investment request failed.';
            }
        } catch (err) {
            msg.style.color = "red";
            msg.textContent = "Network error during request.";
            console.error(err);
        }
    };

    window.logout = function () {
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    };

    fetchUserData();
});
</script>
