<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Mkoba Wallet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4fff7;
      margin: 0;
      padding: 0;
    }

    header {
      background: #28a745;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      color: #28a745;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    .info {
      margin-bottom: 15px;
      padding: 15px;
      background: #f0f8f0;
      border-left: 5px solid #28a745;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .invest-btn { background: #28a745; color: white; }
    .withdraw-btn { background: #007bff; color: white; }
    .bonus-btn { background: #ff9800; color: white; }
    .logout-btn { background: #dc3545; color: white; }

    button:hover { opacity: 0.85; }

    .form-section {
      margin-top: 20px;
      background: #fafafa;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    input {
      padding: 8px;
      margin: 5px 0;
      width: 90%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>💵 Mkoba Wallet - User Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
    <p><strong>Total Earnings:</strong> KES <span id="earningsDisplay">0.00</span></p>
    <p><strong>Referral Link:</strong> 
      <input type="text" id="referralLink" readonly style="width:80%"> 
      <button onclick="copyReferral()">📋 Copy</button>
    </p>
    <p><strong>Payment Number:</strong> <span id="payNumber">0739075065</span></p>
  </div>

  <div class="form-section">
    <h3>💰 Make Investment</h3>
    <input type="number" id="amount" placeholder="Enter amount (min 500)">
    <input type="text" id="tx_ref" placeholder="Transaction Reference (optional)">
    <button class="invest-btn" onclick="makeInvestment()">Invest</button>
  </div>

  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount">
    <button class="withdraw-btn" onclick="requestWithdrawal()">Request Withdrawal</button>
  </div>

  <div class="form-section">
    <h3>🎁 Daily Bonus</h3>
    <button class="bonus-btn" onclick="grabBonus()">Grab Bonus</button>
    <p id="bonusStatus">Status: Checking...</p>
  </div>

  <div class="actions">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
  const username = localStorage.getItem("username");
  if (!username) {
    alert("Please log in first.");
    window.location.href = "login.html";
  }

  document.getElementById("usernameDisplay").textContent = username;
  document.getElementById("referralLink").value = 
    `https://mkobawallet.com/register.html?ref=${username}`;

  async function loadUserData() {
    try {
      const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/dashboard?username=${username}`);
      if (!res.ok) throw new Error("Failed to fetch user data");
      const user = await res.json();
      document.getElementById("balanceDisplay").textContent = parseFloat(user.balance || 0).toFixed(2);
      document.getElementById("earningsDisplay").textContent = parseFloat(user.earnings || 0).toFixed(2);
      document.getElementById("bonusStatus").textContent = user.bonus_message || "Unknown";
    } catch (err) {
      alert("Error loading dashboard: " + err.message);
    }
  }

  async function makeInvestment() {
    const amount = document.getElementById("amount").value;
    const tx_ref = document.getElementById("tx_ref").value;
    if (!amount || amount < 500) {
      return alert("Minimum investment is KES 500.");
    }
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/invest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, amount, transaction_ref: tx_ref })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      alert(data.message);
      loadUserData();
    } catch (err) {
      alert("Investment failed: " + err.message);
    }
  }

  async function requestWithdrawal() {
    const amount = document.getElementById("withdrawAmount").value;
    if (!amount || amount <= 0) return alert("Enter valid amount.");
    try {
      const formData = new URLSearchParams();
      formData.append("username", username);
      formData.append("amount", amount);
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      alert(data.message);
      loadUserData();
    } catch (err) {
      alert("Withdrawal failed: " + err.message);
    }
  }

  async function grabBonus() {
    try {
      const formData = new URLSearchParams();
      formData.append("username", username);
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/bonus/grab", {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      alert(data.message);
      loadUserData();
    } catch (err) {
      alert("Bonus grab failed: " + err.message);
    }
  }

  function copyReferral() {
    const input = document.getElementById("referralLink");
    input.select();
    document.execCommand("copy");
    alert("Referral link copied!");
  }

  function logout() {
    localStorage.removeItem("username");
    window.location.href = "login.html";
  }

  loadUserData();
</script>

</body>
</html>
