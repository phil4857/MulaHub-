<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mkoba Wallet Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background:#f4fff7; margin:0; padding:0; }
header { background:#28a745; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.container { max-width:900px; margin:20px auto; padding:20px; background:white; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2 { color:#28a745; border-bottom:2px solid #eee; padding-bottom:5px; }
.info { margin-bottom:15px; padding:15px; background:#f0f8f0; border-left:5px solid #28a745; }
.form-section { margin-top:20px; background:#fafafa; padding:15px; border-radius:8px; border:1px solid #ddd; }
input, select { padding:8px; margin:5px 0; width:90%; border:1px solid #ccc; border-radius:5px; }
.actions { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; }
button { padding:10px 15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; transition:0.3s;}
.invest-btn { background:#28a745; color:white; }
.withdraw-btn { background:#007bff; color:white; }
.otp-btn { background:#ff9800; color:white; }
.logout-btn { background:#dc3545; color:white; }
button:hover { opacity:0.85; }
.investment-list { margin-top:10px; padding:10px; background:#f0f8f0; border-radius:5px; }
.investment-item { margin-bottom:5px; }
.otp-display { margin-top:5px; font-weight:bold; color:green; }
</style>
</head>
<body>

<header>💵 Mkoba Wallet - Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
    <p><strong>Earnings:</strong> KES <span id="earningsDisplay">0.00</span></p>
  </div>

  <!-- Investments Section -->
  <div class="form-section">
    <h3>💰 Make Investment</h3>
    <select id="commoditySelect">
      <option value="">-- Select Commodity --</option>
      <option value="marble">Marble</option>
      <option value="crude_oil">Crude Oil</option>
      <option value="silver">Silver</option>
      <option value="lead">Lead</option>
      <option value="platinum">Platinum</option>
      <option value="diamonds">Diamonds</option>
      <option value="gold">Gold</option>
      <option value="uranium">Uranium</option>
    </select>
    <button class="invest-btn" onclick="investRequest()">Invest</button>
    <div id="investOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="investOtpInput" placeholder="Enter OTP">
      <button class="otp-btn" onclick="investConfirm()">Confirm Investment</button>
      <p class="otp-display" id="investOtpDisplay"></p>
    </div>
  </div>

  <!-- Withdrawals Section -->
  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount">
    <button class="withdraw-btn" onclick="withdrawRequest()">Request Withdrawal</button>
    <div id="withdrawOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="withdrawOtpInput" placeholder="Enter OTP">
      <button class="otp-btn" onclick="withdrawConfirm()">Confirm Withdrawal</button>
      <p class="otp-display" id="withdrawOtpDisplay"></p>
    </div>
  </div>

  <!-- Investments Display -->
  <div class="form-section">
    <h3>📈 Your Investments</h3>
    <div id="investmentList" class="investment-list">Loading...</div>
  </div>

  <div class="actions">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
const baseURL = 'https://repo-1red-jipate-bonus.onrender.com'; // Update with your backend
const username = localStorage.getItem("username");
if(!username){ alert("Please log in first."); window.location.href="login.html"; }
document.getElementById("usernameDisplay").textContent = username;

async function loadDashboard(){
  try{
    const res = await fetch(`${baseURL}/dashboard?username=${username}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Failed to load dashboard");

    document.getElementById("balanceDisplay").textContent = data.balance.toFixed(2);
    document.getElementById("earningsDisplay").textContent = data.earnings.toFixed(2);
    renderInvestments(data.investments || {});
  }catch(err){ console.error(err); document.getElementById("investmentList").textContent="Failed to load.";}
}

function renderInvestments(investments){
  const container = document.getElementById("investmentList");
  container.innerHTML = "";
  if(Object.keys(investments).length===0){ container.textContent="No active investments."; return; }
  for(const [commodity, inv] of Object.entries(investments)){
    const div = document.createElement("div");
    div.className = "investment-item";
    div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${inv.time_remaining || 'N/A'}`;
    container.appendChild(div);
  }
}

// ===== INVESTMENT FLOW =====
async function investRequest(){
  const commodity = document.getElementById("commoditySelect").value;
  if(!commodity) return alert("Select a commodity.");

  try{
    const res = await fetch(`${baseURL}/invest/request`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({username, commodity})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Investment request failed");

    document.getElementById("investOtpSection").style.display = "block";
    document.getElementById("investOtpDisplay").textContent = `Test OTP (mock): ${data.otp || 'see backend logs'}`;
  }catch(err){ alert(err.message);}
}

async function investConfirm(){
  const otp = document.getElementById("investOtpInput").value.trim();
  if(!otp) return alert("Enter OTP");

  try{
    const res = await fetch(`${baseURL}/invest/confirm`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({username, otp})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Investment confirmation failed");

    alert(data.message);
    document.getElementById("investOtpSection").style.display="none";
    document.getElementById("investOtpInput").value="";
    loadDashboard();
  }catch(err){ alert(err.message);}
}

// ===== WITHDRAWAL FLOW =====
async function withdrawRequest(){
  const amount = document.getElementById("withdrawAmount").value;
  if(!amount || amount<=0) return alert("Enter valid amount");

  try{
    const res = await fetch(`${baseURL}/withdraw/request`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({username, amount})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Withdrawal request failed");

    document.getElementById("withdrawOtpSection").style.display = "block";
    document.getElementById("withdrawOtpDisplay").textContent = `Test OTP (mock): ${data.otp || 'see backend logs'}`;
  }catch(err){ alert(err.message);}
}

async function withdrawConfirm(){
  const otp = document.getElementById("withdrawOtpInput").value.trim();
  if(!otp) return alert("Enter OTP");

  try{
    const res = await fetch(`${baseURL}/withdraw/confirm`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({username, otp})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Withdrawal confirmation failed");

    alert(data.message);
    document.getElementById("withdrawOtpSection").style.display="none";
    document.getElementById("withdrawOtpInput").value="";
    loadDashboard();
  }catch(err){ alert(err.message);}
}

// ===== LOGOUT =====
function logout(){ localStorage.removeItem("username"); window.location.href="login.html"; }

loadDashboard();
</script>

</body>
</html>
