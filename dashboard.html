<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";
const MPESA_NUMBER = "0752964507";

let selectedCommodity = null;

document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('access_token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  // Wake backend (Render cold-start)
  fetch(`${BACKEND_URL}/health`).catch(()=>{});

  renderCommodityCards();
  fetchUserData();
});

function logout(){
  localStorage.removeItem('access_token');
  localStorage.removeItem('username');
  window.location.href='login.html';
}

async function fetchUserData(){
  const msg = document.getElementById('msg');
  msg.className = "msg loading";
  msg.textContent = "Loading dashboard...";

  const token = localStorage.getItem('access_token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/dashboard`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Failed to load');

    document.getElementById('balance').textContent = `KES ${Number(data.balance||0).toFixed(2)}`;
    document.getElementById('earnings').textContent = `KES ${Number(data.earnings||0).toFixed(2)}`;

    // compute total invested from investments map returned by backend
    let investedTotal = 0;
    if (data.investments && typeof data.investments === 'object') {
      Object.values(data.investments).forEach(inv => {
        if (inv && inv.amount) investedTotal += Number(inv.amount) || 0;
      });
    }
    document.getElementById('invested').textContent = `KES ${investedTotal.toFixed(2)}`;

    msg.className = "msg success";
    msg.textContent = "Dashboard loaded";
  } catch (err) {
    console.error(err);
    msg.className = "msg error";
    msg.textContent = "Failed to load dashboard";
    // If unauthorized, redirect to login
    if (err.message && (err.message.toLowerCase().includes('token') || err.message.toLowerCase().includes('unauthorized'))) {
      localStorage.removeItem('access_token');
      setTimeout(()=> window.location.href='login.html', 800);
    }
  }
}

function renderCommodityCards(){
  const grid = document.getElementById("commodityGrid");

  const commodities = {
    marble:650, crude_oil:800, silver:1000, lead:1200,
    platinum:1350, diamonds:1750, gold:2200, uranium:3000
  };

  grid.innerHTML = "";

  Object.entries(commodities).forEach(([key,price])=>{
    const card = document.createElement("div");
    card.className = "commodity-card";

    card.innerHTML = `<h4 style="text-transform:capitalize">${key.replace('_',' ')}</h4><p>KES ${price}</p>`;

    card.onclick = () => {
      selectedCommodity = key;
      document.getElementById("selectedCommodity").textContent = key;
      document.getElementById("investBtn").disabled = false;

      document.querySelectorAll(".commodity-card").forEach(c=>c.classList.remove("selected"));
      card.classList.add("selected");
    };

    grid.appendChild(card);
  });
}

async function requestInvestment(){
  if(!selectedCommodity) return;

  const token = localStorage.getItem('access_token');
  if (!token) {
    alert('Please login again');
    window.location.href='login.html';
    return;
  }

  const investBtn = document.getElementById('investBtn');
  investBtn.disabled = true;

  try {
    // 1) Ask backend for price / instructions
    const res1 = await fetch(`${BACKEND_URL}/invest/request`, {
      method: "POST",
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ commodity: selectedCommodity })
    });
    const data1 = await res1.json();

    if (!res1.ok) {
      alert(data1.detail || 'Failed to request investment');
      investBtn.disabled = false;
      return;
    }

    alert(`Send payment to ${MPESA_NUMBER}. Amount: KES ${data1.price}`);

    // After user pays, confirm with backend to finalize investment.
    // Replace the confirm() with a better UI/modal if desired.
    const confirmed = confirm('Have you completed the M-Pesa payment? Press OK to confirm and finalize the investment.');
    if (!confirmed) {
      investBtn.disabled = false;
      return;
    }

    // 2) Confirm investment with backend
    const res2 = await fetch(`${BACKEND_URL}/invest/confirm`, {
      method: "POST",
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ commodity: selectedCommodity })
    });
    const data2 = await res2.json();

    if (!res2.ok) {
      alert(data2.detail || 'Failed to confirm investment');
      investBtn.disabled = false;
      return;
    }

    alert(data2.message || 'Investment confirmed');
    await fetchUserData();
  } catch (err) {
    console.error(err);
    alert('Server error');
  } finally {
    investBtn.disabled = false;
  }
}
</script>
