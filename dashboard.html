<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Mkoba Wallet</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
  color: #333;
}

header {
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
}

main { padding: 20px; }

.card {
  background: #ffffffee;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card h3 { margin-top: 0; }

#commodityGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
}

.commodity-card {
  background: #e3f2fd;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.commodity-card:hover {
  background: #2196f3;
  color: white;
}

.selected {
  background: #0d47a1 !important;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

button:disabled { background: gray; }

.msg { margin-top: 10px; }
.success { color: green; }
.error { color: red; }
.loading { color: orange; }
</style>
</head>

<body>

<header>
  <h3>Welcome, <span id="usernameDisplay"></span></h3>
  <button onclick="logout()">Logout</button>
</header>

<main>

<div id="msg" class="msg"></div>

<div class="card">
  <h3>Account</h3>
  <p>Balance: <span id="balance">KES 0</span></p>
  <p>Earnings: <span id="earnings">KES 0</span></p>
  <p>Invested: <span id="invested">KES 0</span></p>
  <p>Referral Bonus: <span id="referralBonus">KES 0</span></p>
  <div id="investmentsList"></div>
</div>

<div class="card">
  <h3>Daily Bonus</h3>
  <p id="nextDaily">Checking...</p>
  <button id="dailyBtn">Claim Daily Bonus</button>
</div>

<div class="card">
  <h3>Referral</h3>
  <p id="refLink"></p>
  <button onclick="copyRef()">Copy Link</button>
</div>

<div class="card">
  <h3>Invest</h3>
  <div id="commodityGrid"></div>
  <p>Selected: <span id="selected">None</span></p>
  <button id="investBtn" disabled>Invest</button>
</div>

</main>

<script>
const API = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

const COMMODITIES = {
  marble:{price:650,days:15},
  gold:{price:2200,days:35},
  silver:{price:1000,days:23},
  uranium:{price:3000,days:45}
};

let selected = null;

document.addEventListener("DOMContentLoaded", ()=>{
  const username = localStorage.getItem("username");
  const token = localStorage.getItem("access_token");

  if(!username || !token){
    window.location.href="login.html";
    return;
  }

  document.getElementById("usernameDisplay").textContent=username;
  document.getElementById("refLink").textContent=`https://mkobawallet.com/signup?ref=${username}`;

  renderCommodities();
  loadDashboard();
  checkDaily();
});

function logout(){
  localStorage.clear();
  location.href="login.html";
}

function msg(type,text){
  const el=document.getElementById("msg");
  el.className="msg "+type;
  el.textContent=text;
}

async function loadDashboard(){
  msg("loading","Loading...");
  try{
    const res=await fetch(API+"/dashboard",{
      headers:{Authorization:`Bearer ${localStorage.getItem("access_token")}`}
    });

    const data=await res.json();

    if(!res.ok) throw new Error(data.detail||"Error");

    document.getElementById("balance").textContent=`KES ${data.balance.toFixed(2)}`;
    document.getElementById("earnings").textContent=`KES ${data.earnings.toFixed(2)}`;
    document.getElementById("referralBonus").textContent=`KES ${data.referral_bonus_earned.toFixed(2)}`;

    let total=0;
    const list=document.getElementById("investmentsList");
    list.innerHTML="";

    if(data.investments){
      Object.entries(data.investments).forEach(([k,v])=>{
        total+=v.amount;

        const div=document.createElement("div");
        div.textContent=`${k.toUpperCase()} | KES ${v.amount} | ${v.days_remaining} days | KES ${v.daily_earning}/day`;

        list.appendChild(div);
      });
    }

    document.getElementById("invested").textContent=`KES ${total.toFixed(2)}`;

    msg("success","Loaded");

  }catch(e){
    msg("error","Failed to load");
  }
}

function renderCommodities(){
  const grid=document.getElementById("commodityGrid");

  Object.entries(COMMODITIES).forEach(([k,v])=>{
    const div=document.createElement("div");
    div.className="commodity-card";
    div.textContent=`${k.toUpperCase()} - ${v.price}`;

    div.onclick=()=>{
      selected=k;
      document.getElementById("selected").textContent=k;
      document.querySelectorAll(".commodity-card").forEach(c=>c.classList.remove("selected"));
      div.classList.add("selected");
      document.getElementById("investBtn").disabled=false;
    };

    grid.appendChild(div);
  });

  document.getElementById("investBtn").onclick=invest;
}

async function invest(){
  if(!selected) return;

  try{
    const res=await fetch(API+"/invest/request",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${localStorage.getItem("access_token")}`
      },
      body:JSON.stringify({commodity:selected})
    });

    const data=await res.json();

    if(!res.ok) throw new Error(data.message);

    alert(`Pay KES ${data.price}`);
    loadDashboard();

  }catch(e){
    alert("Error investing");
  }
}

async function checkDaily(){
  document.getElementById("nextDaily").textContent="Ready to claim";
}

document.getElementById("dailyBtn").onclick=async ()=>{
  try{
    const res=await fetch(API+"/daily/claim",{
      method:"POST",
      headers:{Authorization:`Bearer ${localStorage.getItem("access_token")}`}
    });

    const data=await res.json();

    if(!res.ok) throw new Error(data.detail||data.message);

    alert(`You got KES ${data.amount}`);
    loadDashboard();

  }catch(e){
    alert(e.message);
  }
};

function copyRef(){
  navigator.clipboard.writeText(document.getElementById("refLink").textContent);
  alert("Copied");
}
</script>

</body>
</html>
