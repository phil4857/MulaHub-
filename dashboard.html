<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mkoba Wallet Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background:#f4fff7; margin:0; padding:0; }
header { background:#28a745; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.container { max-width:900px; margin:20px auto; padding:20px; background:white; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2 { color:#28a745; border-bottom:2px solid #eee; padding-bottom:5px; }
.info { margin-bottom:15px; padding:15px; background:#f0f8f0; border-left:5px solid #28a745; }
.form-section { margin-top:20px; background:#fafafa; padding:15px; border-radius:8px; border:1px solid #ddd; }
input, select { padding:8px; margin:5px 0; width:90%; border:1px solid #ccc; border-radius:5px; }
.actions { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; }
button { padding:10px 15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; transition:0.3s;}
.invest-btn { background:#28a745; color:white; }
.withdraw-btn { background:#007bff; color:white; }
.otp-btn { background:#ff9800; color:white; }
.logout-btn { background:#dc3545; color:white; }
button:hover { opacity:0.85; }
.investment-list { margin-top:10px; padding:10px; background:#f0f8f0; border-radius:5px; }
.investment-item { margin-bottom:5px; }
</style>
</head>
<body>

<header>💵 Mkoba Wallet - Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
  </div>

  <!-- Investments Section -->
  <div class="form-section">
    <h3>💰 Make Investment</h3>
    <select id="commodity">
      <option value="silver">Silver (KES 550)</option>
      <option value="gold">Gold (KES 2050)</option>
      <option value="marble">Marble (KES 650)</option>
      <option value="diamond">Diamond (KES 1850)</option>
      <option value="uranium">Uranium (KES 1250)</option>
    </select>
    <button class="invest-btn" onclick="investRequest()">Invest</button>
    <div id="investOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="investOtp" placeholder="Enter OTP">
      <button class="otp-btn" onclick="investConfirm()">Confirm Investment</button>
    </div>
  </div>

  <!-- Withdrawals Section -->
  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount">
    <button class="withdraw-btn" onclick="withdrawRequest()">Request Withdrawal</button>
    <div id="withdrawOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="withdrawOtp" placeholder="Enter OTP">
      <button class="otp-btn" onclick="withdrawConfirm()">Confirm Withdrawal</button>
    </div>
  </div>

  <!-- Investments Display -->
  <div class="form-section">
    <h3>📈 Your Investments</h3>
    <div id="investmentList" class="investment-list">Loading...</div>
  </div>

  <div class="actions">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
const username = localStorage.getItem("username");
if(!username){ alert("Please log in first."); window.location.href="login.html"; }
document.getElementById("usernameDisplay").textContent = username;

let investmentsData = {};

async function loadDashboard() {
  try {
    const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/dashboard?username=${username}`);
    if(!res.ok) throw new Error("Failed to fetch dashboard");
    const data = await res.json();
    document.getElementById("balanceDisplay").textContent = parseFloat(data.balance||0).toFixed(2);
    investmentsData = data.investments || {};
    renderInvestments();
  } catch(err) { alert("Dashboard error: "+err.message); }
}

function renderInvestments(){
  const container = document.getElementById("investmentList");
  container.innerHTML = "";
  if(Object.keys(investmentsData).length===0){ container.textContent="No active investments."; return; }
  for(const [commodity, inv] of Object.entries(investmentsData)){
    const div = document.createElement("div");
    div.className = "investment-item";
    div.id = `invest-${commodity}`;
    div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${inv.time_remaining}`;
    container.appendChild(div);
  }
}

// Investment flow
async function investRequest(){
  const commodity = document.getElementById("commodity").value;
  const formData = new URLSearchParams();
  formData.append("username", username);
  formData.append("commodity", commodity);
  try{
    const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/invest/request", {method:"POST", body:formData});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail);
    alert(data.message + " Enter OTP to confirm.");
    document.getElementById("investOtpSection").style.display = "block";
  }catch(err){ alert("Investment request failed: "+err.message); }
}

async function investConfirm(){
  const otp = document.getElementById("investOtp").value;
  if(!otp) return alert("Enter OTP");
  const formData = new URLSearchParams();
  formData.append("username", username);
  formData.append("otp", otp);
  try{
    const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/invest/confirm", {method:"POST", body:formData});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail);
    alert(data.message);
    document.getElementById("investOtpSection").style.display = "none";
    document.getElementById("investOtp").value = "";
    loadDashboard();
  }catch(err){ alert("Investment confirmation failed: "+err.message); }
}

// Withdrawal flow
async function withdrawRequest(){
  const amount = document.getElementById("withdrawAmount").value;
  if(!amount || amount<=0) return alert("Enter valid amount.");
  const formData = new URLSearchParams();
  formData.append("username", username);
  formData.append("amount", amount);
  try{
    const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw/request", {method:"POST", body:formData});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail);
    alert(data.message + " Enter OTP to confirm.");
    document.getElementById("withdrawOtpSection").style.display = "block";
  }catch(err){ alert("Withdrawal request failed: "+err.message); }
}

async function withdrawConfirm(){
  const otp = document.getElementById("withdrawOtp").value;
  if(!otp) return alert("Enter OTP");
  const formData = new URLSearchParams();
  formData.append("username", username);
  formData.append("otp", otp);
  try{
    const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw/confirm", {method:"POST", body:formData});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail);
    alert(data.message);
    document.getElementById("withdrawOtpSection").style.display = "none";
    document.getElementById("withdrawOtp").value = "";
    loadDashboard();
  }catch(err){ alert("Withdrawal confirmation failed: "+err.message); }
}

// Logout
function logout(){ localStorage.removeItem("username"); window.location.href="login.html"; }

// Countdown updater every second
setInterval(()=>{
  for(const [commodity, inv] of Object.entries(investmentsData)){
    const div = document.getElementById(`invest-${commodity}`);
    if(!div) continue;
    const expiry = new Date(inv.expiry_date);
    const now = new Date();
    const diff = expiry - now;
    if(diff>0){
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${h}h ${m}m ${s}s`;
    }else{
      div.textContent = `${commodity}: KES ${inv.amount} | Expired`;
    }
  }
},1000);

loadDashboard();
</script>
</body>
</html>
