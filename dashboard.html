<script>
document.addEventListener("DOMContentLoaded", () => {

  const username = localStorage.getItem("username");
  if (!username) {
    window.location.href = "login.html";
    return;
  }

  const users = JSON.parse(localStorage.getItem("users") || "{}");
  const user = users[username];

  if (!user) {
    localStorage.removeItem("username");
    window.location.href = "login.html";
    return;
  }

  document.getElementById("usernameDisplay").textContent = username;

  function updateUI() {
    document.getElementById("balanceDisplay").textContent = user.balance.toFixed(2);
    document.getElementById("earningsDisplay").textContent = user.earnings.toFixed(2);
    renderInvestments();
  }

  function renderInvestments() {
    const container = document.getElementById("investmentList");
    container.innerHTML = "";

    if (!user.investments || Object.keys(user.investments).length === 0) {
      container.textContent = "No active investments.";
      return;
    }

    for (const [commodity, inv] of Object.entries(user.investments)) {
      const div = document.createElement("div");
      div.className = "investment-item";
      div.textContent = `${commodity}: KES ${inv.amount}`;
      container.appendChild(div);
    }
  }

  // ===== INVEST =====
  window.investRequest = function () {
    const commodity = document.getElementById("commoditySelect").value;
    if (!commodity) return alert("Select a commodity.");

    const fakeOTP = Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem("investOTP", fakeOTP);
    localStorage.setItem("pendingCommodity", commodity);

    document.getElementById("investOtpSection").style.display = "block";
    document.getElementById("investOtpDisplay").textContent = "OTP: " + fakeOTP;
  };

  window.investConfirm = function () {
    const otp = document.getElementById("investOtpInput").value.trim();
    const savedOTP = localStorage.getItem("investOTP");
    const commodity = localStorage.getItem("pendingCommodity");

    if (!otp) return alert("Enter OTP");
    if (otp !== savedOTP) return alert("Incorrect OTP");

    const amount = 1000;

    if (user.balance < amount) {
      alert("Insufficient balance");
      return;
    }

    user.balance -= amount;
    user.earnings += 200;

    if (!user.investments) user.investments = {};
    user.investments[commodity] = { amount };

    users[username] = user;
    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("investOtpSection").style.display = "none";
    document.getElementById("investOtpInput").value = "";

    localStorage.removeItem("investOTP");
    localStorage.removeItem("pendingCommodity");

    updateUI();
  };

  // ===== WITHDRAW =====
  window.withdrawRequest = function () {
    const amount = parseFloat(document.getElementById("withdrawAmount").value);
    if (!amount || amount <= 0) return alert("Enter valid amount");

    const fakeOTP = Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem("withdrawOTP", fakeOTP);
    localStorage.setItem("pendingWithdrawAmount", amount);

    document.getElementById("withdrawOtpSection").style.display = "block";
    document.getElementById("withdrawOtpDisplay").textContent = "OTP: " + fakeOTP;
  };

  window.withdrawConfirm = function () {
    const otp = document.getElementById("withdrawOtpInput").value.trim();
    const savedOTP = localStorage.getItem("withdrawOTP");
    const amount = parseFloat(localStorage.getItem("pendingWithdrawAmount"));

    if (!otp) return alert("Enter OTP");
    if (otp !== savedOTP) return alert("Incorrect OTP");

    if (user.balance < amount) {
      alert("Insufficient balance");
      return;
    }

    user.balance -= amount;

    users[username] = user;
    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("withdrawOtpSection").style.display = "none";
    document.getElementById("withdrawOtpInput").value = "";

    localStorage.removeItem("withdrawOTP");
    localStorage.removeItem("pendingWithdrawAmount");

    updateUI();
  };

  window.logout = function () {
    localStorage.removeItem("username");
    window.location.href = "login.html";
  };

  updateUI();
});
</script>
