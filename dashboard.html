<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mkoba Wallet Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background:#f4fff7; margin:0; padding:0; }
header { background:#28a745; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.container { max-width:900px; margin:20px auto; padding:20px; background:white; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2 { color:#28a745; border-bottom:2px solid #eee; padding-bottom:5px; }
.info { margin-bottom:15px; padding:15px; background:#f0f8f0; border-left:5px solid #28a745; }
.form-section { margin-top:20px; background:#fafafa; padding:15px; border-radius:8px; border:1px solid #ddd; }
input, select { padding:8px; margin:5px 0; width:90%; border:1px solid #ccc; border-radius:5px; }
.actions { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; }
button { padding:10px 15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; transition:0.3s;}
.invest-btn { background:#28a745; color:white; }
.withdraw-btn { background:#007bff; color:white; }
.otp-btn { background:#ff9800; color:white; }
.logout-btn { background:#dc3545; color:white; }
button:hover { opacity:0.85; }
.investment-list { margin-top:10px; padding:10px; background:#f0f8f0; border-radius:5px; }
.investment-item { margin-bottom:5px; }
</style>
</head>
<body>

<header>💵 Mkoba Wallet - Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
  </div>

  <!-- Investments Section -->
  <div class="form-section">
    <h3>💰 Make Investment</h3>
    <select id="commodity">
      <option value="silver">Silver (KES 550)</option>
      <option value="gold">Gold (KES 2050)</option>
      <option value="marble">Marble (KES 650)</option>
      <option value="diamond">Diamond (KES 1850)</option>
      <option value="uranium">Uranium (KES 1250)</option>
    </select>
    <button class="invest-btn" onclick="investRequest()">Invest</button>
    <div id="investOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="investOtp" placeholder="Enter OTP">
      <button class="otp-btn" onclick="investConfirm()">Confirm Investment</button>
    </div>
  </div>

  <!-- Withdrawals Section -->
  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount">
    <button class="withdraw-btn" onclick="withdrawRequest()">Request Withdrawal</button>
    <div id="withdrawOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="withdrawOtp" placeholder="Enter OTP">
      <button class="otp-btn" onclick="withdrawConfirm()">Confirm Withdrawal</button>
    </div>
  </div>

  <!-- Investments Display -->
  <div class="form-section">
    <h3>📈 Your Investments</h3>
    <div id="investmentList" class="investment-list">Loading...</div>
  </div>

  <div class="actions">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
// ===== USER SETUP =====
const username = localStorage.getItem("username");
if(!username){ alert("Please log in first."); window.location.href="login.html"; }
document.getElementById("usernameDisplay").textContent = username;

function getUser() {
  const users = JSON.parse(localStorage.getItem("users") || "{}");
  return users[username];
}
function saveUser(user) {
  const users = JSON.parse(localStorage.getItem("users") || "{}");
  users[username] = user;
  localStorage.setItem("users", JSON.stringify(users));
}

// ===== DASHBOARD =====
function loadDashboard() {
  const user = getUser();
  if(!user) return;
  document.getElementById("balanceDisplay").textContent = (user.balance||0).toFixed(2);
  renderInvestments(user.investments||{});
}

function renderInvestments(investments){
  const container = document.getElementById("investmentList");
  container.innerHTML = "";
  if(Object.keys(investments).length===0){ container.textContent="No active investments."; return; }
  for(const [commodity, inv] of Object.entries(investments)){
    const div = document.createElement("div");
    div.className = "investment-item";
    div.id = `invest-${commodity}`;
    div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${inv.time_remaining || 'N/A'}`;
    container.appendChild(div);
  }
}

// ===== INVESTMENT FLOW =====
let investOTP = null;

function investRequest(){
  const commodity = document.getElementById("commodity").value;
  investOTP = Math.floor(1000+Math.random()*9000).toString();
  console.log("Investment OTP:", investOTP);
  alert("OTP sent! (check console in test mode)");
  document.getElementById("investOtpSection").style.display = "block";

  const user = getUser();
  user.pendingInvestment = commodity;
  saveUser(user);
}

function investConfirm(){
  const otp = document.getElementById("investOtp").value.trim();
  if(otp !== investOTP) return alert("Incorrect OTP");
  const user = getUser();
  const commodity = user.pendingInvestment;
  if(!commodity) return alert("No investment requested.");

  const amountMap = {silver:550,gold:2050,marble:650,diamond:1850,uranium:1250};
  const amt = amountMap[commodity];
  user.balance = (user.balance||0) - amt;
  user.investments = user.investments||{};
  user.investments[commodity] = {amount: amt, time_remaining: "7d"};
  delete user.pendingInvestment;
  saveUser(user);

  alert("Investment successful!");
  document.getElementById("investOtpSection").style.display = "none";
  document.getElementById("investOtp").value = "";
  loadDashboard();
}

// ===== WITHDRAWAL FLOW =====
let withdrawOTP = null;

function withdrawRequest(){
  const user = getUser();
  const amount = parseFloat(document.getElementById("withdrawAmount").value);
  if(isNaN(amount)||amount<=0) return alert("Enter valid amount");

  const today = new Date();
  if(today.getDay()!==1) return alert("Withdrawals only allowed on Mondays");

  const minAllowed = Math.floor((user.investment_amount||0)*0.3);
  const maxAllowed = user.balance||0;

  if(amount<minAllowed) return alert(`Minimum withdrawal: KES ${minAllowed}`);
  if(amount>maxAllowed) return alert(`Maximum withdrawal: KES ${maxAllowed}`);

  withdrawOTP = Math.floor(1000+Math.random()*9000).toString();
  console.log("Withdrawal OTP:", withdrawOTP);
  alert("OTP sent! (check console in test mode)");

  user.pendingWithdrawal = amount;
  saveUser(user);
  document.getElementById("withdrawOtpSection").style.display = "block";
}

function withdrawConfirm(){
  const otp = document.getElementById("withdrawOtp").value.trim();
  if(otp!==withdrawOTP) return alert("Incorrect OTP");

  const user = getUser();
  user.balance -= user.pendingWithdrawal;
  delete user.pendingWithdrawal;
  saveUser(user);

  alert("Withdrawal successful! Funds sent to MPESA.");
  document.getElementById("withdrawOtpSection").style.display = "none";
  document.getElementById("withdrawOtp").value = "";
  loadDashboard();
}

// ===== LOGOUT =====
function logout(){ localStorage.removeItem("username"); window.location.href="login.html"; }

loadDashboard();
</script>

</body>
</html>
