<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .user-card {
      background-color: #eef2f5;
      border-radius: 10px;
      padding: 15px;
      margin: 10px 0;
    }
    .user-card h4 {
      margin: 0 0 5px;
      color: #007bff;
    }
    .approve-btn, .reset-btn, #logoutBtn {
      margin-top: 10px;
      margin-right: 5px;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
    }
    .approve-btn {
      background-color: #007bff;
      color: white;
    }
    .approve-btn:hover {
      background-color: #0056b3;
    }
    .reset-btn {
      background-color: #dc3545;
      color: white;
    }
    .reset-btn:hover {
      background-color: #c82333;
    }
    #logoutBtn {
      background-color: #6c757d;
      color: white;
    }
    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
    input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    #userCount {
      margin: 15px 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Admin Dashboard</h2>

    <div id="loginSection">
      <input type="text" id="username" placeholder="Admin Username" required />
      <input type="password" id="password" placeholder="Admin Password" required />
      <button onclick="adminLogin()">Login</button>
      <div id="loginError" class="error-message"></div>
    </div>

    <div id="adminContent" style="display: none;">
      <button id="logoutBtn" onclick="logout()">Logout</button>
      <h3>Total Users: <span id="userCount">0</span></h3>
      <div id="userList">Loading users...</div>
    </div>
  </div>

  <script>
    const API = "https://repo-1red-jipate-bonus.onrender.com";
    let authToken = "";

    function logout() {
      localStorage.removeItem("adminToken");
      location.reload();
    }

    async function adminLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("loginError");
      errorDiv.textContent = "";

      if (!username || !password) {
        errorDiv.textContent = "Username and password are required.";
        return;
      }

      try {
        const res = await fetch(`${API}/admin/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || data.message || "Login failed");
        }

        if (!data.is_admin || !data.token) {
          throw new Error("Access denied or invalid credentials.");
        }

        authToken = data.token;
        localStorage.setItem("adminToken", authToken);
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        fetchUsers();

      } catch (err) {
        errorDiv.textContent = err.message;
      }
    }

    async function fetchUsers() {
      try {
        const res = await fetch(`${API}/admin/users`, {
          headers: {
            Authorization: `Bearer ${authToken}`
          }
        });

        if (res.status === 401 || res.status === 403) {
          logout(); // Token invalid or expired
          return;
        }

        if (!res.ok) throw new Error("Failed to fetch users.");

        const users = await res.json();
        const list = document.getElementById("userList");
        const count = document.getElementById("userCount");

        list.innerHTML = "";
        count.textContent = users.length;

        if (users.length === 0) {
          list.innerHTML = "<p>No users available yet.</p>";
          return;
        }

        users.forEach(user => {
          const card = document.createElement("div");
          card.className = "user-card";

          const dateStr = user.registered_at ? new Date(user.registered_at).toLocaleString() : "Unknown";

          card.innerHTML = `
            <h4>${user.username || "Unknown"}</h4>
            <p><strong>Phone:</strong> ${user.number || "N/A"}</p>
            <p><strong>Referral:</strong> ${user.referral || "None"}</p>
            <p><strong>Approved:</strong> ${user.approved ? "✅" : "❌"}</p>
            <p><strong>Balance:</strong> KES ${user.balance || 0}</p>
            <p><strong>Registered:</strong> ${dateStr}</p>
            ${!user.approved ? `<button class="approve-btn" onclick="approveUser('${user.username}')">Approve</button>` : ""}
            <button class="reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
          `;
          list.appendChild(card);
        });

      } catch (err) {
        document.getElementById("userList").textContent = "❌ Could not load users.";
        console.error(err);
      }
    }

    async function approveUser(username) {
      try {
        const res = await fetch(`${API}/admin/approve-user`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${authToken}`
          },
          body: JSON.stringify({ target_username: username })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Approval failed");

        alert(`✅ ${username} approved.`);
        fetchUsers();
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    async function resetPassword(username) {
      const newPass = prompt(`Enter new password for ${username}:`);
      if (!newPass) return;

      try {
        const res = await fetch(`${API}/admin/reset-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${authToken}`
          },
          body: JSON.stringify({ target_username: username, new_password: newPass })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Password reset failed");

        alert(`🔐 Password for '${username}' reset successfully.`);
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const stored = localStorage.getItem("adminToken");
      if (stored) {
        authToken = stored;
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        fetchUsers();
      }
    });
  </script>
</body>
</html>
