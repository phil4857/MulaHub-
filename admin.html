<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <style>
    .user-card {
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      margin: 10px 0;
    }
    .user-card h4 {
      margin: 0;
      color: #007bff;
    }
    .error-message {
      color: red;
      font-size: 14px;
    }
    .reset-btn {
      margin-top: 10px;
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
    .reset-btn:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Admin Dashboard</h2>

    <div id="loginSection">
      <input type="text" id="username" placeholder="Admin Username" required />
      <input type="password" id="password" placeholder="Admin Password" required />
      <button onclick="adminLogin()">Login</button>
      <div id="loginError" class="error-message"></div>
    </div>

    <div id="adminContent" style="display: none;">
      <h3>Registered Users</h3>
      <div id="userList">Loading users...</div>
    </div>
  </div>

  <script>
    async function adminLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("loginError");

      errorDiv.textContent = "";

      try {
        const response = await fetch("https://repo-1red-jipate-bonus.onrender.com/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.detail || "Login failed");

        if (!data.is_admin) throw new Error("Access denied. Not an admin.");

        localStorage.setItem("adminAuth", "true");
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminContent").style.display = "block";

        fetchUsers();

      } catch (err) {
        errorDiv.textContent = err.message;
      }
    }

    async function fetchUsers() {
      try {
        const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/users");
        const users = await res.json();

        const list = document.getElementById("userList");
        list.innerHTML = "";

        if (Array.isArray(users) && users.length > 0) {
          users.forEach(user => {
            const userCard = document.createElement("div");
            userCard.className = "user-card";
            userCard.innerHTML = `
              <h4>${user.username}</h4>
              <p><strong>Phone:</strong> ${user.number}</p>
              <p><strong>Referral:</strong> ${user.referral || "None"}</p>
              <p><strong>Approved:</strong> ${user.approved ? "✅" : "❌"}</p>
              <p><strong>Balance:</strong> KES ${user.balance}</p>
              <p><strong>Registered:</strong> ${new Date(user.registered_at).toLocaleString()}</p>
              <button class="reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
            `;
            list.appendChild(userCard);
          });
        } else {
          list.textContent = "No users found.";
        }
      } catch (err) {
        document.getElementById("userList").textContent = "Failed to load users.";
        console.error("Fetch users failed:", err);
      }
    }

    async function resetPassword(username) {
      const newPass = prompt(`Enter new password for ${username}:`);
      if (!newPass) return;

      try {
        const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/users/${encodeURIComponent(username)}/reset-password?new_password=${encodeURIComponent(newPass)}`, {
          method: "PATCH"
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Failed to reset password");

        alert(`Password for '${username}' was reset successfully.`);
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("adminAuth") === "true") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        fetchUsers();
      }
    });
  </script>
</body>
</html>
