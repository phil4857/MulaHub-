<!-- Inside the <script> section -->
<script>
  let currentAdmin = {};

  async function adminLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("loginError");

    errorDiv.textContent = "";

    try {
      const response = await fetch("https://repo-1red-jipate-bonus.onrender.com/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (!response.ok) throw new Error(data.detail || "Login failed");
      if (!data.is_admin) throw new Error("Access denied. Not an admin.");

      currentAdmin = { username, password };
      localStorage.setItem("adminAuth", "true");

      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();

    } catch (err) {
      errorDiv.textContent = err.message;
    }
  }

  async function fetchUsers() {
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/users");
      const users = await res.json();

      const list = document.getElementById("userList");
      const count = document.getElementById("userCount");

      list.innerHTML = "";
      count.textContent = users.length;

      if (Array.isArray(users) && users.length > 0) {
        users.forEach(user => {
          const userCard = document.createElement("div");
          userCard.className = "user-card";
          userCard.innerHTML = `
            <h4>${user.username}</h4>
            <p><strong>Phone:</strong> ${user.number}</p>
            <p><strong>Referral:</strong> ${user.referral || "None"}</p>
            <p><strong>Approved:</strong> ${user.approved ? "✅" : "❌"}</p>
            <p><strong>Balance:</strong> KES ${user.balance}</p>
            <p><strong>Registered:</strong> ${new Date(user.registered_at).toLocaleString()}</p>
            ${!user.approved ? `<button class="approve-btn" onclick="approveUser('${user.username}')">Approve</button>` : ""}
            <button class="reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
          `;
          list.appendChild(userCard);
        });
      } else {
        list.textContent = "No users found.";
      }
    } catch (err) {
      document.getElementById("userList").textContent = "Failed to load users.";
      console.error("Fetch users failed:", err);
    }
  }

  async function resetPassword(username) {
    const newPass = prompt(`Enter new password for ${username}:`);
    if (!newPass) return;

    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/admin/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          admin_username: currentAdmin.username,
          admin_password: currentAdmin.password,
          target_username: username,
          new_password: newPass
        })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || "Failed to reset password");

      alert(`Password for '${username}' was reset successfully.`);
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  // ✅ FIXED: use correct approve-user endpoint
  async function approveUser(username) {
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/admin/approve-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          admin_username: currentAdmin.username,
          admin_password: currentAdmin.password,
          target_username: username
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Approval failed");

      alert(`✅ ${username} approved.`);
      fetchUsers(); // Refresh list
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("adminAuth") === "true") {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();
    }
  });
</script>
