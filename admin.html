<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e6f0ff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #003366;
      margin-bottom: 20px;
    }

    #logoutBtn {
      float: right;
      margin-top: -50px;
      margin-right: 10px;
      background: #cc0000;
    }

    button {
      padding: 8px 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px 2px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .user-card {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      background-color: #f9f9f9;
    }

    .error-message {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-bottom: 10px;
    }

    #userData {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Admin Dashboard</h2>
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <div id="loginError" class="error-message"></div>
    <div id="userData">Loading users...</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem("adminToken");
      if (!token) {
        window.location.href = "login.html";
        return;
      }
      fetchUsers();
    });

    async function fetchUsers() {
      const token = localStorage.getItem("adminToken");
      try {
        const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/admin/users", {
          headers: { Authorization: `Bearer ${token}` }
        });

        const users = await res.json();
        if (!res.ok) throw new Error(users.detail || "Failed to fetch users");

        const userDataDiv = document.getElementById("userData");

        if (users.length === 0) {
          userDataDiv.innerHTML = "<p>No users found.</p>";
          return;
        }

        const output = users.map(user => {
          const approveBtn = !user.approved
            ? `<button onclick="approveUser('${user.username}')">Approve</button>`
            : '';

          const resetBtn = `<button onclick="resetPassword('${user.username}')">Reset Password</button>`;

          return `
            <div class="user-card">
              <strong>Username:</strong> ${user.username}<br>
              <strong>Phone:</strong> ${user.number || "N/A"}<br>
              <strong>Referral:</strong> ${user.referral || "None"}<br>
              <strong>Approved:</strong> ${user.approved ? '✅' : '❌'}<br>
              ${approveBtn} ${resetBtn}
            </div>
          `;
        }).join('');

        userDataDiv.innerHTML = output;
      } catch (err) {
        document.getElementById("loginError").textContent = err.message;
        document.getElementById("userData").innerHTML = "<p>❌ Failed to load users.</p>";
      }
    }

    async function approveUser(username) {
      const token = localStorage.getItem("adminToken");
      try {
        const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/admin/approve_user", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            Authorization: `Bearer ${token}`
          },
          body: new URLSearchParams({ username })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Approval failed");

        alert(data.message || `✅ ${username} approved`);
        fetchUsers();
      } catch (err) {
        alert("Approval error: " + err.message);
      }
    }

    async function resetPassword(username) {
      const token = localStorage.getItem("adminToken");
      const newPassword = prompt(`Enter new password for ${username}:`);
      if (!newPassword?.trim()) return;

      try {
        const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/admin/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            Authorization: `Bearer ${token}`
          },
          body: new URLSearchParams({
            target_username: username,
            new_password: newPassword
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Reset failed");

        alert("Password reset successfully.");
      } catch (err) {
        alert("Reset error: " + err.message);
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
