<script>
  const API = "https://repo-1red-jipate-bonus.onrender.com";
  let adminCredentials = {};

  function logout() {
    localStorage.removeItem("adminUser");
    localStorage.removeItem("adminPass");
    location.reload();
  }

  async function adminLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("loginError");
    errorDiv.textContent = "";

    if (!username || !password) {
      errorDiv.textContent = "Username and password are required.";
      return;
    }

    const form = new FormData();
    form.append("username", username);
    form.append("password", password);

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: "POST",
        body: form
      });

      const data = await res.json();

      if (!res.ok || !data.token) {
        const msg =
          typeof data.detail === "string"
            ? data.detail
            : typeof data.message === "string"
            ? data.message
            : "Access denied.";
        throw new Error(msg);
      }

      adminCredentials = { username, password };
      localStorage.setItem("adminUser", username);
      localStorage.setItem("adminPass", password);

      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();
    } catch (err) {
      errorDiv.textContent = err.message || "Login failed.";
    }
  }

  async function fetchUsers() {
    const form = new FormData();
    form.append("username", adminCredentials.username);
    form.append("password", adminCredentials.password);

    const list = document.getElementById("userList");
    const count = document.getElementById("userCount");

    try {
      const res = await fetch(`${API}/admin/users`, {
        method: "POST",
        body: form
      });

      const text = await res.text();
      let users;

      try {
        users = JSON.parse(text);
      } catch {
        throw new Error("Invalid response from server.");
      }

      if (!res.ok) {
        const msg = users?.detail || users?.message || text;
        throw new Error(msg);
      }

      list.innerHTML = "";
      count.textContent = users.length;

      if (users.length === 0) {
        list.innerHTML = "<p>No users available yet.</p>";
        return;
      }

      users.forEach(user => {
        const card = document.createElement("div");
        card.className = "user-card";

        const dateStr = user.registered_at
          ? new Date(user.registered_at).toLocaleString()
          : "Unknown";

        card.innerHTML = `
          <h4>${user.username || "Unknown"}</h4>
          <p><strong>Phone:</strong> ${user.number || "N/A"}</p>
          <p><strong>Referral:</strong> ${user.referral || "None"}</p>
          <p><strong>Approved:</strong> ${user.approved ? "✅" : "❌"}</p>
          <p><strong>Balance:</strong> KES ${user.balance || 0}</p>
          <p><strong>Registered:</strong> ${dateStr}</p>
          ${!user.approved
            ? `<button class="approve-btn" onclick="approveUser('${user.username}')">Approve</button>`
            : ""}
          <button class="reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
        `;
        list.appendChild(card);
      });
    } catch (err) {
      list.innerHTML = `<p class="error-message">❌ ${err.message}</p>`;
      console.error(err);
    }
  }

  async function approveUser(username) {
    const form = new FormData();
    form.append("username", username);
    form.append("admin_username", adminCredentials.username);
    form.append("admin_password", adminCredentials.password);

    try {
      const res = await fetch(`${API}/admin/approve_user`, {
        method: "POST",
        body: form
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.detail || data.message || JSON.stringify(data);
        throw new Error(msg);
      }

      alert(`✅ ${username} approved.`);
      fetchUsers();
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function resetPassword(username) {
    const newPass = prompt(`Enter new password for ${username}:`);
    if (!newPass) return;

    const form = new FormData();
    form.append("target_username", username);
    form.append("new_password", newPass);
    form.append("admin_username", adminCredentials.username);
    form.append("admin_password", adminCredentials.password);

    try {
      const res = await fetch(`${API}/admin/reset-password`, {
        method: "POST",
        body: form
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.detail || data.message || JSON.stringify(data);
        throw new Error(msg);
      }

      alert(`🔐 Password for '${username}' reset successfully.`);
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const storedUser = localStorage.getItem("adminUser");
    const storedPass = localStorage.getItem("adminPass");

    if (storedUser && storedPass) {
      adminCredentials = {
        username: storedUser,
        password: storedPass
      };
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();
    }
  });
</script>
