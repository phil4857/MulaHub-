<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Body and background */
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e54c8, #8f94fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* Login box */
  .box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
  }

  h2 {
    color: #4e54c8;
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background: #4e54c8;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .password-container {
    position: relative;
    margin: 15px 0;
  }

  .password-container input {
    padding-right: 40px;
  }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
  }

  #adminMsg {
    margin-top: 15px;
    padding: 10px;
    border-radius: 6px;
    font-weight: bold;
  }

  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  .loading { background: #e3f2fd; color: #1976d2; }
</style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>
  <div class="password-container">
    <input type="password" id="adminPassword" placeholder="Admin Password" autocomplete="current-password">
    <span class="toggle-password" id="togglePassword">👁️</span>
  </div>
  <button id="adminLoginBtn">Login</button>
  <div id="adminMsg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const passwordInput = document.getElementById("adminPassword");
  const togglePassword = document.getElementById("togglePassword");
  const loginBtn = document.getElementById("adminLoginBtn");
  const msg = document.getElementById("adminMsg");

  // Toggle password visibility
  togglePassword.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
  });

  // Show message helper
  function showMessage(type, text) {
    msg.className = "";
    if (type === "success") msg.classList.add("success");
    else if (type === "error") msg.classList.add("error");
    else if (type === "loading") msg.classList.add("loading");
    msg.textContent = text;
  }

  loginBtn.addEventListener("click", async () => {
    const password = passwordInput.value.trim();
    if (!password) {
      showMessage("error", "Please enter the admin password");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    showMessage("loading", "Verifying...");

    try {
      const formData = new URLSearchParams();
      formData.append("password", password);

      const res = await fetch(`${BACKEND_URL}/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
      });

      const data = await res.json();

      if (res.ok) {
        showMessage("success", "Admin login successful! Redirecting...");
        localStorage.setItem("adminLoggedIn", "true");
        setTimeout(() => window.location.href = "admin-dashboard.html", 1200);
      } else {
        showMessage("error", data.detail || "Invalid admin password");
      }
    } catch (err) {
      showMessage("error", "Cannot connect to server. Check internet.");
      console.error("Admin login error:", err);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
});
</script>

</body>
</html>
