<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Mkoba Wallet</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e6f0ff;
      margin: 0;
      padding: 0;
    }

    header {
      background: #003366;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .payment-info {
      background: #f0f8ff;
      color: #003366;
      text-align: center;
      padding: 10px;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #003366;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #003366;
      margin-bottom: 20px;
    }

    #logoutBtn {
      float: right;
      margin-top: -50px;
      margin-right: 10px;
      background: #cc0000;
    }

    button {
      padding: 6px 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 4px 2px;
      font-size: 14px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .user-card {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      background-color: #f9f9f9;
    }

    .error-message {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-bottom: 10px;
    }

    #userData {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Admin Dashboard - Mkoba Wallet</h1>
  </header>

  <div class="payment-info">
    💳 Pay Investment Fee To: <strong>MPESA 0739075065</strong>
  </div>

  <div class="container">
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <div id="loginError" class="error-message"></div>
    <div id="userData">Loading users...</div>
  </div>

  <script>
    const API_BASE = "https://repo-1red-jipate-bonus.onrender.com";

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem("adminToken");
      if (!token) {
        window.location.href = "login.html";
        return;
      }
      fetchUsers();
    });

    async function fetchUsers() {
      const token = localStorage.getItem("adminToken");
      try {
        const res = await fetch(`${API_BASE}/admin/users`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        const users = await res.json();
        if (!res.ok) throw new Error(users.detail || "Failed to fetch users");

        const userDataDiv = document.getElementById("userData");

        if (users.length === 0) {
          userDataDiv.innerHTML = "<p>No users found.</p>";
          return;
        }

        userDataDiv.innerHTML = users.map(user => {
          const approveUserBtn = !user.approved
            ? `<button onclick="approveUser('${user.username}')">Approve User</button>`
            : '';

          const approveInvestmentBtn = !user.investment_approved && user.total_invested > 0
            ? `<button onclick="approveInvestment('${user.username}')">Approve Investment</button>`
            : '';

          const approveWithdrawalBtn = `<button onclick="approveWithdrawal('${user.username}')">Approve Withdrawal</button>`;

          const resetBtn = `<button onclick="resetPassword('${user.username}')">Reset Password</button>`;

          return `
            <div class="user-card">
              <strong>Username:</strong> ${user.username}<br>
              <strong>Phone:</strong> ${user.number || "N/A"}<br>
              <strong>Referral:</strong> ${user.referral || "None"}<br>
              <strong>Approved:</strong> ${user.approved ? '✅' : '❌'}<br>
              <strong>Total Invested:</strong> KES ${user.total_invested || 0}<br>
              <strong>Investment Approved:</strong> ${user.investment_approved ? '✅' : '❌'}<br>
              <strong>Balance:</strong> KES ${(user.balance || 0).toFixed(2)}<br>
              <strong>Earnings:</strong> KES ${(user.earnings || 0).toFixed(2)}<br>
              ${approveUserBtn} ${approveInvestmentBtn} ${approveWithdrawalBtn} ${resetBtn}
            </div>
          `;
        }).join('');
      } catch (err) {
        document.getElementById("loginError").textContent = err.message;
        document.getElementById("userData").innerHTML = "<p>❌ Failed to load users.</p>";
      }
    }

    async function approveUser(username) {
      await postAdminAction("approve_user", { username }, `User ${username} approved`);
    }

    async function approveInvestment(username) {
      await postAdminAction("approve_investment", { username }, `Investment for ${username} approved`);
    }

    async function approveWithdrawal(username) {
      await postAdminAction("approve_withdrawal", { username }, `Withdrawal for ${username} approved`);
    }

    async function resetPassword(username) {
      const newPassword = prompt(`Enter new password for ${username}:`);
      if (!newPassword?.trim()) return;
      await postAdminAction("reset-password", { target_username: username, new_password: newPassword }, "Password reset successfully");
    }

    async function postAdminAction(endpoint, body, successMsg) {
      const token = localStorage.getItem("adminToken");
      try {
        const res = await fetch(`${API_BASE}/admin/${endpoint}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            Authorization: `Bearer ${token}`
          },
          body: new URLSearchParams(body)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Action failed");

        alert(data.message || successMsg);
        fetchUsers();
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
