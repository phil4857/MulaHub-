<script>
  const API = "https://repo-1red-jipate-bonus.onrender.com";
  let adminCredentials = {};

  function logout() {
    localStorage.removeItem("adminUser");
    localStorage.removeItem("adminPass");
    location.reload();
  }

  async function adminLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("loginError");
    errorDiv.textContent = "";

    if (!username || !password) {
      errorDiv.textContent = "Username and password are required.";
      return;
    }

    const form = new FormData();
    form.append("username", username);
    form.append("password", password);

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: "POST",
        body: form
      });

      const data = await res.json();
      if (!res.ok || !data.token) {
        throw new Error(data.detail || data.message || "Access denied.");
      }

      adminCredentials = { username, password };
      localStorage.setItem("adminUser", username);
      localStorage.setItem("adminPass", password);
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();

    } catch (err) {
      errorDiv.textContent = err.message || "Login failed.";
    }
  }

  async function fetchUsers() {
    const form = new FormData();
    form.append("username", adminCredentials.username);
    form.append("password", adminCredentials.password);

    try {
      const res = await fetch(`${API}/admin/users`, {
        method: "POST",
        body: form
      });

      const contentType = res.headers.get("content-type") || "";
      if (!res.ok || !contentType.includes("application/json")) {
        throw new Error("Failed to fetch users.");
      }

      const users = await res.json();
      const list = document.getElementById("userList");
      const count = document.getElementById("userCount");

      list.innerHTML = "";
      count.textContent = users.length;

      if (users.length === 0) {
        list.innerHTML = "<p>No users available yet.</p>";
        return;
      }

      users.forEach(user => {
        const card = document.createElement("div");
        card.className = "user-card";

        const dateStr = user.registered_at ? new Date(user.registered_at).toLocaleString() : "Unknown";

        card.innerHTML = `
          <h4>${user.username || "Unknown"}</h4>
          <p><strong>Phone:</strong> ${user.number || "N/A"}</p>
          <p><strong>Referral:</strong> ${user.referral || "None"}</p>
          <p><strong>Approved:</strong> ${user.approved ? "✅" : "❌"}</p>
          <p><strong>Balance:</strong> KES ${user.balance?.toFixed(2) || 0}</p>
          <p><strong>Earnings:</strong> KES ${user.earnings?.toFixed(2) || 0}</p>
          <p><strong>Referral Bonus:</strong> KES ${user.referral_bonus?.toFixed(2) || 0}</p>
          <p><strong>Investment:</strong> KES ${user.investment_amount || 0} (${user.investment_days || 0} days)</p>
          <p><strong>Investment Approved:</strong> ${user.investment_approved ? "✅" : "❌"}</p>
          <p><strong>Registered:</strong> ${dateStr}</p>
          ${!user.approved ? `<button class="approve-btn" onclick="approveUser('${user.username}')">Approve</button>` : ""}
          <button class="reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
        `;
        list.appendChild(card);
      });

    } catch (err) {
      document.getElementById("userList").innerHTML = `<p>❌ ${err.message}</p>`;
      console.error("Fetch users error:", err);
    }
  }

  async function approveUser(username) {
    const form = new FormData();
    form.append("username", username);

    try {
      const res = await fetch(`${API}/admin/approve_user`, {
        method: "POST",
        body: form
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.message || "Approval failed");

      alert(`✅ ${username} approved.`);
      fetchUsers();
    } catch (err) {
      alert("Error: " + (err.message || "Unknown error"));
    }
  }

  async function resetPassword(username) {
    const newPass = prompt(`Enter new password for ${username}:`);
    if (!newPass) return;

    const form = new FormData();
    form.append("target_username", username);
    form.append("new_password", newPass);

    try {
      const res = await fetch(`${API}/admin/reset-password`, {
        method: "POST",
        body: form
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.message || "Password reset failed");

      alert(`🔐 Password for '${username}' reset successfully.`);
    } catch (err) {
      alert("Error: " + (err.message || "Unknown error"));
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const storedUser = localStorage.getItem("adminUser");
    const storedPass = localStorage.getItem("adminPass");
    if (storedUser && storedPass) {
      adminCredentials = {
        username: storedUser,
        password: storedPass
      };
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      fetchUsers();
    }
  });
</script>
