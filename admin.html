<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Admin Panel</h2>

  <h3>Users</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Username</th>
        <th>Password Hash</th>
        <th>Balance</th>
        <th>Earnings</th>
        <th>Approved</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>

  <h3>Investments</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Username</th>
        <th>Amount</th>
        <th>Transaction Ref</th>
        <th>Approved</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="investList"></tbody>
  </table>

  <script src="admin.js"></script>
</body>
</html>
