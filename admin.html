<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - Jipate Bonus</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
      color: #3a2f0b;
      padding: 40px;
    }
    h1 {
      text-align: center;
      color: #a25c00;
    }
    .section {
      background: #fffdf7;
      padding: 20px;
      margin: 20px auto;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(160, 120, 0, 0.1);
      width: 90%;
      max-width: 600px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #a25c00;
      color: white;
      font-weight: bold;
    }
    pre {
      background: #f5f5dc;
      padding: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>

  <div class="section">
    <h3>Approve User</h3>
    <form id="approveUserForm">
      <input type="text" name="username" placeholder="Username to approve" required>
      <button type="submit">Approve</button>
    </form>
  </div>

  <div class="section">
    <h3>Approve Investment</h3>
    <form id="approveInvestmentForm">
      <input type="text" name="username" placeholder="Username to approve investment" required>
      <button type="submit">Approve</button>
    </form>
  </div>

  <div class="section">
    <h3>Reset Password</h3>
    <form id="resetPasswordForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="text" name="new_password" placeholder="New Password" required>
      <button type="submit">Reset</button>
    </form>
  </div>

  <div class="section">
    <h3>View Users</h3>
    <button onclick="loadUsers()">Load Users</button>
    <pre id="userList">Users will appear here...</pre>
  </div>

  <div class="section">
    <h3>View Investments</h3>
    <button onclick="loadInvestments()">Load Investments</button>
    <pre id="investmentList">Investments will appear here...</pre>
  </div>

  <script>
    const API = "https://repo-1red-jipate-bonus.onrender.com";

    document.getElementById("approveUserForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch(`${API}/admin/approve_user`, {
        method: "POST",
        body: form
      });
      const result = await res.json();
      alert(result.message || result.detail);
    });

    document.getElementById("approveInvestmentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch(`${API}/admin/approve_investment`, {
        method: "POST",
        body: form
      });
      const result = await res.json();
      alert(result.message || result.detail);
    });

    document.getElementById("resetPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch(`${API}/admin/reset_password`, {
        method: "POST",
        body: form
      });
      const result = await res.json();
      alert(result.message || result.detail);
    });

    async function loadUsers() {
      const res = await fetch(`${API}/admin/view_users`);
      const data = await res.json();
      document.getElementById("userList").textContent = JSON.stringify(data, null, 2);
    }

    async function loadInvestments() {
      const res = await fetch(`${API}/admin/view_investments`);
      const data = await res.json();
      document.getElementById("investmentList").textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
