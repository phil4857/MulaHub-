<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jipate Bonus Platform</title>
</head>
<body>
  <h1>Welcome to Jipate Bonus Investment</h1>

  <form id="registerForm">
    <h2>Register</h2>
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <input type="text" name="referral" placeholder="Referral (optional)" />
    <button type="submit">Register</button>
  </form>

  <form id="loginForm">
    <h2>Login</h2>
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <form id="investForm">
    <h2>Invest</h2>
    <input type="text" name="username" placeholder="Username" required />
    <input type="number" name="amount" placeholder="Amount" required />
    <input type="text" name="transaction_ref" placeholder="Transaction Ref" required />
    <button type="submit">Invest</button>
  </form>

  <form id="withdrawForm">
    <h2>Withdraw</h2>
    <input type="text" name="username" placeholder="Username" required />
    <input type="number" name="amount" placeholder="Amount" required />
    <button type="submit">Withdraw</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
