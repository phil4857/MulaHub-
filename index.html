<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jipate Bonus - Home</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f7ff;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #0055a5;
    }
    .form-box {
      background: #fff;
      padding: 25px;
      margin: 30px auto;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    button {
      background-color: #0055a5;
      color: white;
      font-weight: bold;
    }
    .note {
      font-size: 0.9em;
      color: #333;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h1>Jipate Bonus</h1>
  <div class="form-box">
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="text" name="referral" placeholder="Referral (optional)">
      <button type="submit">Register</button>
    </form>
  </div>

  <div class="form-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <div class="note">
    For help, contact admin on MPESA: <strong>0737734533</strong><br>
    Referral bonuses apply. Invest today!
  </div>

  <script>
    const API = "https://repo-1red-jipate-bonus.onrender.com";

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const response = await fetch(`${API}/register`, {
        method: "POST",
        body: form
      });

      const result = await response.json();
      alert(result.message || result.detail || "Error");

      if (response.ok) {
        location.href = `dashboard.html?user=${form.get("username")}`;
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const response = await fetch(`${API}/login`, {
        method: "POST",
        body: form
      });

      const result = await response.json();
      alert(result.message || result.detail || "Error");

      if (response.ok) {
        const username = form.get("username");
        if (username === "developer" || username === "adminuser") {
          location.href = `admin.html?user=${username}`;
        } else {
          location.href = `dashboard.html?user=${username}`;
        }
      }
    });
  </script>
</body>
</html>
