<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jipate Bonus</title>
  <script defer src="script.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Jipate Bonus Investment</h1>

  <section id="register">
    <h2>Register</h2>
    <form id="registerForm">
      <input name="username" placeholder="Username" required />
      <input name="password" type="password" placeholder="Password" required />
      <input name="referral" placeholder="Referral (optional)" />
      <button type="submit">Register</button>
    </form>
  </section>

  <section id="login">
    <h2>Login</h2>
    <form id="loginForm">
      <input name="username" placeholder="Username" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </section>

  <section id="invest">
    <h2>Invest</h2>
    <form id="investForm">
      <input name="username" placeholder="Username" required />
      <input name="amount" placeholder="Amount" required type="number" />
      <input name="transaction_ref" placeholder="Transaction Ref" required />
      <button type="submit">Invest</button>
    </form>
  </section>

  <section id="withdraw">
    <h2>Withdraw</h2>
    <form id="withdrawForm">
      <input name="username" placeholder="Username" required />
      <input name="amount" placeholder="Amount" required type="number" />
      <button type="submit">Withdraw</button>
    </form>
  </section>

  <section id="admin">
    <h2>Admin Controls</h2>
    <form id="approveUserForm">
      <input name="username" placeholder="Username to Approve" required />
      <button type="submit">Approve User</button>
    </form>

    <form id="approveInvestmentForm">
      <input name="username" placeholder="Username to Approve Investment" required />
      <button type="submit">Approve Investment</button>
    </form>
  </section>

  <div id="messages"></div>
</body>
</html>
