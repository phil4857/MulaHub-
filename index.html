<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jipate Bonus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Jipate Bonus Platform</h1>

  <section>
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="text" name="referral" placeholder="Referral (optional)" />
      <button type="submit">Register</button>
    </form>
  </section>

  <section>
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </section>

  <section>
    <h2>Invest</h2>
    <form id="investForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="number" step="0.01" name="amount" placeholder="Amount" required />
      <input type="text" name="transaction_ref" placeholder="Transaction Reference" required />
      <button type="submit">Submit Investment</button>
    </form>
  </section>

  <section>
    <h2>Withdraw</h2>
    <form id="withdrawForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="number" step="0.01" name="amount" placeholder="Amount" required />
      <button type="submit">Withdraw</button>
    </form>
  </section>

  <div id="response"></div>

  <script src="script.js"></script>
</body>
</html>
