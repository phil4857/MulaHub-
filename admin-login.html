<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
  .password-container {
    position: relative;
    margin: 15px 0;
  }
  .password-container input {
    width: 100%;
    padding: 12px;
    padding-right: 40px;
    box-sizing: border-box;
  }
  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
  }
  #adminMsg {
    margin-top: 15px;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
  }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  .loading { background: #e3f2fd; color: #1976d2; }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>

  <div class="password-container">
    <input type="password" id="adminPassword" placeholder="Admin Password" autocomplete="current-password">
    <span class="toggle-password" id="togglePassword">👁️</span>
  </div>

  <button id="adminLoginBtn">Login</button>
  <div id="adminMsg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const passwordInput = document.getElementById("adminPassword");
  const togglePassword = document.getElementById("togglePassword");
  const loginBtn = document.getElementById("adminLoginBtn");
  const msg = document.getElementById("adminMsg");

  // Toggle password visibility
  togglePassword.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
  });

  loginBtn.addEventListener("click", async () => {
    const password = passwordInput.value.trim();
    if (!password) {
      showMessage("error", "Please enter the admin password");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    showMessage("loading", "Verifying...");

    try {
      const formData = new URLSearchParams();
      formData.append("password", password);

      const res = await fetch(`${BACKEND_URL}/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
      });

      const data = await res.json();

      if (res.ok) {
        showMessage("success", "Admin login successful! Redirecting...");
        localStorage.setItem("adminLoggedIn", "true");
        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 1200);
      } else {
        showMessage("error", data.detail || "Invalid admin password");
      }
    } catch (err) {
      showMessage("error", "Cannot connect to server. Check internet.");
      console.error(err);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });

  function showMessage(type, text) {
    msg.className = `msg ${type}`;
    msg.textContent = text;
  }
});
</script>

</body>
</html>
