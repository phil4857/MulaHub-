<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MulaHub Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
    font-family:'Poppins',Arial,sans-serif;
    background:linear-gradient(135deg,#0F172A,#10B981);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.96);
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    text-align:center;
}

h2{
    color:#0F172A;
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
}

.password-container{
    position:relative;
    margin:15px 0;
}

.password-container input{
    width:100%;
    padding:14px 45px 14px 14px;
    border:2px solid #E5E7EB;
    border-radius:12px;
    font-size:16px;
    box-sizing:border-box;
    transition:.3s;
}

.password-container input:focus{
    outline:none;
    border-color:#10B981;
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
}

button{
    width:100%;
    padding:14px;
    background:linear-gradient(135deg,#10B981,#059669);
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

#adminMsg{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    font-weight:600;
}

.success{
    background:#DCFCE7;
    color:#166534;
}

.error{
    background:#FEE2E2;
    color:#991B1B;
}

.loading{
    background:#DBEAFE;
    color:#1D4ED8;
}
    </style>
</head>
<body>

<div class="box">
    <h2>💼 MulaHub Admin</h2>

    <div class="password-container">
        <input type="password" id="adminPassword" placeholder="Enter MulaHub Admin Password">
        <span class="toggle-password" id="togglePassword">👁️</span>
    </div>

    <button id="adminLoginBtn">Login</button>
    <div id="adminMsg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
    const passwordInput = document.getElementById("adminPassword");
    const togglePassword = document.getElementById("togglePassword");
    const loginBtn = document.getElementById("adminLoginBtn");
    const msg = document.getElementById("adminMsg");

    // Eye icon toggle
    togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePassword.textContent = isPassword ? "🙈" : "👁️";
    });

    function showMessage(type, text) {
        msg.className = type;
        msg.textContent = String(text || "Unknown error");
    }

    loginBtn.addEventListener("click", async () => {
        const password = passwordInput.value.trim();

        if (!password) {
            showMessage("error", "Please enter the admin password");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";
        showMessage("loading", "Verifying admin access...");

        try {
            const res = await fetch(`${BACKEND_URL}/admin/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    username: "admin",     // This fixes the "Field required" error
                    password: password 
                })
            });

            let data;
            try {
                data = await res.json();
            } catch (e) {
                const text = await res.text().catch(() => "Server error");
                data = { detail: text };
            }

            if (res.ok) {
                showMessage("success", "Admin login successful! Redirecting...");
                localStorage.setItem("adminLoggedIn", "true");
                setTimeout(() => {
                    window.location.href = "admin-dashboard.html";
                }, 1500);
            } else {
                let errorText = data.detail || data.message || "Invalid admin credentials";
                if (Array.isArray(data.detail)) {
                    errorText = data.detail.map(item => item.msg || item).join(" • ");
                }
                showMessage("error", errorText);
            }
        } catch (err) {
            console.error(err);
            showMessage("error", "Cannot connect to server. Check Render logs or internet.");
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }
    });
});
</script>

</body>
</html>
