<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-6.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username');
    if (!username) {
        window.location.href = 'login.html';
        return;
    }

    const msg = document.getElementById('msg');
    document.getElementById('usernameDisplay').textContent = `Welcome, ${username}!`;

    // Commodity prices for reference
    const COMMODITY_PRICES = {
        marble: 650, crude_oil: 800, silver: 1000, lead: 1200,
        platinum: 1350, diamonds: 1750, gold: 2200, uranium: 3000
    };

    async function loadDashboard() {
        msg.textContent = "Loading dashboard...";
        msg.style.color = "blue";

        try {
            // Correct template literal
            const url = `${BACKEND_URL}/dashboard?username=${encodeURIComponent(username)}`;
            console.log("Fetching:", url);

            const res = await fetch(url);

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                msg.style.color = "red";
                if (res.status === 403) {
                    msg.textContent = data.detail || "Account not approved yet. Contact admin.";
                } else if (res.status === 404) {
                    msg.textContent = "Dashboard not found. Try logging in again.";
                } else {
                    msg.textContent = data.detail || `Error ${res.status}`;
                }
                return;
            }

            const data = await res.json();
            console.log("Dashboard data:", data);

            document.getElementById('balance').textContent = Number(data.balance || 0).toFixed(2);
            document.getElementById('earnings').textContent = Number(data.earnings || 0).toFixed(2);

            let invested = 0;
            if (data.investments && typeof data.investments === 'object') {
                Object.values(data.investments).forEach(item => invested += Number(item.amount || 0));
            }
            document.getElementById('invested').textContent = invested.toFixed(2);

            renderCommodityCards();

            msg.style.color = "green";
            msg.textContent = "Dashboard loaded successfully!";
        } catch (err) {
            msg.style.color = "red";
            msg.textContent = "Failed to load dashboard. Check connection.";
            console.error(err);
        }
    }

    function renderCommodityCards() {
        const grid = document.getElementById('commodityGrid');
        grid.innerHTML = "";

        const commodities = [
            { key: "marble",     name: "Marble",     days: 15,  img: "https://images.unsplash.com/photo-1618220048045-1a5a6a3b5b5e?auto=format&fit=crop&w=800&q=80" },
            { key: "crude_oil",  name: "Crude Oil",  days: 20,  img: "https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&w=800&q=80" },
            { key: "silver",     name: "Silver",     days: 23,  img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" },
            { key: "lead",       name: "Lead",       days: 25,  img: "https://images.unsplash.com/photo-1618220048045-1a5a6a3b5b5e?auto=format&fit=crop&w=800&q=80" },
            { key: "platinum",   name: "Platinum",   days: 28,  img: "https://images.unsplash.com/photo-1618220048045-1a5a6a3b5b5e?auto=format&fit=crop&w=800&q=80" },
            { key: "diamonds",   name: "Diamonds",   days: 32,  img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=800&q=80" },
            { key: "gold",       name: "Gold",       days: 35,  img: "https://images.unsplash.com/photo-1610375461248-9d2b9a3f6e1c?auto=format&fit=crop&w=800&q=80" },
            { key: "uranium",    name: "Uranium",    days: 45,  img: "https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&w=800&q=80" }
        ];

        commodities.forEach(com => {
            const card = document.createElement('div');
            card.className = 'commodity-card';
            card.innerHTML = `
                <img src="${com.img}" alt="${com.name}" onerror="this.src='https://via.placeholder.com/800x160?text=${com.name}'">
                <div class="commodity-info">
                    <h4>${com.name}</h4>
                    <p>KES ${COMMODITY_PRICES[com.key].toLocaleString()}</p>
                    <p>${com.days} days</p>
                </div>
            `;
            card.onclick = () => investRequest(com.key);
            grid.appendChild(card);
        });
    }

    async function investRequest(commodity) {
        if (!confirm(`Invest in ${commodity} for KES ${COMMODITY_PRICES[commodity]}?`)) return;

        msg.textContent = `Requesting ${commodity} investment...`;
        msg.style.color = "blue";

        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('commodity', commodity);

        try {
            const res = await fetch(`${BACKEND_URL}/invest/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                msg.style.color = "green";
                msg.innerHTML = `${data.message}<br><strong>Pay via M-Pesa: ${data.mpesa_payment || '0752964507'}</strong>`;
                loadDashboard(); // refresh numbers
            } else {
                msg.style.color = "red";
                msg.textContent = data.detail || 'Investment request failed.';
            }
        } catch (err) {
            msg.style.color = "red";
            msg.textContent = "Network error during investment request.";
            console.error(err);
        }
    }

    window.logout = function() {
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    };

    loadDashboard();
});
</script>
