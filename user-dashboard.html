<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";
const MPESA_NUMBER = "0752964507";

const COMMODITY_INFO = {
  marble:     { price: 650,  days: 15, emoji: "🪨🪨🪨" },
  crude_oil:  { price: 800,  days: 20, emoji: "🛢️🛢️🛢️" },
  silver:     { price: 1000, days: 23, emoji: "🪙🪙🪙" },
  lead:       { price: 1200, days: 25, emoji: "⚙️⚙️⚙️" },
  platinum:   { price: 1350, days: 28, emoji: "💎💎💎" },
  diamonds:   { price: 1750, days: 32, emoji: "💎💎💎" },
  gold:       { price: 2200, days: 35, emoji: "🪙🪙🪙" },
  uranium:    { price: 3000, days: 45, emoji: "☢️☢️☢️" }
};

let selectedCommodity = null;
let countdownIntervals = [];

document.addEventListener('DOMContentLoaded', () => {
  const username = localStorage.getItem('username');
  if (!username) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('usernameDisplay').textContent = username;

  // Tab switching
  document.querySelectorAll('.tab-buttons button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      const id = btn.id.replace('Btn', '');
      const tab = document.getElementById(id);
      if (tab) tab.classList.add('active');
    });
  });

  // Copy M-Pesa number
  const copyBtn = document.getElementById("copyNumberBtn");
  if (copyBtn) {
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(MPESA_NUMBER).then(() => {
        const withdrawMsg = document.getElementById("withdrawMsg");
        withdrawMsg.className = "msg success";
        withdrawMsg.innerHTML = `Copied! Open M-Pesa and send.<br>Include your username.`;
      }).catch(() => {
        alert("Copy failed. Use: " + MPESA_NUMBER);
      });
    });
  }

  startDailyCountdown();
  fetchUserData();
});

async function fetchUserData(retries = 3) {
  const msgEl = document.getElementById('msg');
  setMsg(msgEl, 'loading', 'Loading dashboard...');

  const token = localStorage.getItem('access_token') || null;
  const headers = { 'Accept': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const url = `${BACKEND_URL}/dashboard`;

  for (let attempt = 1; attempt <= retries; attempt++) {
    try {
      const res = await fetch(url, { headers, method: 'GET' });
      let data = {};
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json')) data = await res.json().catch(() => ({}));
      else {
        const text = await res.text().catch(() => '');
        try { data = JSON.parse(text); } catch { data = { message: text }; }
      }

      if (!res.ok) {
        const err = data.detail || data.message || `Error ${res.status}`;
        setMsg(msgEl, 'error', err);
        return;
      }

      // Populate user HUD
      const balance = Number(data.balance || 0);
      const earnings = Number(data.earnings || 0);
      const referralBonus = Number(data.referral_bonus_earned || 0);
      const dailyEarnings = Number(data.daily_earnings || 0);
      let invested = 0;
      if (data.investments) {
        Object.values(data.investments).forEach(i => invested += Number(i.amount || 0));
      }

      document.getElementById('balance').textContent = `KES ${balance.toFixed(2)}`;
      document.getElementById('earnings').textContent = `KES ${earnings.toFixed(2)}`;
      document.getElementById('invested').textContent = `KES ${invested.toFixed(2)}`;
      document.getElementById('dailyEarnings').textContent = `KES ${dailyEarnings.toFixed(2)}`;
      document.getElementById('referralBonus').textContent = `KES ${referralBonus.toFixed(2)}`;
      if (document.getElementById('referralLink') && data.referral_link) {
        document.getElementById('referralLink').innerHTML = `<a href="${data.referral_link}" target="_blank">${data.referral_link}</a>`;
      }

      renderInvestments(data.investments || {});
      renderCommodityCards();

      setMsg(msgEl, 'success', 'Dashboard loaded!');
      setTimeout(() => msgEl.textContent = '', 2000);
      return;
    } catch (err) {
      console.error('fetchUserData error:', err);
      if (attempt === retries) setMsg(msgEl, 'error', 'Cannot connect to server.');
      else {
        setMsg(msgEl, 'loading', `Retrying (${attempt}/${retries})...`);
        await new Promise(r => setTimeout(r, 1200));
      }
    }
  }
}

function renderInvestments(investments) {
  const container = document.getElementById('investmentList');
  container.innerHTML = '';
  if (!investments || Object.keys(investments).length === 0) {
    container.innerHTML = "<p style='text-align:center; color:#777;'>No active investments yet.</p>";
    return;
  }
  for (const [commodity, inv] of Object.entries(investments)) {
    const expiry = new Date(inv.expiry_date);
    const remainingDays = Math.max(Math.floor((expiry - new Date()) / (1000 * 60 * 60 * 24)), 0);
    const card = document.createElement('div');
    card.style.cssText = 'background:#f0f8f0; padding:15px; border-radius:10px; border:1px solid #28a745; margin-bottom:10px;';
    card.innerHTML = `
      <strong>${commodity.toUpperCase()}</strong><br>
      Amount: KES ${Number(inv.amount || 0).toFixed(2)}<br>
      Expires in: ${remainingDays} day(s)
    `;
    container.appendChild(card);
  }
}

function renderCommodityCards() {
  const grid = document.getElementById('commodityGrid');
  grid.innerHTML = "";
  Object.entries(COMMODITY_INFO).forEach(([key, com]) => {
    const card = document.createElement('div');
    card.className = 'commodity-card';
    card.dataset.key = key;

    card.addEventListener('click', () => selectCommodity(key, card));

    card.innerHTML = `
      <div class="emoji-big">${com.emoji}</div>
      <p class="font-semibold mt-2">${key.replace("_"," ").toUpperCase()}</p>
      <p class="text-sm text-gray-600">KES ${com.price.toLocaleString()}</p>
      <p class="text-xs text-gray-500">${com.days} days</p>
    `;
    grid.appendChild(card);
  });

  const investBtn = document.getElementById('investBtn');
  if (investBtn) {
    investBtn.disabled = !selectedCommodity;
    investBtn.onclick = () => {
      if (!selectedCommodity) return alert('Select a commodity first.');
      investRequest(selectedCommodity);
    };
  }
}

function selectCommodity(key, cardEl) {
  document.querySelectorAll('.commodity-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedCommodity = key;
  const selectedLabel = document.getElementById('selectedCommodity');
  if (selectedLabel) selectedLabel.textContent = key.replace("_"," ").toUpperCase();
  const investBtn = document.getElementById('investBtn');
  if (investBtn) investBtn.disabled = false;
}

async function investRequest(commodity) {
  if (!commodity || !COMMODITY_INFO[commodity]) return alert("Invalid selection");
  if (!confirm(`Invest in ${commodity.replace("_"," ").toUpperCase()} for KES ${COMMODITY_INFO[commodity].price}?`)) return;

  const msg = document.getElementById('msg');
  setMsg(msg, 'loading', `Requesting ${commodity}...`);

  const token = localStorage.getItem('access_token') || null;
  const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  try {
    const res = await fetch(`${BACKEND_URL}/invest/request`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ commodity })
    });

    const data = await res.json().catch(() => ({ message: "Error" }));
    if (res.ok) {
      setMsg(msg, 'success', `${data.message || "Success"}<br><strong>Pay via M-Pesa: ${data.mpesa_number || MPESA_NUMBER}</strong>`);
      fetchUserData();
    } else setMsg(msg, 'error', data.detail || data.message || `Request failed (${res.status})`);
  } catch (err) {
    console.error('investRequest error:', err);
    setMsg(msg, 'error', 'Network error.');
  }
}

function startDailyCountdown() {
  const el = document.getElementById("nextDailyEarning");
  if (!el) return;
  const last = parseInt(localStorage.getItem('lastDailyBonusTime') || Date.now(), 10);
  const next = last + 86400000;

  const tick = () => {
    const diff = next - Date.now();
    if (diff <= 0) {
      el.textContent = "Available now!";
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = `${h}h ${m}m ${s}s`;
  };
  tick();
  countdownIntervals.push(setInterval(tick, 1000));
}

function setMsg(el, kind, text) {
  if (!el) return;
  el.className = 'msg ' + (kind || '');
  el.innerHTML = text || '';
}

window.logout = function() {
  localStorage.removeItem('username');
  localStorage.removeItem('access_token');
  window.location.href = 'login.html';
};
</script>
