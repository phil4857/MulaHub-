<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard - Mkoba Wallet 💵</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4fff7;
      margin: 0;
      padding: 0;
    }
    header {
      background: #28a745;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h2 { color: #28a745; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    .info { margin-bottom: 15px; padding: 15px; background: #f0f8f0; border-left: 5px solid #28a745; }
    .form-section { margin-top: 20px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    input { padding: 8px; margin: 5px 0; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
    button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .invest-btn { background: #28a745; color: white; }
    .withdraw-btn { background: #007bff; color: white; }
    .logout-btn { background: #dc3545; color: white; }
    button:hover { opacity: 0.85; }
    .investment-item { margin: 5px 0; padding: 8px; background: #f8fff8; border-radius: 5px; }
  </style>
</head>
<body>
<header>💵 Mkoba Wallet - User Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
  </div>

  <div class="form-section">
    <h3>💰 Active Investments</h3>
    <div id="investmentList">Loading investments...</div>
  </div>

  <div class="form-section">
    <h3>📈 Make Investment</h3>
    <select id="commodity">
      <option value="silver">Silver</option>
      <option value="marble">Marble</option>
      <option value="uranium">Uranium</option>
      <option value="diamond">Diamond</option>
      <option value="gold">Gold</option>
    </select>
    <button class="invest-btn" id="investBtn">Request Investment OTP</button>
    <div id="investOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="investOtp" placeholder="Enter investment OTP" />
      <button class="invest-btn" id="investConfirmBtn">Confirm Investment</button>
    </div>
  </div>

  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount" />
    <button class="withdraw-btn" id="withdrawBtn">Request Withdrawal OTP</button>
    <div id="withdrawOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="withdrawOtp" placeholder="Enter withdrawal OTP" />
      <button class="withdraw-btn" id="withdrawConfirmBtn">Confirm Withdrawal</button>
    </div>
  </div>

  <div class="form-section">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const username = localStorage.getItem("username");
  if(!username){ alert("Please log in."); window.location.href="login.html"; return; }
  document.getElementById("usernameDisplay").textContent = username;

  const balanceEl = document.getElementById("balanceDisplay");
  const investmentListEl = document.getElementById("investmentList");
  const commoditySelect = document.getElementById("commodity");
  const investOtpSection = document.getElementById("investOtpSection");
  const investOtpInput = document.getElementById("investOtp");
  const withdrawAmountInput = document.getElementById("withdrawAmount");
  const withdrawOtpSection = document.getElementById("withdrawOtpSection");
  const withdrawOtpInput = document.getElementById("withdrawOtp");

  let investmentsData = {};

  async function loadDashboard() {
    try {
      const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/dashboard?username=${encodeURIComponent(username)}`);
      if(!res.ok) throw new Error("Failed to load dashboard");
      const data = await res.json();
      balanceEl.textContent = `KES ${parseFloat(data.balance||0).toFixed(2)}`;
      investmentsData = data.investments || {};
      renderInvestments();
    } catch(err){
      console.error(err);
      alert("Error loading dashboard: "+err.message);
    }
  }

  function renderInvestments(){
    investmentListEl.innerHTML = "";
    if(Object.keys(investmentsData).length===0){
      investmentListEl.textContent = "No active investments.";
      return;
    }
    for(const [commodity, inv] of Object.entries(investmentsData)){
      const div = document.createElement("div");
      div.id = `invest-${commodity}`;
      div.className = "investment-item";
      div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${inv.time_remaining}`;
      investmentListEl.appendChild(div);
    }
  }

  // Investment request
  document.getElementById("investBtn")?.addEventListener("click", async () => {
    const commodity = commoditySelect.value;
    const form = new URLSearchParams({ username, commodity });
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/invest/request", { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      alert(data.message + " Enter OTP to confirm investment.");
      investOtpSection.style.display = "block";
    } catch(err){ alert("Investment request failed: "+err.message); }
  });

  // Investment confirm
  document.getElementById("investConfirmBtn")?.addEventListener("click", async () => {
    const otp = investOtpInput.value;
    if(!otp) return alert("Enter OTP");
    const form = new URLSearchParams({ username, otp });
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/invest/confirm", { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      alert(data.message);
      investOtpSection.style.display="none";
      investOtpInput.value="";
      await loadDashboard();
    } catch(err){ alert("Investment confirmation failed: "+err.message); }
  });

  // Withdrawal request
  document.getElementById("withdrawBtn")?.addEventListener("click", async () => {
    const amount = withdrawAmountInput.value;
    if(!amount || isNaN(amount) || Number(amount)<=0) return alert("Enter valid amount");
    const form = new URLSearchParams({ username, amount });
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw/request", { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      alert(data.message + " Enter OTP to confirm withdrawal.");
      withdrawOtpSection.style.display="block";
    } catch(err){ alert("Withdrawal request failed: "+err.message); }
  });

  // Withdrawal confirm
  document.getElementById("withdrawConfirmBtn")?.addEventListener("click", async () => {
    const otp = withdrawOtpInput.value;
    if(!otp) return alert("Enter OTP");
    const form = new URLSearchParams({ username, otp });
    try {
      const res = await fetch("https://repo-1red-jipate-bonus.onrender.com/withdraw/confirm", { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      alert(data.message);
      withdrawOtpSection.style.display="none";
      withdrawOtpInput.value="";
      await loadDashboard();
    } catch(err){ alert("Withdrawal confirmation failed: "+err.message); }
  });

  // Update countdown timers every second
  setInterval(()=>{
    for(const [commodity, inv] of Object.entries(investmentsData)){
      const div = document.getElementById(`invest-${commodity}`);
      if(!div) continue;
      const expiry = new Date(inv.expiry_date);
      const now = new Date();
      const diff = expiry-now;
      if(diff>0){
        const h=Math.floor(diff/3600000);
        const m=Math.floor((diff%3600000)/60000);
        const s=Math.floor((diff%60000)/1000);
        div.textContent = `${commodity}: KES ${inv.amount} | Expires in ${h}h ${m}m ${s}s`;
      }else{
        div.textContent = `${commodity}: KES ${inv.amount} | Expired`;
      }
    }
  },1000);

  function logout(){ localStorage.removeItem("username"); window.location.href="login.html"; }

  await loadDashboard();
});
</script>
</body>
</html>
