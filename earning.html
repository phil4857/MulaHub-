<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Investment Dashboard - Mkoba Wallet 💰</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4fff7;
    margin: 0;
    padding: 0;
  }
  header {
    background: #28a745;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }
  .container {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  h2 { color: #28a745; border-bottom: 2px solid #eee; padding-bottom: 5px; }
  .info { margin-bottom: 15px; padding: 15px; background: #f0f8f0; border-left: 5px solid #28a745; }
  .form-section { margin-top: 20px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
  input, select { padding: 8px; margin: 5px 0; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
  button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  .invest-btn { background: #28a745; color: white; }
  .withdraw-btn { background: #007bff; color: white; }
  .logout-btn { background: #dc3545; color: white; }
  button:hover { opacity: 0.85; }
  .investment-card { display: flex; align-items: center; gap: 12px; margin: 8px 0; padding: 10px; border-radius: 6px; background: #f8fff8; border: 1px solid #c1e1c1; }
  .investment-card img { width: 60px; height: 60px; object-fit: contain; border-radius: 6px; }
  .investment-info { flex: 1; }
  .countdown { font-weight: bold; color: #e53e3e; margin-top: 5px; }
</style>
</head>
<body>
<header>💰 Mkoba Wallet - Investment Dashboard</header>

<div class="container">
  <h2>Welcome, <span id="usernameDisplay"></span></h2>
  <div class="info">
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
  </div>

  <div class="form-section">
    <h3>📈 Make Investment</h3>
    <select id="commodity">
      <option value="">-- Select Commodity --</option>
      <option value="marble" data-min="650">Marble (KES 650)</option>
      <option value="crude_oil" data-min="800">Crude Oil (KES 800)</option>
      <option value="silver" data-min="1000">Silver (KES 1000)</option>
      <option value="lead" data-min="1200">Lead (KES 1200)</option>
      <option value="platinum" data-min="1350">Platinum (KES 1350)</option>
      <option value="diamonds" data-min="1750">Diamonds (KES 1750)</option>
      <option value="gold" data-min="2200">Gold (KES 2200)</option>
      <option value="uranium" data-min="3000">Uranium (KES 3000)</option>
    </select>
    <input type="number" id="amount" placeholder="Enter investment amount" />
    <button class="invest-btn" id="investBtn">Request Investment OTP</button>
    <div id="investOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="investOtp" placeholder="Enter investment OTP" />
      <button class="invest-btn" id="investConfirmBtn">Confirm Investment</button>
    </div>
  </div>

  <div class="form-section">
    <h3>💵 Active Investments</h3>
    <div id="activeInvestments">Loading investments...</div>
  </div>

  <div class="form-section">
    <h3>📤 Request Withdrawal</h3>
    <input type="number" id="withdrawAmount" placeholder="Enter amount" />
    <button class="withdraw-btn" id="withdrawBtn">Request Withdrawal OTP</button>
    <div id="withdrawOtpSection" style="display:none; margin-top:10px;">
      <input type="text" id="withdrawOtp" placeholder="Enter withdrawal OTP" />
      <button class="withdraw-btn" id="withdrawConfirmBtn">Confirm Withdrawal</button>
    </div>
  </div>

  <div class="form-section">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
(async () => {
  const API_BASE = 'https://repo-1red-jipate-bonus.onrender.com';
  const username = localStorage.getItem('username');
  if(!username){ alert('Please log in.'); window.location.href="login.html"; return; }
  document.getElementById("usernameDisplay").textContent = username;

  const balanceEl = document.getElementById("balanceDisplay");
  const commoditySelect = document.getElementById("commodity");
  const amountInput = document.getElementById("amount");
  const investOtpSection = document.getElementById("investOtpSection");
  const investOtpInput = document.getElementById("investOtp");
  const withdrawAmountInput = document.getElementById("withdrawAmount");
  const withdrawOtpSection = document.getElementById("withdrawOtpSection");
  const withdrawOtpInput = document.getElementById("withdrawOtp");
  const activeInvestmentsEl = document.getElementById("activeInvestments");

  const commodityImages = {
    marble: 'https://i.imgur.com/0X2U6hX.png',
    crude_oil: 'https://i.imgur.com/6zQyGzK.png',
    silver: 'https://i.imgur.com/T0M2Pz2.png',
    lead: 'https://i.imgur.com/OU8b5wC.png',
    platinum: 'https://i.imgur.com/1oC0fIq.png',
    diamonds: 'https://i.imgur.com/akRhzZk.png',
    gold: 'https://i.imgur.com/9O3qGZx.png',
    uranium: 'https://i.imgur.com/Xxg1XYJ.png'
  };

  let investmentsData = [];

  async function loadDashboard() {
    try {
      const res = await fetch(`${API_BASE}/dashboard?username=${encodeURIComponent(username)}`);
      if(!res.ok) throw new Error("Failed to load dashboard");
      const data = await res.json();
      balanceEl.textContent = Number(data.balance||0).toFixed(2);
      investmentsData = data.active_investments || [];
      renderInvestments();
    } catch(err){
      console.error(err);
      alert("Error loading dashboard: "+err.message);
    }
  }

  function renderInvestments() {
    activeInvestmentsEl.innerHTML = "";
    if(investmentsData.length === 0){
      activeInvestmentsEl.textContent = "No active investments.";
      return;
    }
    investmentsData.forEach(inv => {
      const div = document.createElement("div");
      div.className = "investment-card";

      const img = document.createElement("img");
      img.src = commodityImages[inv.commodity] || '';
      img.alt = inv.commodity;

      const info = document.createElement("div");
      info.className = "investment-info";
      info.innerHTML = `<strong>${inv.commodity.replace('_',' ').toUpperCase()}</strong>
                        <div>Invested: KES ${Number(inv.amount).toFixed(2)}</div>
                        <div>Daily Earnings: KES ${(inv.amount*0.1).toFixed(2)}</div>
                        <div class="countdown" data-expiry="${new Date(inv.start_date).getTime() + inv.duration_days*24*60*60*1000}"></div>`;

      div.appendChild(img);
      div.appendChild(info);
      activeInvestmentsEl.appendChild(div);
    });
    startCountdowns();
  }

  function startCountdowns(){
    const countdowns = document.querySelectorAll('.countdown');
    function updateCountdown(){
      const now = Date.now();
      countdowns.forEach(c=>{
        const expiry = Number(c.dataset.expiry);
        const diff = expiry - now;
        if(diff<=0) c.textContent = 'Expired';
        else {
          const days = Math.floor(diff/(1000*60*60*24));
          const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
          const mins = Math.floor((diff%(1000*60*60))/(1000*60));
          c.textContent = `Expires in: ${days}d ${hours}h ${mins}m`;
        }
      });
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  }

  // Investment request
  document.getElementById("investBtn").addEventListener("click", async () => {
    const commodity = commoditySelect.value;
    const amount = Number(amountInput.value);
    if(!commodity) return alert("Select a commodity");
    const min = Number(commoditySelect.options[commoditySelect.selectedIndex].dataset.min);
    if(!amount || amount<min) return alert(`Minimum for ${commodity} is KES ${min}`);
    const form = new URLSearchParams({ username, commodity, amount });
    try {
      const res = await fetch(`${API_BASE}/invest/request`, { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail || data.message);
      alert(data.message); investOtpSection.style.display="block";
    } catch(err){ alert("Investment request failed: "+err.message); }
  });

  // Investment confirm
  document.getElementById("investConfirmBtn").addEventListener("click", async () => {
    const otp = investOtpInput.value.trim();
    if(!otp) return alert("Enter OTP");
    const form = new URLSearchParams({ username, otp });
    try{
      const res = await fetch(`${API_BASE}/invest/confirm`, { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail || data.message);
      alert(data.message);
      investOtpSection.style.display="none"; investOtpInput.value="";
      await loadDashboard();
    }catch(err){ alert("Investment confirmation failed: "+err.message); }
  });

  // Withdrawal request
  document.getElementById("withdrawBtn").addEventListener("click", async () => {
    const amt = withdrawAmountInput.value;
    if(!amt || Number(amt)<=0) return alert("Enter valid amount");
    const form = new URLSearchParams({ username, amount: amt });
    try{
      const res = await fetch(`${API_BASE}/withdraw/request`, { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail || data.message);
      alert(data.message); withdrawOtpSection.style.display="block";
    }catch(err){ alert("Withdrawal request failed: "+err.message); }
  });

  // Withdrawal confirm
  document.getElementById("withdrawConfirmBtn").addEventListener("click", async () => {
    const otp = withdrawOtpInput.value.trim();
    if(!otp) return alert("Enter OTP");
    const form = new URLSearchParams({ username, otp });
    try{
      const res = await fetch(`${API_BASE}/withdraw/confirm`, { method:"POST", body:form });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail || data.message);
      alert(data.message); withdrawOtpSection.style.display="none"; withdrawOtpInput.value="";
      await loadDashboard();
    }catch(err){ alert("Withdrawal confirmation failed: "+err.message); }
  });

  window.logout = ()=>{ localStorage.removeItem("username"); window.location.href="login.html"; }

  await loadDashboard();
})();
</script>
</body>
</html>
