<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings - Mkoba Wallet 💵</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #e6f3ff, #f0f9f5);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #0a1d66;
            margin-bottom: 30px;
        }
        .card {
            background: #f8fff8;
            border-left: 6px solid #28a745;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
        }
        .card p {
            margin: 12px 0;
            font-size: 18px;
        }
        .card strong {
            color: #0a1d66;
        }
        .msg {
            text-align: center;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 24px;
        }
        .loading { background: #e3f2fd; color: #1976d2; }
        .success  { background: #e8f5e9; color: #2e7d32; }
        .error    { background: #ffebee; color: #c62828; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-refresh {
            background: #28a745;
            color: white;
            display: block;
            margin: 20px auto;
        }
        .btn-refresh:hover {
            background: #218838;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            display: block;
            margin: 30px auto;
        }
        .btn-logout:hover {
            background: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mkoba Wallet - Earnings Overview 💵</h1>

    <div id="msg" class="msg loading">
        Loading your earnings...
    </div>

    <div class="card">
        <p><strong>Username:</strong> <span id="usernameDisplay">—</span></p>
        <p><strong>Current Balance:</strong> KES <span id="balanceDisplay">0.00</span></p>
        <p><strong>Total Earnings:</strong> KES <span id="earningsDisplay">0.00</span></p>
        <p><strong>Total Invested Amount:</strong> KES <span id="investedDisplay">0.00</span></p>
    </div>

    <div class="text-center">
        <button class="btn-refresh" onclick="loadDashboard()">Refresh Earnings</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username');
    if (!username) {
        window.location.href = 'login.html';
        return;
    }

    document.getElementById('usernameDisplay').textContent = username;

    async function loadDashboard() {
        const msg = document.getElementById('msg');
        msg.className = 'msg loading';
        msg.textContent = 'Loading your earnings...';

        try {
            const res = await fetch(`\( {BACKEND_URL}/dashboard?username= \){encodeURIComponent(username)}`);

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                msg.className = 'msg error';
                if (res.status === 403) {
                    msg.textContent = data.detail || 'Account not approved yet. Please wait for admin approval.';
                } else if (res.status === 404) {
                    msg.textContent = 'Dashboard not found on server. Contact support.';
                } else {
                    msg.textContent = data.detail || `Error ${res.status}`;
                }
                return;
            }

            const data = await res.json();

            document.getElementById('balanceDisplay').textContent = Number(data.balance || 0).toFixed(2);
            document.getElementById('earningsDisplay').textContent = Number(data.earnings || 0).toFixed(2);

            let invested = 0;
            if (data.investments && typeof data.investments === 'object') {
                Object.values(data.investments).forEach(item => {
                    invested += Number(item.amount || 0);
                });
            }
            document.getElementById('investedDisplay').textContent = invested.toFixed(2);

            msg.className = 'msg success';
            msg.textContent = 'Earnings loaded successfully!';
        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = 'Cannot connect to server. Please check your internet connection.';
            console.error('Earnings fetch error:', err);
        }
    }

    function logout() {
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    }

    // Load data immediately
    loadDashboard();
});
</script>

</body>
</html>
