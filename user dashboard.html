<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial; padding:20px; background:#f4f4f4;}
.card{background:white; padding:20px; margin-top:15px; border-radius:8px;}
button{padding:8px 12px; margin-top:10px;}
</style>
</head>
<body>

<h2>User Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="card">
<p><strong>Balance:</strong> <span id="balance"></span></p>
<p><strong>Earnings:</strong> <span id="earnings"></span></p>
</div>

<div class="card">
<h3>Withdraw</h3>
<input id="amount" placeholder="Amount">
<button onclick="withdraw()">Request Withdrawal</button>
<p id="msg"></p>
</div>

<script>
const BACKEND_URL="https://repo-1red-jipate-bonus.onrender.com";
const username=localStorage.getItem("username");
if(!username){window.location="login.html";}

async function load(){
const res=await fetch(`${BACKEND_URL}/dashboard?username=${username}`);
const data=await res.json();
if(res.ok){
balance.innerText=data.balance;
earnings.innerText=data.earnings;
}else{
alert(data.detail);
}
}
load();

async function withdraw(){
const formData=new URLSearchParams();
formData.append("username",username);
formData.append("amount",amount.value);

const res=await fetch(`${BACKEND_URL}/withdraw/request`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:formData
});
const data=await res.json();
msg.innerText=data.message||data.detail;
}

function logout(){
localStorage.removeItem("username");
window.location="login.html";
}
</script>
</body>
</html>
