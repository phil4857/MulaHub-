<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard - Mkoba Wallet 💵🎉</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2fff5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #28a745;
      color: gold;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      color: #28a745;
    }
    .info {
      margin-bottom: 15px;
      padding: 10px;
      background: #f0f8f0;
      border-left: 4px solid #28a745;
    }
    .info span {
      font-weight: bold;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .actions button {
      margin: 10px 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .actions button:hover {
      background: #1e7e34;
    }
    .logout {
      background: #dc3545 !important;
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to Mkoba Wallet Dashboard 💵🎉</h1>
</header>

<div class="container">
  <div class="info" id="userInfo">
    <p><strong>Username:</strong> <span id="usernameDisplay">Loading...</span></p>
    <p><strong>Balance:</strong> KES <span id="balanceDisplay">Loading...</span></p>
    <p><strong>Total Earnings:</strong> KES <span id="earningsDisplay">Loading...</span></p>
    <p><strong>Referral Link:</strong> <span id="referralLink">Loading...</span></p>
    <p><strong>Payment Number:</strong> <span id="payNumber">0739075065</span></p>
  </div>

  <div class="actions">
    <button onclick="window.location.href='invest.html'">💰 Invest</button>
    <button onclick="window.location.href='withdraw.html'">📤 Withdraw</button>
    <button onclick="logout()" class="logout">🚪 Logout</button>
  </div>
</div>

<script>
  const username = localStorage.getItem("username");
  const userToken = localStorage.getItem("userToken");

  if (!username || !userToken) {
    alert("Please log in first.");
    window.location.href = "login.html";
  }

  // Display username & referral link
  document.getElementById("usernameDisplay").textContent = username;
  document.getElementById("referralLink").textContent =
    `https://mkobawallet.com/register.html?ref=${username}`;

  async function loadUserData() {
    try {
      const res = await fetch(`https://repo-1red-jipate-bonus.onrender.com/dashboard?username=${encodeURIComponent(username)}`, {
        headers: {
          "Authorization": `Bearer ${userToken}`
        }
      });

      if (!res.ok) throw new Error("Failed to fetch user data");

      const user = await res.json();

      document.getElementById("balanceDisplay").textContent = parseFloat(user.balance || 0).toFixed(2);
      document.getElementById("earningsDisplay").textContent = parseFloat(user.earnings || 0).toFixed(2);
      if (user.payment_number) document.getElementById("payNumber").textContent = user.payment_number;

    } catch (err) {
      console.error("Error loading user data:", err);
      alert("Unable to load user info. Try again later.");
    }
  }

  function logout() {
    localStorage.removeItem("username");
    localStorage.removeItem("userToken");
    window.location.href = "login.html";
  }

  loadUserData();
</script>

</body>
</html>
