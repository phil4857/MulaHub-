<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Dashboard - Mkoba Wallet 💵🎉</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f9ff;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #0a1d66, #1234a0);
  color: #ffd700;
  padding: 20px;
  text-align: center;
  border-bottom-left-radius: 15px;
  border-bottom-right-radius: 15px;
}

.container {
  background: #fff;
  margin: 20px auto;
  padding: 25px;
  max-width: 700px;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.info p {
  background: #f0f8f0;
  padding: 12px;
  border-left: 5px solid #0a1d66;
  border-radius: 8px;
  margin-bottom: 10px;
}

.info span {
  font-weight: bold;
  color: #1234a0;
}

#bonusStatus {
  background: #fff3cd;
  padding: 12px;
  border-left: 6px solid #ffd700;
  border-radius: 8px;
  text-align: center;
  margin-bottom: 15px;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  margin-top: 20px;
}

.actions button {
  flex: 1 1 45%;
  margin: 10px 5px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(to right, #0a1d66, #1234a0);
  color: #ffd700;
}

.logout {
  background: linear-gradient(to right, #dc3545, #a71d2a) !important;
}
</style>
</head>
<body>

<header>
  <h1>Welcome to Mkoba Wallet Dashboard 💵🎉</h1>
</header>

<div class="container">
  <div class="info">
    <p><strong>Username:</strong> <span id="usernameDisplay"></span></p>
    <p><strong>Balance:</strong> KES <span id="balanceDisplay"></span></p>
    <p><strong>Total Earnings:</strong> KES <span id="earningsDisplay"></span></p>
    <p><strong>Investment:</strong> KES <span id="investmentDisplay"></span></p>
    <p><strong>Referral Link:</strong> 
      <a id="referralLink" target="_blank"></a>
    </p>
    <p><strong>Payment Number:</strong> 0739075065</p>
  </div>

  <div id="bonusStatus">Loading bonus info...</div>

  <div class="actions">
    <button id="grabBonusBtn">🎁 Grab Daily Bonus</button>
    <button onclick="window.location.href='withdraw.html'">📤 Withdraw</button>
    <button class="logout" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>

const username = localStorage.getItem("username");
if (!username) {
  window.location.href = "login.html";
}

// ===== GET USER =====
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function getUser() {
  return getUsers()[username];
}

function saveUser(user) {
  const users = getUsers();
  users[username] = user;
  localStorage.setItem("users", JSON.stringify(users));
}

const user = getUser();
if (!user) {
  alert("User not found.");
  window.location.href = "login.html";
}

// ===== DISPLAY INFO =====
document.getElementById("usernameDisplay").textContent = username;
document.getElementById("balanceDisplay").textContent = (user.balance || 0).toFixed(2);
document.getElementById("earningsDisplay").textContent = (user.earnings || 0).toFixed(2);
document.getElementById("investmentDisplay").textContent = (user.investment_amount || 0).toFixed(2);

// Referral link
const referralURL = `${window.location.origin}/register.html?ref=${encodeURIComponent(username)}`;
const referralEl = document.getElementById("referralLink");
referralEl.href = referralURL;
referralEl.textContent = referralURL;

// ===== DAILY BONUS =====
const bonusEl = document.getElementById("bonusStatus");

function canClaimBonus() {
  const today = new Date().toDateString();
  return user.lastBonusDate !== today;
}

function updateBonusStatus() {
  if (canClaimBonus()) {
    bonusEl.textContent = "Bonus available today!";
  } else {
    bonusEl.textContent = "You already claimed today’s bonus.";
  }
}

document.getElementById("grabBonusBtn").addEventListener("click", () => {

  if (!canClaimBonus()) {
    alert("You already claimed your bonus today.");
    return;
  }

  const bonusAmount = 50; // fixed demo bonus

  user.balance = (user.balance || 0) + bonusAmount;
  user.earnings = (user.earnings || 0) + bonusAmount;
  user.lastBonusDate = new Date().toDateString();

  saveUser(user);

  alert(`Bonus of KES ${bonusAmount} added!`);

  location.reload();
});

updateBonusStatus();

// ===== LOGOUT =====
function logout() {
  localStorage.removeItem("username");
  localStorage.removeItem("userToken");
  window.location.href = "login.html";
}

</script>

</body>
</html>
