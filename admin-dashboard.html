<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }

  .box {
    max-width: 1200px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2, h3 {
    color: #0a1d66;
    text-align: center;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 14px;
  }

  th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
  }

  th {
    background-color: #0a1d66;
    color: white;
  }

  tr:nth-child(even) { background-color: #f2f2f2; }

  .action-btn {
    padding: 6px 12px;
    margin: 2px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-size: 13px;
    transition: all 0.2s ease;
  }

  .approve-btn { background: #28a745; }
  .reject-btn, .terminate-btn { background: #dc3545; }
  .reset-btn { background: #ffc107; color: black; }

  .action-btn:hover {
    opacity: 0.85;
  }

  .msg {
    margin: 15px 0;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    display: none;
  }

  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<div class="box">
  <h2>Admin Dashboard - Mkoba Wallet</h2>
  <div id="msg" class="msg"></div>

  <h3>User Management</h3>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Phone</th>
        <th>Approved</th>
        <th>Balance</th>
        <th>Earnings</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersTableBody">
      <tr><td colspan="6">Loading users...</td></tr>
    </tbody>
  </table>
</div>

<div class="box">
  <h3>Pending Withdrawal Requests</h3>
  <table id="withdrawalsTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Amount (KES)</th>
        <th>Method</th>
        <th>Account/Phone</th>
        <th>Requested At</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="withdrawalsTableBody">
      <tr><td colspan="6">Loading withdrawal requests...</td></tr>
    </tbody>
  </table>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("adminLoggedIn") !== "true") {
    alert("Please login as admin first");
    window.location.href = "admin-login.html";
    return;
  }

  const usersTableBody = document.getElementById("usersTableBody");
  const withdrawalsTableBody = document.getElementById("withdrawalsTableBody");
  const msg = document.getElementById("msg");

  function showMessage(type, text) {
    msg.className = `msg ${type}`;
    msg.textContent = text;
    msg.style.display = "block";
    setTimeout(() => msg.style.display = "none", 8000);
  }

  // ───── USER MANAGEMENT ─────
  async function fetchUsers() {
    usersTableBody.innerHTML = '<tr><td colspan="6">Loading users...</td></tr>';
    try {
      const res = await fetch(`${BACKEND_URL}/admin/users`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const users = await res.json();

      usersTableBody.innerHTML = "";
      if (!users.length) {
        usersTableBody.innerHTML = '<tr><td colspan="6" style="color:#777;">No users registered yet</td></tr>';
        return;
      }

      users.forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${user.username}</td>
          <td>${user.phone || "N/A"}</td>
          <td>${user.approved ? '<span style="color:green;">Yes</span>' : '<span style="color:red;">No</span>'}</td>
          <td>KES ${Number(user.balance || 0).toFixed(2)}</td>
          <td>KES ${Number(user.earnings || 0).toFixed(2)}</td>
          <td>
            ${!user.approved ? `<button class="action-btn approve-btn" onclick="approveUser('${user.username}')">Approve</button>` : '<span style="color:green;">Approved</span>'}
            <button class="action-btn reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
            <button class="action-btn terminate-btn" onclick="terminateUser('${user.username}')">Terminate</button>
          </td>
        `;
        usersTableBody.appendChild(tr);
      });
    } catch (err) {
      usersTableBody.innerHTML = '<tr><td colspan="6" style="color:red;">Failed to load users</td></tr>';
      console.error(err);
      showMessage("error", "Failed to load users: " + err.message);
    }
  }

  // ───── WITHDRAWAL MANAGEMENT ─────
  async function fetchWithdrawals() {
    withdrawalsTableBody.innerHTML = '<tr><td colspan="6">Loading withdrawal requests...</td></tr>';
    try {
      const res = await fetch(`${BACKEND_URL}/admin/withdrawals/pending`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const withdrawals = await res.json();

      withdrawalsTableBody.innerHTML = "";
      if (!withdrawals.length) {
        withdrawalsTableBody.innerHTML = '<tr><td colspan="6" style="color:#777;">No pending withdrawals</td></tr>';
        return;
      }

      withdrawals.forEach(w => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${w.username}</td>
          <td>KES ${Number(w.amount).toFixed(2)}</td>
          <td>${w.method}</td>
          <td>${w.account}</td>
          <td>${new Date(w.requested_at).toLocaleString()}</td>
          <td>
            <button class="action-btn approve-btn" onclick="approveWithdrawal('${w.id}')">Approve</button>
            <button class="action-btn reject-btn" onclick="rejectWithdrawal('${w.id}')">Reject</button>
          </td>
        `;
        withdrawalsTableBody.appendChild(tr);
      });
    } catch (err) {
      withdrawalsTableBody.innerHTML = '<tr><td colspan="6" style="color:red;">Failed to load withdrawals</td></tr>';
      console.error(err);
      showMessage("error", "Failed to load withdrawals: " + err.message);
    }
  }

  // ───── ADMIN ACTIONS ─────
  async function adminAction(endpoint, data, successMsg, callback) {
    try {
      const res = await fetch(`${BACKEND_URL}/admin/${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(data)
      });
      const result = await res.json();
      if (res.ok) {
        showMessage("success", successMsg);
        if (callback) callback();
      } else showMessage("error", result.detail || "Action failed");
    } catch (err) {
      showMessage("error", "Network error");
      console.error(err);
    }
  }

  window.approveUser = username => {
    if (!confirm(`Approve ${username}?`)) return;
    adminAction("approve-user", { username }, `${username} approved`, fetchUsers);
  };

  window.resetPassword = username => {
    if (!confirm(`Reset password for ${username}?`)) return;
    adminAction("reset-password", { username }, `Password reset for ${username}`, fetchUsers);
  };

  window.terminateUser = username => {
    if (!confirm(`Terminate ${username}? This is permanent!`)) return;
    adminAction("terminate-user", { username }, `${username} terminated`, fetchUsers);
  };

  window.approveWithdrawal = id => {
    if (!confirm("Approve this withdrawal?")) return;
    adminAction("withdrawals/approve", { id }, "Withdrawal approved", fetchWithdrawals);
  };

  window.rejectWithdrawal = id => {
    if (!confirm("Reject this withdrawal?")) return;
    adminAction("withdrawals/reject", { id }, "Withdrawal rejected", fetchWithdrawals);
  };

  // Initial load
  fetchUsers();
  fetchWithdrawals();
});
</script>

</body>
</html>
