<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const passwordInput = document.getElementById("adminPassword");
  const togglePassword = document.getElementById("togglePassword");
  const loginBtn = document.getElementById("adminLoginBtn");
  const msg = document.getElementById("adminMsg");

  // Eye icon toggle (👁️ / 🙈)
  togglePassword.addEventListener("click", () => {
    const isPassword = passwordInput.type === "password";
    passwordInput.type = isPassword ? "text" : "password";
    togglePassword.textContent = isPassword ? "🙈" : "👁️";
  });

  function showMessage(type, text) {
    msg.className = type;
    msg.textContent = String(text || "Unknown error");
  }

  loginBtn.addEventListener("click", async () => {
    const password = passwordInput.value.trim();

    if (!password) {
      showMessage("error", "Please enter the admin password");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    showMessage("loading", "Verifying admin access...");

    try {
      const res = await fetch(`${BACKEND_URL}/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          username: "admin", 
          password: password 
        })
      });

      let data;
      try {
        data = await res.json();
      } catch (e) {
        const text = await res.text().catch(() => "Server error");
        data = { detail: text };
      }

      if (res.ok) {
        showMessage("success", "Admin login successful! Redirecting...");
        localStorage.setItem("adminLoggedIn", "true");
        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 1500);
      } else {
        const errorText = data.detail || data.message || "Invalid admin credentials";
        showMessage("error", errorText);
      }
    } catch (err) {
      console.error(err);
      showMessage("error", "Cannot connect to server. Check internet or Render logs.");
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
});
</script>
