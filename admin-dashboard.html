<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }

  .box {
    max-width: 1200px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2, h3 {
    color: #0a1d66;
    text-align: center;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 14px;
  }

  th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
  }

  th {
    background-color: #0a1d66;
    color: white;
  }

  tr:nth-child(even) { background-color: #f2f2f2; }

  .action-btn {
    padding: 6px 12px;
    margin: 2px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-size: 13px;
  }

  .approve-btn { background: #28a745; }
  .terminate-btn { background: #dc3545; }
  .reset-btn { background: #ffc107; color: black; }

  .msg {
    margin: 15px 0;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    display: none;
  }

  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<div class="box">
  <h2>Admin Dashboard - Mkoba Wallet</h2>
  <div id="msg" class="msg"></div>

  <h3>User Management</h3>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Phone</th>
        <th>Approved</th>
        <th>Balance</th>
        <th>Earnings</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersTableBody">
      <tr><td colspan="6">Loading users...</td></tr>
    </tbody>
  </table>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";
const ADMIN_PASSWORD = "PHIL4857";

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("adminLoggedIn") !== "true") {
    alert("Please login as admin first");
    window.location.href = "admin-login.html";
    return;
  }

  const usersTableBody = document.getElementById("usersTableBody");
  const msg = document.getElementById("msg");

  function showMessage(type, text) {
    msg.className = `msg ${type}`;
    msg.textContent = text;
    msg.style.display = "block";
    setTimeout(() => msg.style.display = "none", 8000);
  }

  // Fetch Users
  async function fetchUsers() {
    usersTableBody.innerHTML = '<tr><td colspan="6">Loading users...</td></tr>';
    try {
      const res = await fetch(`${BACKEND_URL}/admin/users`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: ADMIN_PASSWORD })
      });

      if (!res.ok) throw new Error("Failed to load users");
      const users = await res.json();

      usersTableBody.innerHTML = "";
      if (!users || users.length === 0) {
        usersTableBody.innerHTML = '<tr><td colspan="6" style="color:#777;">No users registered yet</td></tr>';
        return;
      }

      users.forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${user.username}</td>
          <td>${user.phone || "N/A"}</td>
          <td>${user.approved ? '<span style="color:green;">✓ Yes</span>' : '<span style="color:red;">✗ No</span>'}</td>
          <td>KES ${Number(user.balance || 0).toFixed(2)}</td>
          <td>KES ${Number(user.earnings || 0).toFixed(2)}</td>
          <td>
            \( {!user.approved ? `<button class="action-btn approve-btn" onclick="approveUser(' \){user.username}')">Approve</button>` : '<span style="color:green;">Approved</span>'}
            <button class="action-btn reset-btn" onclick="resetPassword('${user.username}')">Reset Password</button>
            <button class="action-btn terminate-btn" onclick="terminateUser('${user.username}')">Terminate</button>
          </td>
        `;
        usersTableBody.appendChild(tr);
      });
    } catch (err) {
      console.error(err);
      usersTableBody.innerHTML = '<tr><td colspan="6" style="color:red;">Failed to load users</td></tr>';
      showMessage("error", "Failed to load users. Check console (F12) for details.");
    }
  }

  // Admin Action Helper
  async function adminAction(endpoint, bodyData, successMsg, callback) {
    try {
      const res = await fetch(`\( {BACKEND_URL}/admin/ \){endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          ...bodyData, 
          password: ADMIN_PASSWORD 
        })
      });

      const result = await res.json();

      if (res.ok) {
        showMessage("success", successMsg);
        if (callback) callback();
      } else {
        showMessage("error", result.detail || "Action failed");
      }
    } catch (err) {
      console.error(err);
      showMessage("error", "Network error - please check console (F12)");
    }
  }

  window.approveUser = (username) => {
    if (!confirm(`Approve user ${username}?`)) return;
    adminAction("approve-user", { username }, `${username} has been approved`, fetchUsers);
  };

  window.resetPassword = (username) => {
    if (!confirm(`Reset password for ${username}?`)) return;
    adminAction("reset-password", { username }, `Password reset for ${username}`, fetchUsers);
  };

  window.terminateUser = (username) => {
    if (!confirm(`Terminate ${username}? This is permanent!`)) return;
    adminAction("terminate-user", { username }, `${username} has been terminated`, fetchUsers);
  };

  // Load users when page opens
  fetchUsers();
});
</script>

</body>
</html>
