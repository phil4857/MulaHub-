<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard - Mkoba Wallet 💵🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f9ff; margin: 0; }
        header {
            background: linear-gradient(90deg, #0a1d66, #1234a0);
            color: #ffd700;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        .container {
            background: #fff;
            margin: 20px auto;
            padding: 25px;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .info p {
            background: #f0f8f0;
            padding: 12px;
            border-left: 5px solid #0a1d66;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .investment-list {
            margin-top: 20px;
        }
        .investment-item {
            background: #e9ecef;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-top: 20px;
        }
        .actions button {
            flex: 1 1 45%;
            margin: 10px 5px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to right, #0a1d66, #1234a0);
            color: #ffd700;
        }
        .msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: #007bff; }
    </style>
</head>
<body>

<header>
    <h1>Investment Dashboard 💵🎉</h1>
</header>

<div class="container">
    <div class="info">
        <p>Username: <span id="usernameDisplay"></span></p>
        <p>Balance: KES <span id="balanceDisplay">0.00</span></p>
        <p>Total Earnings: KES <span id="earningsDisplay">0.00</span></p>
        <p>Investment Amount: KES <span id="investmentDisplay">0.00</span></p>
    </div>

    <p id="msg" class="msg loading">Loading investments...</p>

    <div class="investment-list" id="investmentList"></div>

    <div class="actions">
        <button onclick="investRequest()">💰 Invest</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>

    <!-- Investment Section -->
    <h3>Invest in Commodity</h3>
    <select id="commoditySelect">
        <option value="">Select Commodity</option>
        <option value="marble">Marble - KES 650 (15 days)</option>
        <option value="crude_oil">Crude Oil - KES 800 (20 days)</option>
        <option value="silver">Silver - KES 1000 (23 days)</option>
        <option value="lead">Lead - KES 1200 (25 days)</option>
        <option value="platinum">Platinum - KES 1350 (28 days)</option>
        <option value="diamonds">Diamonds - KES 1750 (32 days)</option>
        <option value="gold">Gold - KES 2200 (35 days)</option>
        <option value="uranium">Uranium - KES 3000 (45 days)</option>
    </select>
    <button onclick="investRequest()">Invest</button>

    <div id="investOtpSection" style="display:none; margin-top:15px; padding:15px; background:#f8f9fa; border-radius:10px;">
        <p id="investOtpDisplay"></p>
        <input id="investOtpInput" type="text" placeholder="Enter OTP" class="w-full p-2 border rounded-md" />
        <button onclick="investConfirm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md w-full mt-2">Confirm Investment</button>
    </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", async () => {
    const username = localStorage.getItem("username");
    if (!username) {
        window.location.href = "login.html";
        return;
    }

    const msg = document.getElementById("msg");

    async function fetchUserData() {
        msg.className = "msg loading";
        msg.textContent = "Loading dashboard...";

        try {
            const response = await fetch(`\( {BACKEND_URL}/dashboard?username= \){encodeURIComponent(username)}`);

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                msg.className = "msg error";
                msg.textContent = data.detail || `Error ${response.status}`;
                if (response.status === 403) {
                    msg.textContent = "Account not approved yet. Please wait for admin approval.";
                }
                logout();
                return null;
            }

            return await response.json();
        } catch (err) {
            msg.className = "msg error";
            msg.textContent = "Cannot connect to server. Check your internet.";
            console.error("Dashboard fetch error:", err);
            return null;
        }
    }

    async function updateUI() {
        const user = await fetchUserData();
        if (!user) return;

        document.getElementById("usernameDisplay").textContent = user.username || username;
        document.getElementById("balanceDisplay").textContent = Number(user.balance || 0).toFixed(2);
        document.getElementById("earningsDisplay").textContent = Number(user.earnings || 0).toFixed(2);

        let invested = 0;
        if (user.investments && typeof user.investments === 'object') {
            Object.values(user.investments).forEach(item => {
                invested += Number(item.amount || 0);
            });
        }
        document.getElementById("investmentDisplay").textContent = invested.toFixed(2);

        renderInvestments(user.investments || {});
        msg.className = "msg success";
        msg.textContent = "Dashboard loaded!";
    }

    function renderInvestments(investments) {
        const container = document.getElementById("investmentList");
        container.innerHTML = "";

        if (!investments || Object.keys(investments).length === 0) {
            container.textContent = "No active investments.";
            return;
        }

        for (const [commodity, inv] of Object.entries(investments)) {
            const div = document.createElement("div");
            div.className = "investment-item";
            const expiry = new Date(inv.expiry_date);
            const remainingDays = Math.max(Math.floor((expiry - new Date()) / (1000 * 60 * 60 * 24)), 0);
            div.textContent = `${commodity.toUpperCase()}: KES ${inv.amount}, Expires in ${remainingDays} day(s)`;
            container.appendChild(div);
        }
    }

    window.investRequest = async function () {
        const commodity = document.getElementById("commoditySelect").value;
        if (!commodity) return alert("Select a commodity.");

        msg.className = "msg loading";
        msg.textContent = "Sending investment request...";

        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("commodity", commodity);

        try {
            const res = await fetch(`${BACKEND_URL}/invest/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (res.ok) {
                msg.className = "msg success";
                msg.textContent = data.message || 'Investment request created. Awaiting confirmation.';
            } else {
                msg.className = "msg error";
                msg.textContent = data.detail || 'Investment request failed.';
            }
        } catch (err) {
            msg.className = "msg error";
            msg.textContent = "Network error during request.";
            console.error(err);
        }
    };

    window.logout = function () {
        localStorage.removeItem("username");
        window.location.href = "login.html";
    };

    updateUI(); // Initial load
});
</script>

</body>
</html>
