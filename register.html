<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Mkoba Wallet</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }

  .container {
    width: 100%;
    max-width: 400px;
    background: #ffffffee;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    backdrop-filter: blur(6px);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
  }

  input:focus {
    outline: none;
    border-color: #2a5298;
    box-shadow: 0 0 5px rgba(42,82,152,0.5);
  }

  button {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  .msg {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
  }

  .msg.error { color: #dc3545; }
  .msg.success { color: #28a745; }
  .msg.loading { color: #007bff; }

</style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form id="registerForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="text" id="phone" placeholder="Phone (07xxxxxxxx or 01xxxxxxxx)" required />
    <input type="password" id="password" placeholder="Password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
    <input type="text" id="referral" placeholder="Referral (optional)" />
    <button type="submit" id="registerBtn">Register</button>
  </form>

  <div id="msg" class="msg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

document.addEventListener('DOMContentLoaded', () => {

  const form = document.getElementById('registerForm');
  const msg = document.getElementById('msg');
  const registerBtn = document.getElementById('registerBtn');

  const usernameInput = document.getElementById('username');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const referralInput = document.getElementById('referral');

  usernameInput.focus();

  // Autofill referral
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) referralInput.value = ref;

  function showMessage(type, text) {
    msg.className = 'msg ' + type;
    msg.textContent = text;
  }

  function normalizePhone(p) {
    return p.replace(/[^\d]/g, '');
  }

  function isValidPhone(phone) {
    return /^(07|01)\d{8}$/.test(phone);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = usernameInput.value.trim().toLowerCase();
    const phone = normalizePhone(phoneInput.value.trim());
    const password = passwordInput.value;
    const confirmPwd = confirmPasswordInput.value;
    const referral = referralInput.value.trim().toLowerCase();

    // Validation
    if (!username || !phone || !password || !confirmPwd) {
      return showMessage('error', 'Fill all fields.');
    }

    if (!isValidPhone(phone)) {
      return showMessage('error', 'Invalid phone format.');
    }

    if (password !== confirmPwd) {
      return showMessage('error', 'Passwords do not match.');
    }

    registerBtn.disabled = true;
    registerBtn.textContent = "Registering...";
    showMessage('loading', 'Creating account...');

    try {
      const res = await fetch(`${BACKEND_URL}/register`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, phone, password, referral })
      });

      let data;
      try {
        data = await res.json();
      } catch {
        data = { message: await res.text() };
      }

      if (res.ok) {
        showMessage('success', data.message || "Registered successfully!");
        setTimeout(() => window.location.href = "login.html", 1200);
      } else {

        // ✅ FIXED ERROR HANDLING (NO MORE [object Object])
        let errMsg = "Registration failed";

        if (typeof data === "string") {
          errMsg = data;
        } else if (data.message) {
          errMsg = data.message;
        } else if (data.detail) {
          if (Array.isArray(data.detail)) {
            errMsg = data.detail.map(e => e.msg || "Error").join(" • ");
          } else {
            errMsg = data.detail;
          }
        }

        showMessage('error', errMsg);
      }

    } catch (err) {
      console.error(err);
      showMessage('error', 'Server not reachable.');
    }

    registerBtn.disabled = false;
    registerBtn.textContent = "Register";
  });
});
</script>

</body>
</html>
