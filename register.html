<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }

  document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const number = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const referral = document.getElementById('referral').value.trim();
    const terms = document.getElementById('terms').checked;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    errorMsg.textContent = '';
    successMsg.textContent = '';

    if (!terms) {
      errorMsg.textContent = 'You must agree to the terms and conditions.';
      return;
    }

    if (!/^[0-9]{10}$/.test(number)) {
      errorMsg.textContent = 'Invalid phone number. Must be exactly 10 digits.';
      return;
    }

    if (password.length < 6) {
      errorMsg.textContent = 'Password must be at least 6 characters.';
      return;
    }

    if (password !== confirm) {
      errorMsg.textContent = 'Passwords do not match.';
      return;
    }

    try {
      const res = await fetch("http://localhost:8000/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, number, password, confirm, referral: referral || null })
      });

      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.detail || "Registration failed.";
      } else {
        successMsg.textContent = "Registration successful! Redirecting...";
        localStorage.setItem("username", data.username);
        setTimeout(() => {
          window.location.href = data.redirect || "dashboard.html";
        }, 2000);
      }

    } catch (err) {
      errorMsg.textContent = "An error occurred. Please try again later.";
      console.error(err);
    }
  });
</script>
