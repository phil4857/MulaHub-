<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join MulaHub 🚀 - Create Account</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #0ea5e9);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
  padding:20px;
}

.container{
  width:100%;
  max-width:520px;
  background:white;
  padding:3rem 2.5rem;
  border-radius:28px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
}

.top-banner{
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color:white;
  padding:16px;
  border-radius:16px;
  text-align:center;
  font-weight:800;
  font-size:1.3rem;
  margin-bottom:22px;
}

.bottom-banner{
  background: linear-gradient(90deg, #f97316, #ef4444);
  color:white;
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-weight:700;
  margin-top:24px;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.85;}
}

h2{
  text-align:center;
  margin-bottom:1.8rem;
  color:#0f172a;
  font-size:2.2rem;
  font-weight:800;
}

.subtext{
  text-align:center;
  margin-bottom:2rem;
  color:#64748b;
  font-size:1rem;
}

.input-group{
  position:relative;
  margin-bottom:1.5rem;
}

input{
  width:100%;
  padding:18px 20px;
  padding-right:60px;
  border:2px solid #e2e8f0;
  border-radius:16px;
  font-size:1.1rem;
  transition:.3s;
  background:#f8fafc;
}

input:focus{
  outline:none;
  border-color:#0ea5e9;
  box-shadow:0 0 0 4px rgba(14,165,233,.2);
  background:white;
}

.toggle-eye{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#64748b;
  font-size:1.3rem;
}

button{
  width:100%;
  padding:18px;
  background: linear-gradient(90deg, #0ea5e9, #2563eb);
  color:white;
  border:none;
  border-radius:16px;
  font-weight:800;
  font-size:1.2rem;
  cursor:pointer;
  transition:.3s;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(37,99,235,.35);
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

.msg{
  margin-top:18px;
  text-align:center;
  font-weight:600;
  padding:14px;
  border-radius:14px;
}
  </style>
</head>

<body>

<div class="container">

  <div class="top-banner">
    🚀 Join MulaHub & Start Your Digital Income Journey
  </div>

  <h2>Create Your Account</h2>
  <p class="subtext">Register once, unlock investment plans & daily earnings.</p>

  <form id="registerForm">

    <div class="input-group">
      <input type="text" id="username" placeholder="Choose a username" required>
    </div>

    <div class="input-group">
      <input type="text" id="phone" placeholder="Phone number (07xxxxxxxx / 01xxxxxxxx)" required>
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Create password" required>
      <span class="toggle-eye" onclick="togglePassword('password')">
        <i class="fas fa-eye"></i>
      </span>
    </div>

    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      <span class="toggle-eye" onclick="togglePassword('confirmPassword')">
        <i class="fas fa-eye"></i>
      </span>
    </div>

    <div class="input-group">
      <input type="text" id="referral" placeholder="Referral code (optional)">
    </div>

    <button type="submit" id="registerBtn">Start Earning Account 🚀</button>

  </form>

  <div id="msg" class="msg"></div>

  <div class="bottom-banner">
    💰 Thousands already earning daily with MulaHub
  </div>

</div>

<script>

const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

/* ---------------- PASSWORD TOGGLE ---------------- */
function togglePassword(fieldId){
  const input = document.getElementById(fieldId);
  const icon = input.parentElement.querySelector("i");

  if(input.type === "password"){
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

/* ---------------- FORM LOGIC ---------------- */
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("registerForm");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("registerBtn");

  // Auto-fill referral from URL
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if(ref){
    document.getElementById("referral").value = ref;
  }

  function showMessage(type, text){
    msg.className = `msg ${type}`;
    msg.textContent = text;
    setTimeout(() => msg.textContent = "", 7000);
  }

  function normalizePhone(phone){
    return phone.replace(/[^\d]/g,'');
  }

  function validPhone(phone){
    return /^(07|01)\d{8}$/.test(phone);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim().toLowerCase();
    const phone = normalizePhone(document.getElementById("phone").value.trim());
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const referral = document.getElementById("referral").value.trim().toLowerCase();

    if(!username || !phone || !password || !confirmPassword){
      return showMessage("error", "Please fill all required fields");
    }

    if(!validPhone(phone)){
      return showMessage("error", "Use valid phone format (07XXXXXXXX / 01XXXXXXXX)");
    }

    if(password !== confirmPassword){
      return showMessage("error", "Passwords do not match");
    }

    if(password.length < 6){
      return showMessage("error", "Password must be at least 6 characters");
    }

    btn.disabled = true;
    btn.textContent = "Creating your MulaHub account...";

    try {

      const res = await fetch(`${BACKEND_URL}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username,
          phone,
          password,
          referral: referral || null
        })
      });

      const data = await res.json().catch(() => ({}));

      if(res.ok){
        showMessage("success", data.message || "Account created successfully 🚀");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } else {
        showMessage("error", data.detail || data.message || "Registration failed");
      }

    } catch (err) {
      console.error(err);
      showMessage("error", "Server connection failed. Try again later.");
    }

    btn.disabled = false;
    btn.textContent = "Start Earning Account 🚀";
  });

});

</script>

</body>
</html>
