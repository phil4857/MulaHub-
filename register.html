<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Mkoba Wallet</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:linear-gradient(135deg,#28a745,#007bff);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
color:#333;
}

.box{
background:white;
padding:40px 30px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.25);
width:360px;
max-width:90%;
text-align:center;
}

h2{
margin:0 0 28px 0;
color:#28a745;
font-size:1.9rem;
}

label{
display:block;
text-align:left;
margin:8px 0 4px;
font-weight:600;
color:#444;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:1rem;
}

input:focus{
outline:none;
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.15);
}

button{
width:100%;
padding:14px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
font-size:1.1rem;
cursor:pointer;
margin-top:12px;
transition:background 0.2s;
}

button:hover:not(:disabled){
background:#0056b3;
}

button:disabled{
background:#6c757d;
cursor:not-allowed;
}

.msg{
margin-top:16px;
padding:12px;
border-radius:6px;
font-weight:600;
min-height:24px;
font-size:0.95rem;
}

.success{background:#d4edda;color:#155724;}
.error{background:#f8d7da;color:#721c24;}
.loading{background:#e3f2fd;color:#0c5460;}

.login-link{
margin-top:20px;
font-size:0.95rem;
}

.login-link a{
color:#007bff;
text-decoration:none;
font-weight:600;
}

.login-link a:hover{
text-decoration:underline;
}
</style>

</head>
<body>

<div class="box">

<h2>Register to Mkoba Wallet</h2>

<form id="registerForm">

<label for="username">Username (no spaces, 3+ characters)</label>
<input id="username" type="text" required autocomplete="username">

<label for="phone">Phone Number</label>
<input id="phone" type="tel" required autocomplete="tel">

<label for="password">Password</label>
<input id="password" type="password" required autocomplete="new-password">

<label for="confirmPassword">Confirm Password</label>
<input id="confirmPassword" type="password" required autocomplete="new-password">

<label for="referral">Referral Code (optional)</label>
<input id="referral" type="text" autocomplete="off">

<button type="submit" id="registerBtn">Register</button>

</form>

<div class="msg" id="msg"></div>

<div class="login-link">
Already have an account? <a href="login.html">Login here</a>
</div>

</div>

<script>

const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("registerForm");
    const registerBtn = document.getElementById("registerBtn");
    const msg = document.getElementById("msg");

    const usernameInput = document.getElementById("username");
    const phoneInput = document.getElementById("phone");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const referralInput = document.getElementById("referral");

    /* autofill referral from ?ref= */
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if (ref) referralInput.value = ref;

    /* password match check */
    function checkPasswordMatch() {
        const p = passwordInput.value;
        const c = confirmPasswordInput.value;

        if (!c) {
            msg.textContent = "";
            return;
        }

        if (p !== c) {
            msg.className = "msg error";
            msg.textContent = "Passwords do not match";
            registerBtn.disabled = true;
        } else {
            msg.className = "msg success";
            msg.textContent = "Passwords match ✓";
            registerBtn.disabled = false;
        }
    }

    passwordInput.addEventListener("input", checkPasswordMatch);
    confirmPasswordInput.addEventListener("input", checkPasswordMatch);

    /* register submit */
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        msg.textContent = "";
        msg.className = "msg";

        const username = usernameInput.value.trim().toLowerCase();
        const phone = phoneInput.value.trim();
        const pwd = passwordInput.value;
        const confirmPwd = confirmPasswordInput.value;
        const referral = referralInput.value.trim().toLowerCase();

        if (!username || !phone || !pwd || !confirmPwd) {
            msg.className = "msg error";
            msg.textContent = "Fill all required fields.";
            return;
        }

        if (username.includes(" ") || username.length < 3) {
            msg.className = "msg error";
            msg.textContent = "Username must be 3+ characters with no spaces.";
            return;
        }

        if (!/^(07|01)\d{8}$/.test(phone)) {
            msg.className = "msg error";
            msg.textContent = "Phone must be 07XXXXXXXX or 01XXXXXXXX";
            return;
        }

        if (pwd.length < 6) {
            msg.className = "msg error";
            msg.textContent = "Password must be at least 6 characters.";
            return;
        }

        if (pwd !== confirmPwd) {
            msg.className = "msg error";
            msg.textContent = "Passwords do not match.";
            return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = "Registering...";

        msg.className = "msg loading";
        msg.textContent = "Creating account...";

        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("phone", phone);
        formData.append("password", pwd);
        if (referral) formData.append("referral", referral);

        try {
            const res = await fetch(`${BACKEND_URL}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            let data;
            try {
                data = await res.json();
            } catch (e) {
                data = { detail: "Server returned invalid response" };
            }

            if (res.ok) {
                msg.className = "msg success";
                msg.textContent = data.message || "Registration successful! Redirecting to login...";

                // Auto redirect after success
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2200);

            } else {
                msg.className = "msg error";
                msg.textContent = data.detail || data.message || `Error ${res.status}: Registration failed`;
                console.error("Backend error:", res.status, data);
            }
        } catch (err) {
            console.error("Network/fetch error:", err);
            msg.className = "msg error";
            msg.textContent = "Cannot connect to server. Check internet or try later.";
        } finally {
            // Always restore button
            registerBtn.disabled = false;
            registerBtn.textContent = "Register";
        }
    });

});

</script>

</body>
</html>
