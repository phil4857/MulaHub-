<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Mkoba Wallet</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
overflow:hidden;
}

.container{
width:100%;
max-width:480px;
background:white;
padding:3rem 2.2rem;
border-radius:26px;
box-shadow:0 25px 65px rgba(0,0,0,0.35);
}

.live-banner-top{
background:#27ae60;
color:white;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:700;
font-size:1.45rem;
margin-bottom:26px;
box-shadow:0 5px 15px rgba(39,174,96,0.4);
}

.live-banner-bottom{
background:#e67e22;
color:white;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:600;
margin-top:26px;
font-size:1.2rem;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:.9;}
}

h2{
text-align:center;
margin-bottom:2rem;
color:#e67e22;
font-size:2.3rem;
font-weight:700;
}

.input-group{
position:relative;
margin-bottom:1.7rem;
}

input{
width:100%;
padding:20px 22px;
padding-right:70px;
background:white;
border:2px solid #e5e7eb;
border-radius:16px;
color:#1f2937;
font-size:1.35rem;
transition:.3s;
}

input:focus{
outline:none;
border-color:#27ae60;
box-shadow:0 0 0 4px rgba(39,174,96,.25);
}

.toggle-eye{
position:absolute;
right:22px;
top:50%;
transform:translateY(-50%);
color:#6b7280;
cursor:pointer;
font-size:1.9rem;
}

button{
width:100%;
padding:20px;
background:#27ae60;
color:white;
border:none;
border-radius:16px;
font-weight:bold;
font-size:1.4rem;
cursor:pointer;
transition:.3s;
margin-top:12px;
}

button:hover{
transform:translateY(-3px);
background:#219653;
box-shadow:0 12px 30px rgba(39,174,96,.45);
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.msg{
margin-top:20px;
text-align:center;
font-weight:600;
padding:16px;
border-radius:14px;
font-size:1.2rem;
}

</style>
</head>

<body>

<div class="container">

<div class="live-banner-top">
🎉 Welcome to Mkoba Wallet 🤑
</div>

<h2>Create Your Account</h2>

<form id="registerForm">

<div class="input-group">
<input type="text" id="username" placeholder="Choose username" required>
</div>

<div class="input-group">
<input type="text" id="phone" placeholder="Phone number (07xxxxxxxx)or (01xxxxxxxx)" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Create password" required>
<span class="toggle-eye" onclick="togglePassword('password')">
<i class="fas fa-eye"></i>
</span>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" placeholder="Confirm password" required>
<span class="toggle-eye" onclick="togglePassword('confirmPassword')">
<i class="fas fa-eye"></i>
</span>
</div>

<div class="input-group">
<input type="text" id="referral" placeholder="Referral code (optional)">
</div>

<button type="submit" id="registerBtn">Create My Account</button>

</form>

<div id="msg" class="msg"></div>

<div class="live-banner-bottom">
🚀 Thousands of people are making money daily with Mkoba Wallet 💰
</div>

</div>

<script>

const BACKEND_URL="https://repo-1red-jipate-bonus-1-kwee.onrender.com"

function togglePassword(fieldId){

const input=document.getElementById(fieldId)
const icon=input.parentElement.querySelector("i")

if(input.type==="password"){
input.type="text"
icon.classList.remove("fa-eye")
icon.classList.add("fa-eye-slash")
}else{
input.type="password"
icon.classList.remove("fa-eye-slash")
icon.classList.add("fa-eye")
}

}

document.addEventListener("DOMContentLoaded",()=>{

const form=document.getElementById("registerForm")
const msg=document.getElementById("msg")
const registerBtn=document.getElementById("registerBtn")

const params=new URLSearchParams(window.location.search)
const ref=params.get("ref")
if(ref)document.getElementById("referral").value=ref

function showMessage(type,text){

msg.className=`msg ${type}`
msg.textContent=text
setTimeout(()=>msg.textContent="",8000)

}

function normalizePhone(p){
return p.replace(/[^\d]/g,'')
}

function isValidPhone(phone){
return /^(07|01)\d{8}$/.test(phone)
}

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const username=document.getElementById("username").value.trim().toLowerCase()
const phone=normalizePhone(document.getElementById("phone").value.trim())
const password=document.getElementById("password").value
const confirmPwd=document.getElementById("confirmPassword").value
const referral=document.getElementById("referral").value.trim().toLowerCase()

if(!username||!phone||!password||!confirmPwd){
return showMessage("error","Please fill all required fields")
}

if(!isValidPhone(phone)){
return showMessage("error","Phone must start with 07 or 01 and be 10 digits")
}

if(password!==confirmPwd){
return showMessage("error","Passwords do not match")
}

if(password.length<6){
return showMessage("error","Password must be at least 6 characters")
}

registerBtn.disabled=true
registerBtn.textContent="Creating account..."

try{

const res=await fetch(`${BACKEND_URL}/register`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username,
phone,
password,
referral:referral||null
})
})

const data=await res.json().catch(()=>({}))

if(res.ok){
showMessage("success",data.message||"Account created successfully 🎉")
setTimeout(()=>window.location.href="login.html",1500)
}else{
showMessage("error",data.detail||data.message||"Registration failed")
}

}catch{

showMessage("error","Cannot connect to server")

}finally{

registerBtn.disabled=false
registerBtn.textContent="Create My Account"

}

})

})

</script>

</body>
</html>
