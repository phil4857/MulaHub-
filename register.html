<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
  .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
  input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
  button { background: #007bff; color: #fff; border: none; cursor: pointer; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .msg { margin-top: 10px; font-weight: bold; }
  .msg.error { color: #dc3545; }
  .msg.success { color: #28a745; }
  .msg.loading { color: #007bff; }
</style>
</head>
<body>

<div class="container">
  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="text" id="phone" placeholder="Phone (07xxxxxxx or 01xxxxxxx)" required />
    <input type="password" id="password" placeholder="Password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
    <input type="text" id="referral" placeholder="Referral (optional)" />
    <button type="submit" id="registerBtn">Register</button>
  </form>
  <div id="msg" class="msg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('registerForm');
  const registerBtn = document.getElementById('registerBtn');
  const msg = document.getElementById('msg');

  const usernameInput = document.getElementById('username');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const referralInput = document.getElementById('referral');

  usernameInput.focus();

  // Autofill referral from URL query ?ref=...
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) referralInput.value = ref;

  function showMessage(kind, text) {
    msg.className = 'msg ' + (kind || '');
    msg.textContent = text || '';
  }

  function normalizePhone(p) {
    if (!p) return '';
    return p.replace(/[^\d+]/g, '');
  }

  function isValidPhone(phone) {
    // Must start with 07 or 01 and 10 digits
    return /^(07|01)\d{8}$/.test(phone);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    showMessage('', '');

    const username = usernameInput.value.trim().toLowerCase();
    const phone = normalizePhone(phoneInput.value.trim());
    const password = passwordInput.value;
    const confirmPwd = confirmPasswordInput.value;
    const referral = referralInput.value.trim().toLowerCase();

    // Validation
    if (!username || !phone || !password || !confirmPwd) {
      showMessage('error', 'Fill all required fields.');
      return;
    }
    if (username.length < 3) {
      showMessage('error', 'Username must be at least 3 characters.');
      return;
    }
    if (!isValidPhone(phone)) {
      showMessage('error', 'Phone must start with 07 or 01 and be 10 digits.');
      return;
    }
    if (password.length < 6) {
      showMessage('error', 'Password should be at least 6 characters.');
      return;
    }
    if (password !== confirmPwd) {
      showMessage('error', 'Passwords do not match.');
      return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = 'Registering...';
    showMessage('loading', 'Creating account...');

    try {
      const payload = { username, phone, password };
      if (referral) payload.referral = referral;

      const res = await fetch(`${BACKEND_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      let data;
      try {
        data = await res.json();
      } catch {
        const text = await res.text();
        data = { message: text };
      }

      if (res.ok) {
        showMessage('success', data.message || 'Registration successful. Redirecting to login...');
        localStorage.setItem('just_registered_username', username);
        setTimeout(() => window.location.href = 'login.html', 1400);
      } else {
        let errMsg = data.detail || data.message || 'Registration failed.';
        if (!errMsg && typeof data === 'object') {
          if (Array.isArray(data)) errMsg = data.map(i => i.msg || JSON.stringify(i)).join(' • ');
          else errMsg = JSON.stringify(data);
        }
        showMessage('error', errMsg);
      }

    } catch (err) {
      console.error('Register error:', err);
      showMessage('error', 'Cannot connect to server. Please try again.');
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = 'Register';
    }
  });
});
</script>

</body>
</html>
