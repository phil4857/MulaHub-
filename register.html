<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  width: 320px;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
}

.msg.success { color: green; }
.msg.error { color: red; }
.msg.loading { color: orange; }
</style>
</head>

<body>

<div class="box">
  <h2>Register</h2>

  <!-- IMPORTANT: IDs must match JS -->
  <form id="registerForm">
    <input id="username" placeholder="Username" required>
    <input id="phone" placeholder="Phone (07XXXXXXXX)" required>
    <input id="password" type="password" placeholder="Password" required>
    <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
    <input id="referral" placeholder="Referral (optional)">
    
    <button id="registerBtn" type="submit">Register</button>
  </form>

  <div id="msg" class="msg"></div>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {

  fetch(`${BACKEND_URL}/health`).catch(()=>{});

  const form = document.getElementById("registerForm");
  const registerBtn = document.getElementById("registerBtn");
  const msg = document.getElementById("msg");

  const usernameInput = document.getElementById("username");
  const phoneInput = document.getElementById("phone");
  const passwordInput = document.getElementById("password");
  const confirmPasswordInput = document.getElementById("confirmPassword");
  const referralInput = document.getElementById("referral");

  usernameInput.focus();

  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if (ref) referralInput.value = ref;

  function showMessage(type, text) {
    msg.className = "msg " + type;
    msg.textContent = text;
  }

  function normalizePhone(p) {
    return p.replace(/[^\d+]/g, "");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = usernameInput.value.trim().toLowerCase();
    const phone = normalizePhone(phoneInput.value.trim());
    const pwd = passwordInput.value;
    const confirmPwd = confirmPasswordInput.value;
    const referral = referralInput.value.trim().toLowerCase();

    if (!username || !phone || !pwd || !confirmPwd) {
      showMessage("error", "Fill all fields");
      return;
    }

    if (pwd !== confirmPwd) {
      showMessage("error", "Passwords do not match");
      return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = "Registering...";
    showMessage("loading", "Creating account...");

    try {
      const res = await fetch(`${BACKEND_URL}/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username,
          phone,
          password: pwd,
          referral: referral || null
        })
      });

      const data = await res.json();

      if (res.ok) {
        showMessage("success", data.message || "Registration successful");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);
      } else {
        // FIXED: no more [object Object]
        if (typeof data.detail === "object") {
          showMessage("error", JSON.stringify(data.detail));
        } else {
          showMessage("error", data.detail || "Registration failed");
        }
      }

    } catch (err) {
      console.error(err);
      showMessage("error", "Server not reachable");
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = "Register";
    }
  });
});
</script>

</body>
</html>
