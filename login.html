<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc); /* modern gradient */
    padding: 20px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 400px;
    background: #ffffffdd; /* semi-transparent white */
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  input:focus {
    outline: none;
    border-color: #6a11cb;
    box-shadow: 0 0 5px rgba(106,17,203,0.5);
  }

  button {
    background: #6a11cb;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }

  button:hover {
    background: #2575fc;
  }

  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  .toggle-password {
    cursor: pointer;
    position: absolute;
    right: 15px;
    top: 43px;
    user-select: none;
    font-size: 18px;
  }

  .msg {
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
  }

  .msg.error { color: #dc3545; }
  .msg.success { color: #28a745; }
  .msg.loading { color: #2575fc; }

  .password-container {
    position: relative;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required />
    <div class="password-container">
      <input type="password" id="password" placeholder="Password" required />
      <span id="togglePassword" class="toggle-password">👁️</span>
    </div>
    <button type="submit" id="loginBtn">Login</button>
  </form>
  <div id="loginError" class="msg"></div>
  <div id="loginSuccess" class="msg"></div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('loginError');
  const successMsg = document.getElementById('loginSuccess');
  const submitBtn = document.getElementById('loginBtn');
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    errorMsg.textContent = '';
    successMsg.textContent = '';

    const username = document.getElementById('username')?.value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!username || !password) {
      errorMsg.textContent = 'Please enter both username and password.';
      errorMsg.style.color = '#dc3545';
      return;
    }

    submitBtn.disabled = true;
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Logging in...';
    successMsg.className = 'msg loading';
    successMsg.textContent = 'Verifying credentials...';

    try {
      const res = await fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        if (data.access_token) localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('username', username);

        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.className = 'msg success';

        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } else {
        errorMsg.style.color = '#dc3545';
        if (res.status === 403) errorMsg.textContent = data.detail || 'Account not approved.';
        else if (res.status === 404) errorMsg.textContent = data.detail || 'User not found.';
        else errorMsg.textContent = data.detail || 'Invalid credentials.';
        successMsg.textContent = '';
      }

    } catch (err) {
      console.error('Login error:', err);
      errorMsg.style.color = '#dc3545';
      errorMsg.textContent = 'Cannot connect to server.';
      successMsg.textContent = '';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalText || 'Login';
    }
  });
});
</script>

</body>
</html>
