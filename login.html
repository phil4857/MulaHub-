<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MulaHub 🚀 | Login</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #10b981);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    background: #ffffffee;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
  }

  h2 {
    text-align: center;
    margin-bottom: 10px;
    color: #111827;
    font-size: 28px;
  }

  .subtitle {
    text-align: center;
    margin-bottom: 20px;
    color: #6b7280;
    font-size: 14px;
  }

  .brand {
    text-align: center;
    margin-bottom: 15px;
  }

  .brand h1 {
    margin: 0;
    font-size: 28px;
    color: #0f172a;
  }

  .brand p {
    margin: 6px 0 0;
    font-size: 13px;
    color: #64748b;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
  }

  input:focus {
    outline: none;
    border-color: #10b981;
    box-shadow: 0 0 6px rgba(16,185,129,0.4);
  }

  button {
    background: linear-gradient(135deg, #10b981, #2563eb);
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  .password-container {
    position: relative;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 38px;
    cursor: pointer;
    font-size: 18px;
  }

  .msg {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
  }

  .msg.error { color: #dc3545; }
  .msg.success { color: #16a34a; }
  .msg.loading { color: #2563eb; }
</style>
</head>

<body>

<div class="container">

  <!-- BRAND SECTION -->
  <div class="brand">
    <h1>🚀 MulaHub</h1>
    <p>Build your digital income journey daily</p>
  </div>

  <h2>Member Login</h2>
  <p class="subtitle">Access your dashboard, earnings & investment plans</p>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required />

    <div class="password-container">
      <input type="password" id="password" placeholder="Password" required />
      <span id="togglePassword" class="toggle-password">👁️</span>
    </div>

    <button type="submit" id="loginBtn">Login</button>
  </form>

  <div id="loginError" class="msg"></div>
  <div id="loginSuccess" class="msg"></div>

</div><script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

document.addEventListener('DOMContentLoaded', () => {

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('loginError');
  const successMsg = document.getElementById('loginSuccess');
  const submitBtn = document.getElementById('loginBtn');
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  // Toggle password visibility
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    errorMsg.textContent = '';
    successMsg.textContent = '';

    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!username || !password) {
      errorMsg.className = 'msg error';
      errorMsg.textContent = 'Please enter your username and password to continue.';
      return;
    }

    submitBtn.disabled = true;
    const originalText = submitBtn.textContent;

    submitBtn.textContent = 'Accessing MulaHub...';

    successMsg.className = 'msg loading';
    successMsg.textContent = 'Verifying your account...';

    try {
      const res = await fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      let data;
      try {
        data = await res.json();
      } catch {
        data = { message: await res.text() };
      }

      if (res.ok && data.access_token) {

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('username', username);

        successMsg.className = 'msg success';
        successMsg.textContent = 'Welcome back to MulaHub! Redirecting...';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);

      } else {

        let errMsg = 'Unable to login at the moment.';

        if (typeof data === 'string') {
          errMsg = data;
        } else if (data.message) {
          errMsg = data.message;
        } else if (data.detail) {
          if (Array.isArray(data.detail)) {
            errMsg = data.detail.map(e => e.msg || 'Error').join(' • ');
          } else {
            errMsg = data.detail;
          }
        }

        errorMsg.className = 'msg error';
        errorMsg.textContent = errMsg;
        successMsg.textContent = '';
      }

    } catch (err) {
      console.error(err);
      errorMsg.className = 'msg error';
      errorMsg.textContent = 'Network error. Please try again.';
      successMsg.textContent = '';
    }

    submitBtn.disabled = false;
    submitBtn.textContent = originalText || 'Login';
  });

});
</script>

</body>
</html>
