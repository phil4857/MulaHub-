<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Mkoba Wallet</title>
  <style>
    body {
      background-color: gold;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background-color: blue;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      width: 300px;
      text-align: center;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: darkorange;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: orangered;
    }

    .error-message {
      color: yellow;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required><br>
      <input type="password" id="password" placeholder="Password" required><br>
      <button type="submit">Login</button>
      <div class="error-message" id="errorMsg"></div>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const API = "https://repo-1red-mkoba-wallet.onrender.com"; // Update if backend URL changed

      const form = document.getElementById('loginForm');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.textContent = '';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          errorMsg.textContent = "Please fill in both fields.";
          return;
        }

        try {
          const response = await fetch(`${API}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({ username, password }).toString()
          });

          const data = await response.json();

          if (!response.ok) {
            errorMsg.textContent = data.detail || "Login failed.";
            return;
          }

          // Save user session
          localStorage.setItem("username", username);
          localStorage.setItem("password", password); // Needed for investment
          localStorage.setItem("is_admin", data.is_admin);
          localStorage.setItem("is_approved", data.is_approved);

          if (data.is_admin) {
            window.location.href = "admin.html";
          } else if (data.is_approved) {
            window.location.href = "dashboard.html";
          } else {
            errorMsg.textContent = "Your account is not yet approved by the admin.";
          }

        } catch (error) {
          console.error("Login error:", error);
          errorMsg.textContent = "Login failed. Please check your connection.";
        }
      });
    });
  </script>

</body>
</html>
