<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mkoba Wallet - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: linear-gradient(135deg, #28a745, #007bff);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: #333;
  }

  .login-box {
    background: white;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    width: 360px;
    max-width: 90%;
    text-align: center;
  }

  h2 {
    margin-bottom: 25px;
    color: #28a745;
    font-size: 1.9rem;
  }

  .password-container {
    position: relative;
    margin: 12px 0;
  }

  input {
    width: 100%;
    padding: 12px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    margin-bottom: 12px;
  }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    user-select: none;
  }

  button {
    width: 100%;
    padding: 14px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s;
  }

  button:hover:not(:disabled) {
    background: #0056b3;
  }

  button:disabled {
    background: #6c757d;
    cursor: not-allowed;
  }

  .msg {
    margin-top: 16px;
    font-weight: 600;
    min-height: 24px;
    font-size: 0.95rem;
  }
  .error { color: #721c24; }
  .success { color: #155724; }
  .loading { color: #0c5460; }

  .register-link {
    margin-top: 20px;
    font-size: 0.95rem;
  }
  .register-link a {
    color: #007bff;
    text-decoration: none;
    font-weight: 600;
  }
  .register-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>Mkoba Wallet Login</h2>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required autocomplete="username">

    <div class="password-container">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <span class="toggle-password" id="togglePassword">👁️</span>
    </div>

    <button type="submit" id="loginBtn">Login</button>
  </form>

  <div class="msg error" id="loginError"></div>
  <div class="msg success" id="loginSuccess"></div>

  <div class="register-link">
    Don't have an account? <a href="register.html">Register here</a>
  </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-6.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const loginForm = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const loginError = document.getElementById("loginError");
  const loginSuccess = document.getElementById("loginSuccess");
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");

  // Password visibility toggle
  togglePassword.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginError.textContent = "";
    loginSuccess.textContent = "";

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!username || !password) {
      loginError.textContent = "Please enter both username and password.";
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    loginError.className = "msg loading";
    loginError.textContent = "Verifying credentials...";

    try {
      const formData = new URLSearchParams();
      formData.append("username", username);
      formData.append("password", password);

      const response = await fetch(`${BACKEND_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData
      });

      let data;
      try { data = await response.json(); } catch { data = {}; }

      if (response.ok) {
        localStorage.setItem("username", username);
        loginSuccess.textContent = "Login successful! Redirecting...";
        loginSuccess.className = "msg success";
        setTimeout(() => window.location.href = "dashboard.html", 1500);
      } else {
        loginError.className = "msg error";
        if (response.status === 403) {
          loginError.textContent = data.detail || "Account pending admin approval.";
        } else {
          loginError.textContent = data.detail || "Invalid username or password.";
        }
      }
    } catch (err) {
      console.error("Login error:", err);
      loginError.className = "msg error";
      loginError.textContent = "Cannot connect to server. Check your internet or try again later.";
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
});
</script>

</body>
</html>
