<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mkoba Wallet - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: linear-gradient(135deg, #28a745, #007bff);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    width: 340px;
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #28a745;
  }

  .password-container {
    position: relative;
    margin: 15px 0;
  }

  input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    font-size: 15px;
  }

  button:disabled {
    background: #6c757d;
    cursor: not-allowed;
  }

  button:hover:not(:disabled) {
    background: #0056b3;
  }

  .error-message {
    color: #dc3545;
    font-size: 14px;
    margin-top: 10px;
    min-height: 18px;
  }

  .success-message {
    color: #28a745;
    font-size: 14px;
    margin-top: 10px;
    min-height: 18px;
  }

  .register-link {
    margin-top: 15px;
    font-size: 14px;
  }

  .register-link a {
    color: #007bff;
    text-decoration: none;
  }

  .register-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>Mkoba Wallet Login</h2>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required autocomplete="username">

    <div class="password-container">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <span class="toggle-password" id="togglePassword">👁️</span>
    </div>

    <button type="submit" id="loginBtn">Login</button>
  </form>

  <div class="error-message" id="loginError"></div>
  <div class="success-message" id="loginSuccess"></div>

  <div class="register-link">
    Don't have an account? <a href="register.html">Register here</a>
  </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const loginSuccess = document.getElementById('loginSuccess');
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  // Password visibility toggle
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Clear previous messages
    loginError.textContent = '';
    loginSuccess.textContent = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      loginError.textContent = 'Please enter both username and password.';
      return;
    }

    // Disable button during request
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
      const formData = new URLSearchParams();
      formData.append('username', username);
      formData.append('password', password);

      const response = await fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });

      const data = await response.json();

      if (response.ok) {
        // Save username for dashboard
        localStorage.setItem('username', username);

        loginSuccess.textContent = 'Login successful! Redirecting...';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        // Special handling for unapproved account
        if (response.status === 403) {
          loginError.textContent = data.detail || 'Your account is pending approval. Please wait for admin confirmation.';
        } else {
          loginError.textContent = data.detail || 'Invalid username or password.';
        }
      }
    } catch (error) {
      console.error('Login error:', error);
      loginError.textContent = 'Cannot connect to server. Please check your internet connection.';
    } finally {
      // Re-enable button
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });
});
</script>

</body>
</html>
