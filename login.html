<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mkoba Wallet - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: linear-gradient(135deg, #28a745, #007bff);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 340px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #28a745;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      min-height: 18px;
    }

    .register-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .register-link a {
      color: #007bff;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Mkoba Wallet Login</h2>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <div class="error-message" id="loginError"></div>
  </form>

  <div class="register-link">
    Don't have an account? <a href="register.html">Register</a>
  </div>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus.onrender.com";

document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.textContent = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      loginError.textContent = 'Please enter username and password.';
      return;
    }

    try {
      const response = await fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password })
      });

      const data = await response.json();

      if (!response.ok) {
        // Custom message for pending approval
        if (response.status === 403) {
          loginError.textContent = data.detail || 'Account pending approval.';
          return;
        }
        loginError.textContent = data.detail || 'Login failed.';
        return;
      }

      // Save username to localStorage and redirect
      localStorage.setItem('username', username);
      window.location.href = 'dashboard.html';

    } catch (error) {
      console.error('Error:', error);
      loginError.textContent = 'Server error. Please try again later.';
    }
  });
});
</script>

</body>
</html>
