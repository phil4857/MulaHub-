<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Mkoba Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  width: 320px;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
}

.msg.success { color: green; }
.msg.error { color: red; }
.msg.loading { color: orange; }

.password-box {
  position: relative;
}

.password-box span {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <!-- IMPORTANT: form id must exist -->
  <form id="loginForm">
    <input id="username" placeholder="Username" required>

    <div class="password-box">
      <input id="password" type="password" placeholder="Password" required>
      <span id="togglePassword">👁️</span>
    </div>

    <button id="loginBtn" type="submit">Login</button>
  </form>

  <div class="msg" id="msg"></div>

  <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const loginForm = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const msg = document.getElementById("msg");
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");

  // Toggle password visibility
  togglePassword.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    msg.textContent = "";
    msg.className = "msg";

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!username || !password) {
      msg.className = "msg error";
      msg.textContent = "Please enter both username and password.";
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    msg.className = "msg loading";
    msg.textContent = "Verifying credentials...";

    try {
      const response = await fetch(`${BACKEND_URL}/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      });

      const data = await response.json();

      if (response.ok) {
        const token = data.access_token;

        if (token) {
          localStorage.setItem("access_token", token);
        }

        localStorage.setItem("username", username);

        msg.className = "msg success";
        msg.textContent = "Login successful! Redirecting...";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);

      } else {
        msg.className = "msg error";

        if (response.status === 403) {
          msg.textContent = data.detail || "Account not approved yet.";
        } else {
          msg.textContent = data.detail || "Invalid credentials.";
        }
      }

    } catch (error) {
      console.error(error);
      msg.className = "msg error";
      msg.textContent = "Cannot connect to server.";
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
});
</script>

</body>
</html>
