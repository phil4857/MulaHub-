<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const loginForm = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const msg = document.getElementById("msg");
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");

  // toggle visibility
  togglePassword.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";
    msg.className = "msg";

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!username || !password) {
      msg.className = "msg error";
      msg.textContent = "Please enter both username and password.";
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    msg.className = "msg loading";
    msg.textContent = "Verifying credentials...";

    try {
      // Most backends accept JSON; if your backend expects form-urlencoded, switch back to URLSearchParams
      const payload = new URLSearchParams();
      payload.append("username", username);
      payload.append("password", password);

      const response = await fetch(`${BACKEND_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: payload.toString()
      });

      let data = {};
      const ct = response.headers.get("content-type") || "";
      if (ct.includes("application/json")) {
        data = await response.json();
      } else {
        const t = await response.text();
        try { data = JSON.parse(t); } catch { data = { message: t }; }
      }

      if (response.ok) {
        // Save token if backend provided one. Common names: access_token, token, jwt
        const token = data.access_token || data.token || data.jwt || null;
        if (token) {
          localStorage.setItem("access_token", token);
        }
        localStorage.setItem("username", username);

        msg.className = "msg success";
        msg.textContent = "Login successful! Redirecting to dashboard...";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 900);
      } else {
        msg.className = "msg error";
        if (response.status === 403) {
          msg.textContent = data.detail || "Your account is pending approval.";
        } else {
          msg.textContent = data.detail || data.message || "Invalid username or password.";
        }
      }
    } catch (err) {
      console.error("Login error:", err);
      msg.className = "msg error";
      msg.textContent = "Cannot connect to server. Please check your internet.";
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
});
</script>
