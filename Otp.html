<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mkoba Wallet - OTP Verification</title>
  <style>
    body {
      background: linear-gradient(135deg, #28a745, #007bff);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .otp-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 360px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
      color: #28a745;
    }
    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 85%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    #otpDisplay {
      font-weight: bold;
      color: #e53e3e;
      margin-bottom: 15px;
    }
    #otpMessage {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="otp-box">
    <h2>OTP Verification</h2>
    <p id="otpDisplay">Your OTP will appear here</p>
    <input type="text" id="otpInput" placeholder="Enter OTP" />
    <button id="submitOtp">Verify OTP</button>
    <p id="otpMessage"></p>
  </div>

  <script src="otp.js"></script>
</body>
</html>
