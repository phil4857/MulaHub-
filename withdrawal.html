<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Funds - Mkoba Wallet 💸</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(to right, #f0f9f7, #e0f2fe); font-family: 'Segoe UI', Arial, sans-serif; }
  .welcome-banner {
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
    color: white;
    padding: 22px 25px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 2rem;
  }
  .balance-box {
    background: #e8f4fd;
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    border: 1px solid #b3d4fc;
  }
  .amount-btn {
    background: #f0f4f8;
    border: 1px solid #d1dbe4;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .amount-btn:hover {
    background: #e0e9f2;
    border-color: #a8c0d4;
  }
  .msg {
    padding: 12px 18px;
    border-radius: 10px;
    margin: 15px 0;
    font-weight: 600;
    text-align: center;
  }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body class="p-6">

<!-- Welcome Banner -->
<div class="welcome-banner">
  Welcome to Mkoba Wallet where your money grows daily 🤑🎉
</div>

<div class="max-w-md mx-auto mt-8">

  <div class="card">
    <h1 class="text-2xl font-bold text-center mb-6 text-indigo-700">Withdraw Funds</h1>

    <div class="balance-box mb-8">
      <h2 class="text-gray-500 text-sm mb-1">Available Balance</h2>
      <div id="balance" class="text-4xl font-bold text-indigo-600">KES 0.00</div>
    </div>

    <div id="msg" class="msg"></div>

    <form id="withdrawalForm">
      <label class="block text-sm font-semibold mb-2 text-gray-700">Withdrawal Amount (KES)</label>
      <input type="number" id="amount" min="100" step="1" placeholder="e.g. 5000" 
        class="w-full p-4 text-2xl text-center border border-gray-300 rounded-2xl mb-6 focus:outline-none focus:border-indigo-500">

      <div class="amount-hints flex flex-wrap gap-3 mb-8">
        <button type="button" class="amount-btn flex-1" data-amount="5000">5,000</button>
        <button type="button" class="amount-btn flex-1" data-amount="10000">10,000</button>
        <button type="button" class="amount-btn flex-1" data-amount="20000">20,000</button>
        <button type="button" class="amount-btn flex-1" data-amount="50000">50,000</button>
      </div>

      <!-- Live Charge Breakdown -->
      <div id="chargeBreakdown" class="hidden bg-amber-50 border border-amber-300 p-4 rounded-2xl mb-6 text-sm">
        <div class="flex justify-between mb-1">
          <span class="text-gray-600">Requested Amount:</span>
          <span id="requestedAmt" class="font-semibold">KES 0</span>
        </div>
        <div class="flex justify-between mb-1">
          <span class="text-red-600">20% Withdrawal Charge:</span>
          <span id="chargeAmt" class="font-semibold text-red-600">KES 0</span>
        </div>
        <div class="flex justify-between border-t pt-2 mt-2">
          <span class="font-bold">You will receive:</span>
          <span id="netAmt" class="font-bold text-green-600">KES 0</span>
        </div>
      </div>

      <label class="block text-sm font-semibold mb-2 text-gray-700">Withdrawal Method</label>
      <select id="method" class="w-full p-4 border border-gray-300 rounded-2xl mb-6">
        <option value="">Select method</option>
        <option value="mpesa">M-Pesa</option>
        <option value="airtel">Airtel Money</option>
        <option value="bank">Bank Transfer</option>
        <option value="paypal">PayPal</option>
      </select>

      <label class="block text-sm font-semibold mb-2 text-gray-700">Account / Phone Number</label>
      <input type="text" id="account" placeholder="e.g. 0712345678 or Bank Account No." 
        class="w-full p-4 border border-gray-300 rounded-2xl mb-8">

      <button type="submit" 
        class="w-full bg-red-600 hover:bg-red-700 text-white py-5 rounded-3xl font-bold text-xl">
        Request Withdrawal
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-8">
      Minimum withdrawal: KES 100<br>
      20% charge applies • Processed within 24 hours after admin approval.
    </p>
  </div>

</div>

<script>
const BACKEND_URL = "https://repo-1red-jipate-bonus-1-kwee.onrender.com";

document.addEventListener("DOMContentLoaded", () => {
  const username = localStorage.getItem("username");
  if (!username) {
    window.location.href = "login.html";
    return;
  }

  loadBalance();

  // Quick amount buttons
  document.querySelectorAll(".amount-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.getElementById("amount").value = btn.dataset.amount;
      updateChargeBreakdown();
    });
  });

  // Live charge calculation
  document.getElementById("amount").addEventListener("input", updateChargeBreakdown);

  // Form submit
  document.getElementById("withdrawalForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const amount = parseFloat(document.getElementById("amount").value);
    const method = document.getElementById("method").value;
    const account = document.getElementById("account").value.trim();

    if (!amount || amount < 100) {
      showMsg("error", "Minimum withdrawal is KES 100");
      return;
    }
    if (!method) {
      showMsg("error", "Please select a withdrawal method");
      return;
    }
    if (!account) {
      showMsg("error", "Please enter account or phone number");
      return;
    }

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = "Submitting...";

    try {
      const res = await fetch(`${BACKEND_URL}/withdraw/request`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${localStorage.getItem("access_token")}`
        },
        body: JSON.stringify({ 
          amount: amount,
          payment_method: method 
        })
      });

      const data = await res.json();

      if (res.ok) {
        showMsg("success", data.message || "Withdrawal request submitted successfully.");
        // Clear form
        document.getElementById("amount").value = "";
        document.getElementById("account").value = "";
        document.getElementById("chargeBreakdown").classList.add("hidden");
        loadBalance(); 
      } else {
        showMsg("error", data.detail || data.message || "Failed to submit request");
      }
    } catch (e) {
      showMsg("error", "Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Request Withdrawal";
    }
  });
});

function updateChargeBreakdown() {
  const amountInput = document.getElementById("amount");
  const breakdown = document.getElementById("chargeBreakdown");
  const amount = parseFloat(amountInput.value);

  if (!amount || amount < 100) {
    breakdown.classList.add("hidden");
    return;
  }

  const charge = amount * 0.20;
  const net = amount - charge;

  document.getElementById("requestedAmt").textContent = `KES ${amount.toFixed(0)}`;
  document.getElementById("chargeAmt").textContent = `KES ${charge.toFixed(0)}`;
  document.getElementById("netAmt").textContent = `KES ${net.toFixed(0)}`;

  breakdown.classList.remove("hidden");
}

async function loadBalance() {
  try {
    const res = await fetch(`${BACKEND_URL}/dashboard`, {
      headers: { Authorization: `Bearer ${localStorage.getItem("access_token")}` }
    });
    const data = await res.json();
    document.getElementById("balance").textContent = `KES ${Number(data.balance || 0).toFixed(2)}`;
  } catch (e) {
    console.error("Failed to load balance");
  }
}

function showMsg(type, text) {
  const msg = document.getElementById("msg");
  msg.className = `msg ${type}`;
  msg.textContent = text;
  setTimeout(() => msg.textContent = "", 8000);
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
