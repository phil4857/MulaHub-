<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Withdraw Funds - Mkoba Wallet</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    padding: 2.5rem;
    width: 100%;
    max-width: 480px;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 1.5rem;
    font-size: 1.8rem;
  }

  .balance-box {
    background: #e8f4fd;
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 2rem;
    border: 1px solid #b3d4fc;
  }

  .balance-box h2 {
    margin: 0 0 0.5rem;
    font-size: 1.1rem;
    color: #555;
  }

  .balance {
    font-size: 2.4rem;
    font-weight: bold;
    color: #1e90ff;
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #333;
  }

  input, select {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 1.2rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #1e90ff;
    box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.15);
  }

  .amount-hints {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .amount-btn {
    background: #f0f4f8;
    border: 1px solid #d1dbe4;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  .amount-btn:hover {
    background: #e0e9f2;
    border-color: #a8c0d4;
  }

  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
  }

  button[type="submit"]:hover {
    background: #0c7cd5;
  }

  .note {
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #666;
    text-align: center;
  }

  #msg {
    text-align: center;
    font-weight: bold;
    margin-bottom: 1rem;
    min-height: 24px;
  }

  @media (max-width: 480px) {
    .container {
      padding: 1.8rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Withdraw Funds</h1>

  <div class="balance-box">
    <h2>Available Balance</h2>
    <div class="balance">KES 0.00</div>
  </div>

  <div id="msg"></div>

  <form id="withdrawalForm">
    <label for="amount">Withdrawal Amount (KES)</label>
    <input type="number" id="amount" name="amount" min="65" step="1" placeholder="e.g. 5000" required />

    <div class="amount-hints">
      <button type="button" class="amount-btn" data-amount="100">5,000</button>
      <button type="button" class="amount-btn" data-amount="500">10,000</button>
      <button type="button" class="amount-btn" data-amount="200">20,000</button>
      <button type="button" class="amount-btn" data-amount="max">Max</button>
    </div>

    <label for="method">Withdrawal Method</label>
    <select id="method" name="method" required>
      <option value="">Select method</option>
      <option value="mpesa">M-Pesa</option>
      <option value="bank">Bank Transfer</option>
      <option value="airtel">Airtel Money</option>
      <option value="paypal">PayPal</option>
    </select>

    <label for="account">Account/Phone Number</label>
    <input type="text" id="account" name="account" placeholder="e.g. 0712345678 or Bank Account No." required />

    <button type="submit">Withdraw Now</button>
  </form>

  <p class="note">
    Withdrawal requests are processed within 24 hours. Fees may apply depending on method. Minimum withdrawal: KES 65. Admin approval required.
  </p>
</div>

<script src="withdrawal.js"></script>
</body>
</html>
